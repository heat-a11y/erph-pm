<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>eRPH-PM - Rancangan Pengajaran Harian</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="cascading-combobox.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased" x-data="app()">
<div class="flex h-screen">
  <aside class="sidebar-transition fixed inset-y-0 left-0 z-40 flex w-72 flex-col bg-slate-900 text-slate-100 md:static" x-bind:class="sO?'translate-x-0':'-translate-x-full md:translate-x-0'">
    <div class="flex h-14 items-center gap-2 border-b border-slate-700/50 px-4"><span class="flex h-7 w-7 items-center justify-center rounded-lg bg-indigo-500 text-xs font-bold shrink-0">R</span><div><p class="text-sm font-semibold leading-tight">eRPH-PM</p><p class="text-[9px] leading-tight text-slate-400">SJK(C) PIN MIN, BIDOR</p></div></div>
    <div class="border-b border-slate-700/50 p-3"><p class="mb-1.5 text-[10px] font-semibold uppercase tracking-wide text-slate-500">Guru</p>
      <select x-model="tg" @change="sv()" class="w-full rounded-lg bg-slate-800 px-2.5 py-2 text-xs text-slate-200 border border-slate-600"><option value="">-- Pilih --</option><template x-for="(info,code) in D.TEACHERS" :key="code"><option :value="code" x-text="info.n+' ('+code+')'+(info.c?' '+info.c:'')"></option></template></select>
    </div>
    <nav class="flex-1 space-y-0.5 overflow-y-auto p-2">
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="sw(tab.id)" class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-xs font-medium transition-colors" :class="a===tab.id?'bg-indigo-500/20 text-indigo-300':'text-slate-400 hover:bg-slate-800 hover:text-slate-200'"><span x-text="tab.i"></span><span x-text="tab.l"></span><span x-show="tab.c" class="ml-auto rounded-full bg-indigo-500/20 px-1.5 py-0.5 text-[9px]" x-text="tab.c"></span></button>
      </template>
    </nav>
    <div class="border-t border-slate-700/50 p-3 text-center text-[9px] text-slate-600">v3.0 | <span x-text="rph.length"></span> RPH</div>
  </aside>
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-14 items-center gap-2 border-b bg-white px-3 shadow-sm">
      <button @click="sO=!sO" class="rounded-lg p-1.5 text-slate-500 hover:bg-slate-100 md:hidden"><svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button>
      <div class="flex items-center gap-1.5 text-xs font-medium text-slate-500"><span x-text="tI()"></span><span x-text="tL()"></span></div>
      <div class="ml-auto flex items-center gap-2 text-xs text-slate-400"><span x-text="tg?sl().length+' slot':''"></span><template x-if="rph.length"><span class="rounded-full bg-indigo-100 px-2 py-0.5 text-[10px] font-medium text-indigo-700" x-text="rph.length+' RPH'"></span></template></div>
    </header>
    <main class="flex-1 overflow-y-auto p-2 md:p-4">

      <!-- TIMETABLE -->
      <section x-show="a==='tt'" x-cloak class="max-w-6xl mx-auto">
        <template x-if="!tg"><div class="flex h-48 items-center justify-center text-slate-400 text-sm">Pilih guru dari sidebar.</div></template>
        <template x-if="tg">
          <div><div class="mb-2 flex items-center justify-between"><h2 class="text-base font-bold text-slate-900" x-text="tN()"></h2><button @click="gen()" x-show="sl().length" class="inline-flex items-center gap-1 rounded-lg bg-indigo-600 px-3.5 py-2 text-xs font-semibold text-white shadow hover:bg-indigo-700">+ Jana RPH</button></div>
          <div class="overflow-x-auto rounded-xl border bg-white shadow-sm"><table class="w-full min-w-[760px] text-xs"><thead><tr class="border-b bg-slate-50"><th class="px-1.5 py-2 text-left font-semibold text-slate-500 w-20">Masa</th><template x-for="d in D.DAYS" :key="d"><th class="px-1.5 py-2 text-center font-semibold text-slate-500" x-text="d"></th></template></tr></thead>
          <tbody><template x-for="per in D.PERIODS" :key="per[0]"><tr class="border-b" :class="per[0]==='REHAT'?'bg-amber-50':''"><td class="px-1.5 py-1 text-[10px] font-medium text-slate-400" x-text="per[0]+' '+per[1]+'-'+per[2]"></td><template x-for="d in D.DAYS" :key="d"><td class="px-0.5 py-0.5 text-center border-l align-top"><template x-for="s in gS(d,per[0])" :key="s.c+s.s"><div class="rounded border px-1 py-0.5 text-[10px] leading-tight mb-0.5" :class="clr(s.s)"><div class="font-semibold" x-text="s.n"></div><div class="text-[9px] opacity-70" x-text="s.c.replace('Tahun ','Y')"></div></div></template></td></template></tr></template></tbody></table></div></div>
        </template>
      </section>

      <!-- CURRICULUM -->
      <section x-show="a==='kur'" x-cloak class="max-w-4xl mx-auto">
        <div class="mb-3"><h2 class="text-base font-bold text-slate-900">DSKP Curriculum Browser</h2><p class="text-xs text-slate-500">Cascading combobox — accessible keyboard &amp; screen reader friendly.</p></div>
        <div id="cc-mount" class="rounded-xl border bg-white p-4 shadow-sm"></div>
        <div id="cc-selection" class="mt-3 rounded-lg border bg-indigo-50 p-3 text-xs text-indigo-900 hidden"></div>
      </section>

      <!-- RPH -->
      <section x-show="a==='rph'" x-cloak class="max-w-4xl mx-auto">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <button @click="gen()" x-show="tg" class="inline-flex items-center gap-1 rounded-lg bg-indigo-600 px-4 py-2 text-xs font-semibold text-white shadow hover:bg-indigo-700">+ Jana RPH</button>
          <button @click="iRef()" x-show="rph.length" class="rounded-lg border bg-amber-50 px-3 py-2 text-xs font-medium text-amber-700 hover:bg-amber-100">Sisip Refleksi</button>
          <button @click="pAll()" x-show="rph.length" class="rounded-lg border bg-white px-3 py-2 text-xs font-medium text-slate-600 hover:bg-slate-50">PDF Semua</button>
          <button @click="rph=[];sv()" x-show="rph.length" class="rounded-lg px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50">Padam</button>
        </div>
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-slate-400 text-sm">Pilih guru dan Jana RPH.</div></template>
        <template x-if="rph.length"><div class="space-y-4"><template x-for="(p,i) in rph" :key="p.id"><div class="rounded-xl border bg-white shadow-sm">
          <div @click="p.o=!p.o" class="flex cursor-pointer items-center justify-between border-b px-4 py-2.5"><div class="min-w-0"><p class="text-sm font-semibold text-slate-900 truncate" x-text="p.sn+' | '+p.c"></p><p class="text-xs text-slate-500"><span x-text="p.d"></span> | P<span x-text="p.per"></span> (<span x-text="p.tm"></span>) | <span x-text="p.dr"></span> min</p></div><span class="shrink-0 text-slate-400 text-xs" x-text="p.o?'v':'>'"></span></div>
          <div x-show="p.o" x-collapse class="p-4 space-y-4 text-xs">

            <!-- Unit -->
            <div><p class="font-semibold text-indigo-700 text-[11px] uppercase">Unit Pembelajaran</p><input type="text" x-model="p.unit" class="w-full rounded border border-slate-300 bg-white p-2 text-xs font-medium"></div>

            <!-- SK -->
            <div><div class="flex items-center justify-between"><p class="font-semibold text-slate-600 uppercase tracking-wider text-[10px]">Standard Kandungan</p><button @click="p.sk.push('')" class="text-indigo-500 text-[10px]">+</button></div><template x-for="(sk,i) in p.sk" :key="i"><div class="flex gap-1 mt-1"><input type="text" x-model="p.sk[i]" class="flex-1 rounded border border-slate-300 bg-white p-1.5 text-xs"><button @click="p.sk.splice(i,1)" class="text-red-400 text-[10px]" x-show="p.sk.length>1">&times;</button></div></template></div>

            <!-- SP -->
            <div><div class="flex items-center justify-between"><p class="font-semibold text-slate-600 uppercase tracking-wider text-[10px]">Standard Pembelajaran</p><button @click="p.sp.push('')" class="text-indigo-500 text-[10px]">+</button></div><template x-for="(sp,i) in p.sp" :key="i"><div class="flex gap-1 mt-1"><input type="text" x-model="p.sp[i]" class="flex-1 rounded border border-slate-300 bg-white p-1.5 text-xs"><button @click="p.sp.splice(i,1)" class="text-red-400 text-[10px]" x-show="p.sp.length>1">&times;</button></div></template></div>

            <!-- Objectives -->
            <div><p class="font-semibold text-indigo-600 uppercase tracking-wider text-[10px]">Objektif</p><template x-for="(o,i) in p.obj" :key="i"><textarea x-model="p.obj[i]" class="w-full rounded border border-slate-300 bg-white p-1.5 text-xs mt-1" rows="1"></textarea></template></div>

            <!-- Kejayaan -->
            <div><p class="font-semibold text-emerald-600 uppercase tracking-wider text-[10px]">Kriteria Kejayaan</p><template x-for="(k,i) in p.kj" :key="i"><textarea x-model="p.kj[i]" class="w-full rounded border border-slate-300 bg-white p-1.5 text-xs mt-1" rows="1"></textarea></template></div>

            <!-- Activities -->
            <div><p class="font-semibold text-indigo-600 uppercase tracking-wider text-[10px]">Aktiviti Pembelajaran</p><div class="space-y-2 mt-1"><template x-for="(a,i) in p.acts" :key="i"><div class="flex gap-2"><span class="shrink-0 flex h-6 w-6 items-center justify-center rounded-full text-[9px] font-bold mt-1" :class="aC(a.ph)" x-text="a.ph[0]"></span><div class="flex-1"><p class="font-medium text-slate-700 text-[11px]" x-text="a.ph"></p><textarea x-model="a.d" class="w-full rounded border border-slate-300 bg-white p-1.5 text-xs" rows="2"></textarea><div class="flex gap-2 mt-1"><input type="text" x-model="a.t" class="flex-1 rounded border border-slate-300 bg-white p-1 text-[10px]" placeholder="Peranan guru"><input type="text" x-model="a.s" class="flex-1 rounded border border-slate-300 bg-white p-1 text-[10px]" placeholder="Peranan murid"><input type="number" x-model="a.dr" class="w-14 rounded border border-slate-300 bg-white p-1 text-[10px]" placeholder="min"></div></div></div></template></div></div>

            <!-- BBM Nilai EMK -->
            <div class="grid grid-cols-3 gap-2"><div><p class="font-semibold text-slate-500 text-[10px] uppercase mb-1">BBM</p><template x-for="(b,i) in p.bbm" :key="i"><div class="flex gap-1 mb-1"><input type="text" x-model="p.bbm[i]" class="flex-1 rounded border border-slate-300 bg-white p-1 text-[10px]"><button @click="p.bbm.splice(i,1);p.bbm.push('')" class="text-indigo-400 text-[9px]">+</button></div></template></div><div><p class="font-semibold text-slate-500 text-[10px] uppercase mb-1">Nilai</p><template x-for="(v,i) in p.nilai" :key="i"><div class="flex gap-1 mb-1"><input type="text" x-model="p.nilai[i]" class="flex-1 rounded border border-slate-300 bg-white p-1 text-[10px]"><button @click="p.nilai.splice(i,1);p.nilai.push('')" class="text-indigo-400 text-[9px]">+</button></div></template></div><div><p class="font-semibold text-slate-500 text-[10px] uppercase mb-1">EMK</p><template x-for="(e,i) in p.emk" :key="i"><div class="flex gap-1 mb-1"><input type="text" x-model="p.emk[i]" class="flex-1 rounded border border-slate-300 bg-white p-1 text-[10px]"><button @click="p.emk.splice(i,1);p.emk.push('')" class="text-indigo-400 text-[9px]">+</button></div></template></div></div>

            <!-- Reflection - ALWAYS VISIBLE -->
            <div class="border-t-2 border-amber-200 pt-3 mt-2"><p class="font-semibold text-amber-700 uppercase tracking-wider text-[10px] mb-1">Refleksi</p><textarea x-model="p.ref" class="w-full rounded-lg border-2 border-amber-200 bg-amber-50 p-3 text-xs text-slate-700 focus:border-amber-400 focus:outline-none" rows="3" placeholder="Taip refleksi..."></textarea></div>

            <!-- Actions -->
            <div class="flex flex-wrap gap-2 border-t pt-3">
              <button @click.stop="ref1(p)" class="rounded-lg border border-amber-300 bg-amber-50 px-3 py-1.5 text-[10px] font-medium text-amber-700 hover:bg-amber-100">Jana Refleksi</button>
              <button @click.stop="cp(p)" class="rounded-lg border bg-white px-3 py-1.5 text-[10px] font-medium text-slate-600 hover:bg-slate-50">Salin</button>
              <button @click.stop="pdf1(p)" class="rounded-lg border bg-white px-3 py-1.5 text-[10px] font-medium text-slate-600 hover:bg-slate-50">PDF</button>
              <button @click.stop="rph=rph.filter(x=>x.id!==p.id);sv()" class="rounded-lg px-3 py-1.5 text-[10px] font-medium text-red-500 hover:bg-red-50">Padam</button>
            </div>
          </div>
        </div></template></div></template>
      </section>

      <!-- REFLEKSI -->
      <section x-show="a==='ref'" x-cloak class="max-w-4xl mx-auto">
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-slate-400 text-sm">Jana RPH dahulu.</div></template>
        <template x-if="rph.length">
          <div><div class="mb-3 flex gap-2"><button @click="iRef()" class="rounded-lg bg-amber-600 px-4 py-2 text-xs font-semibold text-white hover:bg-amber-700">Sisip Refleksi Semua</button></div>
          <div class="space-y-2"><template x-for="(p,i) in rph" :key="p.id"><div class="rounded-lg border bg-white p-3 shadow-sm"><p class="text-xs font-semibold text-slate-900 mb-1" x-text="(i+1)+'. '+p.sn+' - '+p.c+' ('+p.d+')'"></p><textarea x-model="p.ref" class="w-full rounded-lg border-2 border-amber-200 bg-amber-50 p-3 text-xs text-slate-700 focus:border-amber-400 focus:outline-none" rows="3" placeholder="Taip refleksi..."></textarea><button @click.stop="ref1(p)" class="mt-1 rounded-lg border border-amber-300 bg-amber-50 px-3 py-1.5 text-[10px] font-medium text-amber-700 hover:bg-amber-100">Jana Refleksi</button></div></template></div></div>
        </template>
      </section>

    </main>
  </div>
</div>

<script>

      +(p.sp.length?'<div><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin:.5rem 0 .3rem">'+e(spT)+'</h2>'+p.sp.map(s=>'<span style="background:#f1f5f9;border-radius:999px;padding:2px 8px;font-size:.7rem;color:#475569;display:inline-block;margin:2px">'+e(s)+'</span>').join('')+'</div>':'')

  pdf1(p){

    navigator.clipboard.writeText(l.join('\n'));
  },

  init(){this.$watch('rph',()=>{this.sv();this.tabs[2].c=this.rph.length;},{deep:true});this.sv();},
}));});

// Cascading Combobox initialization
const YEAR_GROUPS = ['Year 1','Year 2','Year 3','Year 4','Year 5','Year 6'];
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const mount = document.getElementById('cc-mount');
    if (!mount || window._ccInitialized) return;
    window._ccInitialized = true;

    const d = window.D;
    if (!d) return;

    // Build hierarchical data: year -> subject -> units -> cs -> ls
    const hierData = {};
    (YEAR_GROUPS || ['Year 1','Year 2','Year 3','Year 4','Year 5','Year 6']).forEach(y => {
      hierData[y] = {};
      (d.SUBJECTS || []).forEach(s => {
        const units = (d.CUR[s.c] || {})[y];
        if (units && units.length) {
          hierData[y][s.c] = { units };
        }
      });
    });

    window.cc = new CascadingCombobox(mount, {
      data: {
        ...hierData,
        SK: d.SK,
        SP: d.SP,
        LANG: d.LANG,
      },
      lang: 'zh',
      onChange: (path) => {
        const el = document.getElementById('cc-selection');
        if (!el) return;
        const parts = [];
        if (path.year) parts.push('Year: ' + path.year);
        if (path.subject) {
          const sn = (d.SUBJECTS || []).find(s => s.c === path.subject)?.n || path.subject;
          parts.push('Subject: ' + sn);
        }
        if (path.unit) parts.push('Unit: ' + path.unit);
        if (path.cs) parts.push('CS: ' + path.cs.substring(0, 60));
        if (path.ls) parts.push('LS: ' + path.ls.substring(0, 60));
        el.className = 'mt-3 rounded-lg border bg-indigo-50 p-3 text-xs text-indigo-900';
        el.innerHTML = parts.length ? '<span class="font-semibold">Selected Path:</span> ' + parts.join(' &rarr; ') : '';
      },
    });
  }, 500);
});
