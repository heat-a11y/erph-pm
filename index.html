<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>eRPH-PM — Jana RPH from Jadual Waktu</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="curriculum-data.js"></script>
<script src="timetable-data.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
<div x-data="app()" class="flex h-screen">
  <template x-teleport="body"><div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 z-30 bg-slate-900/40 backdrop-blur-sm md:hidden"></div></template>
  <aside class="sidebar-transition fixed inset-y-0 left-0 z-40 flex w-64 flex-col bg-slate-900 text-slate-100 md:static" x-bind:class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">
    <div class="flex h-16 items-center gap-2.5 border-b border-slate-700/50 px-5">
      <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-500 text-sm shrink-0">R</span>
      <div><p class="text-sm font-semibold leading-tight">eRPH-PM</p><p class="text-[10px] leading-tight text-slate-400">Jana RPH from Jadual Waktu</p></div>
    </div>
    <nav class="flex-1 space-y-1 overflow-y-auto p-3">
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="switchTab(tab.id)" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
          x-bind:class="activeTab === tab.id ? 'bg-indigo-500/20 text-indigo-300' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'">
          <span x-text="tab.icon"></span>
          <span x-text="tab.label"></span>
        </button>
      </template>
    </nav>
    <div class="border-t border-slate-700/50 p-4 text-center text-[10px] text-slate-500">SJK(C) PIN MIN, BIDOR STESEN, PERAK</div>
  </aside>
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-16 items-center gap-3 border-b bg-white px-4 md:px-6 lg:px-8">
      <button @click="sidebarOpen = !sidebarOpen" class="-ml-1 rounded-lg p-1.5 text-slate-500 hover:bg-slate-100 md:hidden">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
      </button>
      <div class="flex items-center gap-2 text-sm font-medium text-slate-500">
        <span x-text="tabs.find(t => t.id === activeTab)?.icon"></span>
        <span x-text="tabs.find(t => t.id === activeTab)?.label"></span>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <select x-model="selectedTeacher" @change="onTeacherChange" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 shadow-sm focus:border-indigo-400 focus:outline-none">
          <option value="">-- Pilih Guru --</option>
          <template x-for="(info, code) in TEACHERS" :key="code">
            <option x-bind:value="code" x-text="info.name + ' (' + code + ')' + (info.name_cn ? ' ' + info.name_cn : '')"></option>
          </template>
        </select>
        <select x-model="selectedPenggal" @change="onTeacherChange" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 shadow-sm focus:border-indigo-400 focus:outline-none">
          <option value="1">Penggal 1 (12 Jan - 22 Mei)</option>
          <option value="2">Penggal 2 (8 Jun - 4 Dis)</option>
        </select>
        <span class="text-xs text-slate-400" x-text="lessonPlans.length + ' RPH'"></span>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
      <!-- TIMETABLE TAB -->
      <section x-show="activeTab === 'timetable'" x-cloak class="fade-in mx-auto max-w-6xl">
        <div class="mb-4 flex items-center justify-between">
          <div>
            <h1 class="text-xl font-bold text-slate-900" x-text="selectedTeacher ? 'Jadual Waktu: ' + selectedTeacherName : 'Pilih Guru'"></h1>
            <p class="mt-1 text-sm text-slate-500" x-text="selectedTeacher ? teacherSlotCount + ' slot across ' + teacherClassList : 'Select a teacher and penggal above, then click Generate.'"></p>
          </div>
          <button @click="generateWeekRPH()" x-show="selectedTeacher" class="inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-md hover:bg-indigo-700">
            <span>+</span> Jana RPH
          </button>
        </div>
        <div x-show="!selectedTeacher" class="flex flex-col items-center justify-center rounded-xl border-2 border-dashed py-16 text-center text-slate-400">
          <p class="text-sm font-medium">Pilih guru untuk lihat jadual</p>
        </div>
        <div x-show="selectedTeacher" class="overflow-x-auto rounded-xl border bg-white shadow-sm">
          <table class="w-full min-w-[820px] text-xs">
            <thead>
              <tr class="border-b bg-slate-100">
                <th class="px-2 py-2 text-left font-semibold text-slate-500 w-24">Masa</th>
                <template x-for="d in DAYS" :key="d">
                  <th class="px-2 py-2 text-center font-semibold text-slate-500" x-text="d"></th>
                </template>
              </tr>
            </thead>
            <tbody>
              <template x-for="per in PERIODS" :key="per[0]">
                <tr class="border-b last:border-0" x-bind:class="per[0] === 'REHAT' ? 'bg-amber-50' : ''">
                  <td class="px-2 py-1.5 text-[10px] font-medium text-slate-400 whitespace-nowrap" x-text="per[0] + ' ' + per[1] + '-' + per[2]"></td>
                  <template x-for="d in DAYS" :key="d">
                    <td class="px-1 py-1 text-center border-l align-top">
                      <template x-for="slot in getSlotsFor(d, per[0])" :key="slot.class + slot.subject">
                        <div class="rounded border px-1 py-0.5 text-[10px] leading-tight mb-0.5 break-words"
                          x-bind:class="slotClass(slot.subject)">
                          <div class="font-semibold" x-text="slot.subjectName"></div>
                          <div class="text-[9px] opacity-70" x-text="slot.class.replace('Tahun ','Y')"></div>
                        </div>
                      </template>
                    </td>
                  </template>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </section>

      <!-- GENERATE RPH TAB -->
      <section x-show="activeTab === 'generate'" x-cloak class="fade-in mx-auto max-w-5xl">
        <div class="mb-6">
          <h1 class="text-xl font-bold text-slate-900">Rancangan Pengajaran Harian (RPH)</h1>
          <p class="mt-1 text-sm text-slate-500" x-text="selectedTeacherName ? selectedTeacherName + ' - ' + lessonPlans.length + ' RPH' : 'Select a teacher first.'"></p>
        </div>
        <div class="mb-4 flex flex-wrap items-center gap-2">
          <button @click="generateWeekRPH()" x-show="selectedTeacher" class="inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-4 py-2 text-xs font-semibold text-white shadow-md hover:bg-indigo-700">
            <span>+</span> Jana RPH
          </button>
          <button @click="insertAllReflections()" x-show="lessonPlans.length" class="inline-flex items-center gap-1.5 rounded-lg border bg-amber-50 px-3 py-2 text-xs font-medium text-amber-700 shadow-sm hover:bg-amber-100">
            <span>R</span> Sisip Refleksi
          </button>
          <button @click="exportAllPDF()" x-show="lessonPlans.length" class="inline-flex items-center gap-1.5 rounded-lg border bg-white px-3 py-2 text-xs font-medium text-slate-600 shadow-sm hover:bg-slate-50">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg> Export All PDF
          </button>
          <button @click="lessonPlans = []" x-show="lessonPlans.length" class="rounded-lg px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50">Padam Semua</button>
        </div>
        <div x-show="!lessonPlans.length" class="flex flex-col items-center justify-center rounded-xl border-2 border-dashed py-16 text-center text-slate-400">
          <p class="text-sm font-medium">Tiada RPH</p>
          <p class="mt-1 text-xs">Go to Timetable and click <strong>Jana RPH</strong>.</p>
        </div>
        <div x-show="lessonPlans.length" class="space-y-4">
          <template x-for="plan in lessonPlans" :key="plan.id">
            <div class="rounded-xl border bg-white shadow-sm">
              <div @click="plan._open = !plan._open" class="flex cursor-pointer items-center justify-between border-b px-4 sm:px-5 py-3">
                <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                  <span class="shrink-0 text-slate-400" x-text="plan._open ? 'v' : '>'"></span>
                  <div class="min-w-0">
                    <p class="truncate text-sm font-semibold text-slate-900" x-text="plan.subjectName + ' - ' + plan.class"></p>
                    <p class="text-xs text-slate-500 truncate">
                      <span x-text="plan.day"></span>
                      <span x-text="' | P' + plan.period + ' (' + plan.time + ')'"></span>
                      <span x-text="' | ' + plan.duration + ' min'"></span>
                    </p>
                  </div>
                </div>
                <button @click.stop="deletePlan(plan.id)" class="rounded-lg p-1 text-slate-400 hover:bg-red-50 hover:text-red-500">&times;</button>
              </div>
              <div x-show="plan._open" x-collapse class="px-5 py-4 space-y-5 text-sm">
                <!-- Unit Info -->
                <div class="rounded-lg border bg-indigo-50 p-3">
                  <p class="mb-1 text-xs font-semibold text-indigo-700">Unit Kurikulum</p>
                  <p class="text-sm text-indigo-900" x-text="plan.unitTitle"></p>
                </div>
                <!-- Content Standards -->
                <div x-show="plan.contentStandards.length">
                  <h4 class="mb-1.5 text-xs font-semibold uppercase tracking-wider text-slate-500">Standard Kandungan</h4>
                  <div class="space-y-1">
                    <template x-for="cs in plan.contentStandards" :key="cs">
                      <p class="text-slate-600 text-xs" x-text="cs"></p>
                    </template>
                  </div>
                </div>
                <!-- Learning Standards -->
                <div x-show="plan.learningStandards.length">
                  <h4 class="mb-1.5 text-xs font-semibold uppercase tracking-wider text-slate-500">Standard Pembelajaran</h4>
                  <div class="space-y-1">
                    <template x-for="ls in plan.learningStandards" :key="ls">
                      <p class="text-slate-600 text-xs" x-text="ls"></p>
                    </template>
                  </div>
                </div>
                <!-- Objectives -->
                <div>
                  <h4 class="mb-1.5 text-xs font-semibold uppercase tracking-wider text-indigo-600">Objektif Pembelajaran</h4>
                  <ul class="space-y-1">
                    <template x-for="(obj, i) in plan.learningObjectives" :key="i">
                      <li class="flex items-start gap-2 text-slate-600">
                        <span class="mt-1 block h-1.5 w-1.5 shrink-0 rounded-full bg-indigo-400"></span>
                        <span x-text="obj"></span>
                      </li>
                    </template>
                  </ul>
                </div>
                <!-- Success Criteria -->
                <div>
                  <h4 class="mb-1.5 text-xs font-semibold uppercase tracking-wider text-emerald-600">Kriteria Kejayaan</h4>
                  <ul class="space-y-1">
                    <template x-for="(sc, i) in plan.successCriteria" :key="i">
                      <li class="flex items-start gap-2 text-slate-600">
                        <span class="mt-1 block h-1.5 w-1.5 shrink-0 rounded-full bg-emerald-400"></span>
                        <span x-text="sc"></span>
                      </li>
                    </template>
                  </ul>
                </div>
                <!-- Activities -->
                <div>
                  <h4 class="mb-1.5 text-xs font-semibold uppercase tracking-wider text-indigo-600">Aktiviti Pembelajaran</h4>
                  <div class="space-y-2">
                    <template x-for="(act, i) in plan.activities" :key="act.id">
                      <div class="relative flex gap-3">
                        <div x-show="i < plan.activities.length - 1" class="absolute left-[15px] top-8 h-full w-px bg-slate-200"></div>
                        <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-xs font-bold"
                          x-bind:class="actColor(act.phase)" x-text="act.phase[0]"></div>
                        <div class="flex-1 rounded-lg border bg-slate-50 p-3">
                          <div class="mb-1 flex items-center justify-between gap-2">
                            <span class="text-sm font-medium text-slate-800" x-text="act.phase"></span>
                            <span class="shrink-0 text-xs text-slate-400" x-text="act.duration + ' min'"></span>
                          </div>
                          <p class="text-xs text-slate-600 leading-relaxed" x-text="act.description"></p>
                          <div class="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-500">
                            <div><span class="font-medium text-slate-700">Guru:</span> <span x-text="act.teacherRole"></span></div>
                            <div><span class="font-medium text-slate-700">Murid:</span> <span x-text="act.studentRole"></span></div>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
                <!-- Cross-curricular elements -->
                <div class="grid grid-cols-1 gap-3 sm:grid-cols-3">
                  <div class="rounded-lg border bg-slate-50 p-3">
                    <h5 class="mb-1 text-[10px] font-semibold uppercase tracking-wider text-slate-500">Bahan Bantu Mengajar</h5>
                    <div class="flex flex-wrap gap-1">
                      <template x-for="aid in plan.teachingAids" :key="aid">
                        <span class="rounded-md border bg-white px-2 py-0.5 text-[11px] text-slate-600" x-text="aid"></span>
                      </template>
                    </div>
                  </div>
                  <div class="rounded-lg border bg-slate-50 p-3">
                    <h5 class="mb-1 text-[10px] font-semibold uppercase tracking-wider text-slate-500">Nilai Murni</h5>
                    <div class="flex flex-wrap gap-1">
                      <template x-for="v in plan.moralValues" :key="v">
                        <span class="rounded-md border bg-white px-2 py-0.5 text-[11px] text-slate-600" x-text="v"></span>
                      </template>
                    </div>
                  </div>
                  <div class="rounded-lg border bg-slate-50 p-3">
                    <h5 class="mb-1 text-[10px] font-semibold uppercase tracking-wider text-slate-500">EMK</h5>
                    <div class="flex flex-wrap gap-1">
                      <template x-for="c in plan.cce" :key="c">
                        <span class="rounded-md border bg-white px-2 py-0.5 text-[11px] text-slate-600" x-text="c"></span>
                      </template>
                    </div>
                  </div>
                </div>
                <!-- Remedial Instruction -->
                <div x-show="plan.remedialInstruction">
                  <div @click="plan._riOpen = !plan._riOpen" class="flex cursor-pointer items-center gap-2 rounded-lg border border-orange-200 bg-orange-50 px-4 py-2.5">
                    <span class="text-orange-500 shrink-0" x-text="plan._riOpen ? 'v' : '>'"></span>
                    <span class="text-sm font-semibold text-orange-800">Aktiviti Pemulihan</span>
                    <span class="ml-auto rounded-full bg-orange-200 px-2 py-0.5 text-[10px] font-medium text-orange-700" x-text="plan.remedialInstruction.activities.length + ' aktiviti'"></span>
                  </div>
                  <div x-show="plan._riOpen" x-collapse class="border border-t-0 border-orange-200 rounded-b-lg bg-orange-50/50 px-4 py-3 space-y-3">
                    <div class="flex flex-wrap gap-2">
                      <template x-for="s in plan.remedialInstruction.students" :key="s">
                        <span class="rounded-full bg-orange-200 px-2.5 py-0.5 text-[11px] font-medium text-orange-800" x-text="s"></span>
                      </template>
                    </div>
                    <template x-for="ra in plan.remedialInstruction.activities" :key="ra.id">
                      <div class="rounded-lg border border-orange-200 bg-white p-3">
                        <p class="text-sm font-semibold text-slate-800" x-text="ra.title"></p>
                        <p class="mt-0.5 text-xs text-slate-600" x-text="ra.description"></p>
                        <div class="mt-2 flex flex-wrap gap-1">
                          <template x-for="str in ra.strategies" :key="str">
                            <span class="rounded-md bg-orange-100 px-1.5 py-0.5 text-[10px] text-orange-700" x-text="str"></span>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
                <!-- Reflection -->
                <div>
                  <h4 class="mb-1.5 text-xs font-semibold uppercase tracking-wider text-slate-500">Refleksi</h4>
                  <textarea x-model="plan.reflection" placeholder="Refleksi guru tentang pengajaran dan pembelajaran..."
                    class="w-full rounded-lg border border-slate-300 bg-white p-3 text-xs text-slate-700 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100" rows="3"></textarea>
                </div>
                <!-- Actions -->
                <div class="flex flex-wrap gap-2 border-t pt-4">
                  <button @click.stop="copyPlan(plan)" class="inline-flex items-center gap-1.5 rounded-lg border bg-white px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-50">
                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184"/></svg> Salin
                  </button>
                  <button @click.stop="downloadPlanPDF(plan)" class="inline-flex items-center gap-1.5 rounded-lg border bg-white px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-50">
                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg> PDF
                  </button>
                  <button @click.stop="insertReflection(plan)" class="inline-flex items-center gap-1.5 rounded-lg border bg-amber-50 px-3 py-1.5 text-xs font-medium text-amber-700 hover:bg-amber-100">
                    <span>R</span> Sisip Refleksi
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('app', () => ({
    sidebarOpen: false,
    activeTab: localStorage.getItem('erphp_tab') || 'timetable',
    selectedTeacher: localStorage.getItem('erphp_teacher') || '',
    selectedPenggal: parseInt(localStorage.getItem('erphp_penggal') || '1'),
    lessonPlans: [],
    tabs: [
      { id: 'timetable', label: 'Jadual Waktu', icon: 'T' },
      { id: 'generate',  label: 'Jana RPH', icon: 'R' },
    ],
    get TEACHERS() { return TEACHERS; },
    get PERIODS() { return PERIODS; },
    get DAYS() { return DAYS; },
    get selectedTeacherName() { const t = TEACHERS[this.selectedTeacher]; return t ? t.name + ' (' + this.selectedTeacher + ')' : ''; },
    get teacherSlots() { return this.selectedTeacher ? getTeacherSlots(this.selectedTeacher, this.selectedPenggal) : []; },
    get teacherSlotCount() { return this.teacherSlots.length; },
    get teacherClassList() { return [...new Set(this.teacherSlots.map(s => s.class))].join(', '); },
    getSlotsFor(day, period) { return this.teacherSlots.filter(s => s.day === day && (s.period === period || (s.period === 'P' && period === 'P'))); },
    slotClass(code) {
      const m = { BM:'bg-red-50 border-red-200 text-red-800', BC:'bg-amber-50 border-amber-200 text-amber-800', BI:'bg-emerald-50 border-emerald-200 text-emerald-800', MT:'bg-blue-50 border-blue-200 text-blue-800', SN:'bg-teal-50 border-teal-200 text-teal-800', PM:'bg-purple-50 border-purple-200 text-purple-800', PI:'bg-green-50 border-green-200 text-green-800', PJ:'bg-orange-50 border-orange-200 text-orange-800', PK:'bg-rose-50 border-rose-200 text-rose-800', PSV:'bg-yellow-50 border-yellow-200 text-yellow-800', MZ:'bg-indigo-50 border-indigo-200 text-indigo-800', SJ:'bg-cyan-50 border-cyan-200 text-cyan-800', RBT:'bg-violet-50 border-violet-200 text-violet-800' };
      return m[code] || 'bg-slate-50 border-slate-200 text-slate-700';
    },
    actColor(phase) {
      const m = { 'Set Induction':'bg-amber-100 text-amber-700', 'Pre-lesson':'bg-blue-100 text-blue-700', 'Lesson Development':'bg-green-100 text-green-700', 'Post-lesson':'bg-purple-100 text-purple-700', 'Closure':'bg-rose-100 text-rose-700' };
      return m[phase] || 'bg-slate-100 text-slate-700';
    },
    getUnitsFor(className, subjectCode) {
      const y = className.replace('Tahun ', 'Year ');
      return (CURRICULUM_DATA[y + '|' + subjectCode] || {}).units || [];
    },
    getTimeForPeriod(period) { const p = PERIODS.find(x => x[0] === period); return p ? p[1] + '-' + p[2] : ''; },
    getDuration(period) {
      const p = PERIODS.find(x => x[0] === period); if (!p) return 30;
      const [sh, sm] = p[1].split(':').map(Number), [eh, em] = p[2].split(':').map(Number);
      return (eh * 60 + em) - (sh * 60 + sm);
    },
    generateId() { return crypto.randomUUID?.() ?? Date.now().toString(36) + Math.random().toString(36).slice(2); },
    rand(n) { return Math.floor(Math.random() * n); },

        pre: ['Perkenal konsep utama.', 'Perbincangan kumpulan.', 'Kad imbasan.', 'Ulang kaji.', 'Demonstrasi.'],

    generateWeekRPH() {
      if (!this.selectedTeacher) return;
      const plans = [];
      this.teacherSlots.forEach(slot => {
        const units = this.getUnitsFor(slot.class, slot.subject);
        const unit = units.length ? units[this.rand(units.length)] : null;
        const duration = this.getDuration(slot.period);
        const time = this.getTimeForPeriod(slot.period);
        const yearNum = slot.class.replace('Tahun ', 'Year ');
        const stds = this.getSubjectStandards(slot.subject, yearNum, unit ? unit.title : '');
        const remedialStudents = this.getRemedialStudents(slot.class);
        const remedialActivities = this.getRemedialActivities();

        plans.push({
          id: this.generateId(),
          class: slot.class, subject: slot.subject, subjectName: slot.subjectName,
          day: slot.day, period: slot.period, time, duration,
          yearGroup: yearNum,
          unitTitle: unit ? unit.title : 'Unit ' + slot.subjectName + ' ' + slot.class,
          contentStandards: unit && unit.sk ? [unit.sk] : stds.sk,
          learningStandards: unit && unit.sp ? [unit.sp] : stds.sp,
          learningObjectives: this.getObjectives(slot.subject, unit ? unit.title : ''),
          successCriteria: this.getSuccessCriteria(slot.subject),
          activities: this.getSubjectActivities(slot.subject, unit ? unit.title : '', duration),
          teachingAids: this.getTeachingAids(slot.subject),
          moralValues: this.getMoralValues(slot.subject),
          cce: this.getCCE(slot.subject),
          reflection: '',
          remedialInstruction: { students: remedialStudents, activities: remedialActivities },
          _open: true,
        });
      });
      this.lessonPlans = [...plans, ...this.lessonPlans];
      this.activeTab = 'generate';
    },

    insertReflection(plan) {
      const refs = this.getReflections(plan.yearGroup);
      plan.reflection = refs[this.rand(refs.length)];
    },
    insertAllReflections() {
      this.lessonPlans.forEach(p => { if (!p.reflection) this.insertReflection(p); });
    },
    deletePlan(id) { this.lessonPlans = this.lessonPlans.filter(p => p.id !== id); },

        (plan.contentStandards.length ? '<div style="margin-top:.75rem"><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:.25rem;margin-bottom:.5rem">Standard Kandungan</h2>' + plan.contentStandards.map(s => '<span style="background:#f1f5f9;border-radius:9999px;padding:.125rem .55rem;font-size:.72rem;color:#475569;display:inline-block;margin:.125rem">' + esc(s) + '</span>').join('') + '</div>' : '') +
        (plan.learningStandards.length ? '<div style="margin-top:.75rem"><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:.25rem;margin-bottom:.5rem">Standard Pembelajaran</h2>' + plan.learningStandards.map(s => '<span style="background:#f1f5f9;border-radius:9999px;padding:.125rem .55rem;font-size:.72rem;color:#475569;display:inline-block;margin:.125rem">' + esc(s) + '</span>').join('') + '</div>' : '') +
        '<div style="margin-top:.75rem"><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:.25rem;margin-bottom:.5rem">Objektif Pembelajaran</h2><ul style="list-style:none;padding:0">' + plan.learningObjectives.map(o => '<li style="padding:.2rem 0;font-size:.8rem;padding-left:1rem;position:relative">' + esc(o) + '</li>').join('') + '</ul></div>' +
        '<div style="margin-top:.75rem"><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:.25rem;margin-bottom:.5rem">Kriteria Kejayaan</h2><ul style="list-style:none;padding:0">' + plan.successCriteria.map(s => '<li style="padding:.2rem 0;font-size:.78rem;padding-left:1rem">' + esc(s) + '</li>').join('') + '</ul></div>' +
        '<div style="margin-top:.75rem"><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:.25rem;margin-bottom:.5rem">Aktiviti Pembelajaran</h2>' +
        plan.activities.map(a => '<div style="border:1px solid #e2e8f0;border-radius:.5rem;padding:.65rem;margin-bottom:.5rem"><h3 style="font-size:.8rem;font-weight:600;color:#4f46e5;margin-bottom:.2rem">' + esc(a.phase) + ' <span style="font-size:.7rem;color:#94a3b8;font-weight:400">- ' + a.duration + ' min</span></h3><p style="font-size:.78rem;color:#475569;margin:0">' + esc(a.description) + '</p></div>').join('') + '</div>' +
        (plan.remedialInstruction ? '<div style="margin-top:.75rem"><h2 style="font-size:.85rem;font-weight:700;color:#ea580c;border-bottom:2px solid #fed7aa;padding-bottom:.25rem;margin-bottom:.5rem">Aktiviti Pemulihan</h2>' + plan.remedialInstruction.students.map(s => '<span style="background:#fed7aa;color:#9a3412;border-radius:9999px;padding:.1rem .55rem;font-size:.68rem;display:inline-block;margin:.15rem">' + esc(s) + '</span>').join('') + plan.remedialInstruction.activities.map(a => '<div style="border:1px solid #fed7aa;border-radius:.5rem;padding:.5rem;margin-top:.5rem"><p style="font-size:.78rem;font-weight:600;color:#c2410c">' + esc(a.title) + '</p><p style="font-size:.72rem;color:#78350f">' + esc(a.description) + '</p></div>').join('') + '</div>' : '') +
        '<div style="margin-top:.75rem;display:flex;gap:1rem;flex-wrap:wrap;font-size:.72rem;color:#475569"><div><strong>BBM:</strong> ' + plan.teachingAids.map(s => esc(s)).join(', ') + '</div><div><strong>Nilai:</strong> ' + plan.moralValues.map(s => esc(s)).join(', ') + '</div><div><strong>EMK:</strong> ' + plan.cce.map(s => esc(s)).join(', ') + '</div></div>' +
        (plan.reflection ? '<div style="margin-top:.75rem;border-top:2px solid #e2e8f0;padding-top:.5rem"><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;margin-bottom:.35rem">Refleksi</h2><p style="font-size:.8rem;color:#475569;font-style:italic">' + esc(plan.reflection) + '</p></div>' : '') +
        '<div style="margin-top:1rem;padding-top:.5rem;border-top:2px solid #e2e8f0;font-size:.65rem;color:#94a3b8;text-align:center">Dijana oleh eRPH-PM | SJK(C) PIN MIN, BIDOR STESEN, PERAK</div></div>';
    },

    downloadPlanPDF(plan) {
      this.openPDFWindow(this.buildPDFHtml(plan), 'RPH_' + plan.subject + '_' + plan.class.replace(' ','') + '_' + plan.day + '.pdf');
    },
    exportAllPDF() {
      if (!this.lessonPlans.length) return;
      const pages = this.lessonPlans.map((p, i) => '<div style="' + (i < this.lessonPlans.length - 1 ? 'page-break-after:always;' : '') + 'page-break-inside:avoid">' + this.buildPDFHtml(p) + '</div>').join('');
      this.openPDFWindow(pages, 'eRPH_PM_' + this.selectedTeacher + '_All.pdf');
    },
    openPDFWindow(html, filename) {
      const w = window.open('', '_blank');
      if (!w) { alert('Sila benarkan popup untuk muat turun PDF.'); return; }
      w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + filename + '</title><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script><\/head><body style="margin:0;padding:0;font-family:sans-serif">' + html + '<script>setTimeout(function(){html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:' + JSON.stringify(filename) + ',image:{type:"jpeg",quality:0.98},html2canvas:{scale:2,useCORS:true,logging:false},jsPDF:{unit:"in",format:"a4",orientation:"portrait"}}).from(document.body).save().then(function(){window.close()})["catch"](function(){window.close()})},500)<\/script><\/body></html>');
      w.document.close();
    },

    switchTab(id) { this.activeTab = id; this.sidebarOpen = false; },
    onTeacherChange() { localStorage.setItem('erphp_teacher', this.selectedTeacher); localStorage.setItem('erphp_penggal', this.selectedPenggal); },
    init() {
      this.$watch('activeTab', v => localStorage.setItem('erphp_tab', v));
      this.$watch('selectedTeacher', v => localStorage.setItem('erphp_teacher', v));
      this.$watch('selectedPenggal', v => localStorage.setItem('erphp_penggal', v));
    },
  }));
});
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
.sidebar-transition { transition: transform 0.25s ease-in-out; }
.fade-in { animation: fadeIn 0.2s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
[x-cloak] { display: none !important; }
</style>
</body>
</html>
