<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🇲🇾 eRPH-PM - Rancangan Pengajaran Harian Malaysia</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="curriculum-db.js"></script>
</head>
<body class="bg-[#FFF8F0] text-[#3A2A1A] font-sans antialiased" x-data="app()">
<div class="flex h-screen">
  <aside class="sidebar-transition fixed inset-y-0 left-0 z-40 flex w-72 flex-col text-white md:static" x-bind:class="sO?'translate-x-0':'-translate-x-full md:translate-x-0'" style="background:linear-gradient(180deg,#1E3A5F,#162D4A)">
    <div class="flex h-14 items-center gap-2 border-b border-white/10 px-4"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-[#C4956A] text-sm font-bold">🇲🇾</span><div><p class="text-sm font-semibold">eRPH-PM</p><p class="text-[9px] text-blue-200/70">SJK(C) PIN MIN, BIDOR</p></div></div>
    <div class="border-b border-white/10 p-3"><p class="mb-1.5 text-[10px] font-semibold uppercase tracking-wide text-blue-300/50">👨‍🏫 Guru</p>
      <select x-model="tg" @change="sv()" class="w-full rounded-lg bg-slate-800/50 px-2.5 py-2 text-xs text-slate-200 border border-slate-600"><option value="">-- Pilih Guru --</option><template x-for="(info,code) in D.TEACHERS" :key="code"><option :value="code" x-text="info.n+' ('+code+')'+(info.c?' '+info.c:'')"></option></template></select>
    </div>
    <nav class="flex-1 space-y-0.5 overflow-y-auto p-2">
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="sw(tab.id)" class="flex w-full items-center gap-2 rounded-lg px-3 py-2.5 text-xs font-medium transition-colors" :class="a===tab.id?'bg-[#C4956A]/20 text-[#C4956A]':'text-blue-200/80 hover:bg-white/10 hover:text-white'"><span x-text="tab.i"></span><span x-text="tab.l"></span><span x-show="tab.c" class="ml-auto rounded-full bg-[#C4956A]/20 px-1.5 py-0.5 text-[9px] text-[#C4956A]" x-text="tab.c"></span></button>
      </template>
    </nav>
    <div class="border-t border-white/10 p-3 text-center text-[9px] text-blue-300/40">🇲🇾 v4.0 | Dibuat dengan ❤️ kat Malaysia</div>
  </aside>
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-14 items-center gap-2 border-b border-[#C4956A]/10 bg-[#FFF8F0]/95 backdrop-blur-md px-3 shadow-sm">
      <button @click="sO=!sO" class="rounded-lg p-1.5 text-[#8B5A2B] hover:bg-[#C4956A]/10 md:hidden"><svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button>
      <div class="flex items-center gap-1.5 text-xs font-medium text-[#8B5A2B]"><span x-text="tI()"></span><span x-text="tL()"></span></div>
      <div class="ml-auto flex items-center gap-2 text-xs text-[#8B5A2B]/60"><span x-text="tg?sl().length+' slot':''"></span><template x-if="rph.length"><span class="rounded-full bg-[#C4956A]/20 px-2 py-0.5 text-[10px] font-medium text-[#8B5A2B]" x-text="rph.length+' RPH'"></span></template></div>
    </header>
    <main class="flex-1 overflow-y-auto p-2 md:p-4">

      <!-- 📅 JADUAL -->
      <section x-show="a==='tt'" x-cloak class="max-w-6xl mx-auto">
        <template x-if="!tg"><div class="flex h-48 items-center justify-center text-[#8B5A2B]/60 text-sm">👈 Pilih guru dari sidebar untuk lihat jadual.</div></template>
        <template x-if="tg">
          <div><div class="mb-2 flex items-center justify-between"><h2 class="text-base font-bold text-[#3A2A1A]">📅 Jadual Waktu: <span x-text="tN()"></span></h2><button @click="gen()" x-show="sl().length" class="btn-jana inline-flex items-center gap-1 rounded-lg px-3.5 py-2 text-xs font-semibold text-white shadow-md" style="background:linear-gradient(135deg,#C4956A,#8B5A2B)">⚡ Jana RPH</button></div>
          <div class="overflow-x-auto rounded-xl border border-[#C4956A]/20 bg-white shadow-sm"><table class="w-full min-w-[760px] text-xs"><thead><tr class="border-b bg-[#FFF8F0]"><th class="px-1.5 py-2 text-left font-semibold text-[#8B5A2B] w-20">⏰ Masa</th><template x-for="d in D.DAYS" :key="d"><th class="px-1.5 py-2 text-center font-semibold text-[#8B5A2B]" x-text="d"></th></template></tr></thead>
          <tbody><template x-for="per in D.PERIODS" :key="per[0]"><tr class="border-b border-[#C4956A]/10" :class="per[0]==='REHAT'?'bg-amber-50/50':''"><td class="px-1.5 py-1 text-[10px] font-medium text-[#8B5A2B]/60" x-text="per[0]+' '+per[1]+'-'+per[2]"></td><template x-for="d in D.DAYS" :key="d"><td @click="editSlot(tg,d,per[0])" class="px-0.5 py-0.5 text-center border-l border-[#C4956A]/10 align-top cursor-pointer hover:bg-[#C4956A]/5 transition-colors min-h-[32px]"><template x-for="s in gS(d,per[0])" :key="s.c+s.s"><div class="rounded border px-1 py-0.5 text-[10px] leading-tight mb-0.5" :class="clr(s.s)"><div class="font-semibold text-[9px]" x-text="s.n"></div><div class="text-[8px] opacity-70" x-text="s.c.replace('Tahun ','Y')"></div></div></template></td></template></tr></template></tbody></table></div><p class="mt-1 text-[9px] text-[#8B5A2B]/40 italic">💡 Klik pada petak kosong untuk tambah subjek</p></div>
        </template>
      </section>

      <!-- ⚡ JANA RPH -->
      <section x-show="a==='rph'" x-cloak class="max-w-4xl mx-auto">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <button @click="gen()" x-show="tg" class="inline-flex items-center gap-1 rounded-lg px-4 py-2 text-xs font-semibold text-white shadow-md" style="background:linear-gradient(135deg,#C4956A,#8B5A2B)">⚡ Jana RPH</button>
          <select x-model="currentWeek" @change="sv()" class="rounded-lg border border-[#C4956A]/20 bg-white px-2 py-1.5 text-xs font-medium text-[#3A2A1A]"><option value="">📅 Pilih Minggu</option><template x-for="w in D.TAKWIM" :key="w.m"><option :value="w.m" x-text="(w.l?w.l:'Minggu '+w.m+' ('+w.s+' - '+w.e+')')" :disabled="w.m===0"></option></template></select>
          <button @click="iRef()" x-show="rph.length" class="inline-flex items-center gap-1 rounded-lg border border-amber-300 bg-amber-50 px-3 py-2 text-xs font-medium text-amber-700 hover:bg-amber-100">💬 Sisip Refleksi</button>
          <button @click="pAll()" x-show="rph.length" class="inline-flex items-center gap-1 rounded-lg border border-[#C4956A]/20 bg-white px-3 py-2 text-xs font-medium text-[#8B5A2B] hover:bg-[#FFF8F0]">📄 PDF Semua</button>
          <button @click="rph=[];sv()" x-show="rph.length" class="rounded-lg px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50">🗑️ Padam</button>
        </div>
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-[#8B5A2B]/60 text-sm">⚡ Pilih guru dan minggu, kemudian Jana RPH.</div></template>
        <template x-if="rph.length"><div class="space-y-4"><template x-for="(p,i) in rph" :key="p.id"><div class="rounded-xl border border-[#C4956A]/20 bg-white shadow-sm">
          <div @click="p.o=!p.o" class="flex cursor-pointer items-center justify-between border-b border-[#C4956A]/10 px-4 py-2.5"><div class="min-w-0"><p class="text-sm font-semibold text-[#3A2A1A] truncate">📚 <span x-text="p.sn+' | '+p.c"></span></p><div class="flex items-center gap-2 text-xs text-[#8B5A2B]/70 mt-0.5">📅 <span x-text="'Minggu '+p._wk"></span> | <span x-text="p.d"></span> | ⏰ P<span x-text="p.per"></span> (<span x-text="p.tm"></span>) | <span x-text="p.dr"></span> min</div></div><span class="shrink-0 text-[#C4956A] text-xs" x-text="p.o?'▼':'▶'"></span></div>
          <div x-show="p.o" x-collapse class="p-4 space-y-4 text-xs">
            <div><p class="font-semibold text-[#C4956A] text-[11px]">📖 Unit</p><input type="text" x-model="p.unit" class="w-full rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-2 text-xs font-medium text-[#3A2A1A]"></div>
            <div><div class="flex items-center justify-between"><p class="font-semibold text-[#3A2A1A] text-[10px]">📋 Standard Kandungan</p><button @click="p.sk.push('')" class="text-[#C4956A] text-[10px]">+ Tambah</button></div><template x-for="(sk,i) in p.sk" :key="i"><div class="flex gap-1 mt-1"><input type="text" x-model="p.sk[i]" class="flex-1 rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-1.5 text-xs"><button @click="p.sk.splice(i,1)" class="text-red-400 text-[10px]" x-show="p.sk.length>1">✕</button></div></template></div>
            <div><div class="flex items-center justify-between"><p class="font-semibold text-[#3A2A1A] text-[10px]">🎯 Standard Pembelajaran</p><button @click="p.sp.push('')" class="text-[#C4956A] text-[10px]">+ Tambah</button></div><template x-for="(sp,i) in p.sp" :key="i"><div class="flex gap-1 mt-1"><input type="text" x-model="p.sp[i]" class="flex-1 rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-1.5 text-xs"><button @click="p.sp.splice(i,1)" class="text-red-400 text-[10px]" x-show="p.sp.length>1">✕</button></div></template></div>
            <div><p class="font-semibold text-[#8B5A2B] text-[10px]">🎯 Objektif</p><template x-for="(o,i) in p.obj" :key="i"><textarea x-model="p.obj[i]" class="w-full rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-1.5 text-xs mt-1" rows="1"></textarea></template></div>
            <div><p class="font-semibold text-emerald-600 text-[10px]">✅ Kriteria Kejayaan</p><template x-for="(k,i) in p.kj" :key="i"><textarea x-model="p.kj[i]" class="w-full rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-1.5 text-xs mt-1" rows="1"></textarea></template></div>
            <div><p class="font-semibold text-[#8B5A2B] text-[10px]">📝 Aktiviti</p><div class="space-y-2 mt-1"><template x-for="(a,i) in p.acts" :key="i"><div class="flex gap-2"><span class="shrink-0 flex h-6 w-6 items-center justify-center rounded-full text-[9px] font-bold mt-1" :class="aC(a.ph)" x-text="a.ph.match(/[\u{1F000}-\u{1FFFF}]/u)?.[0]||'?'"></span><div class="flex-1"><p class="font-medium text-[#3A2A1A] text-[11px]" x-text="a.ph"></p><textarea x-model="a.d" class="w-full rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-1.5 text-xs" rows="2"></textarea><div class="flex gap-2 mt-1"><input type="text" x-model="a.t" class="flex-1 rounded-lg border border-[#C4956A]/20 bg-white p-1 text-[10px]" placeholder="👩‍🏫 Guru"><input type="text" x-model="a.s" class="flex-1 rounded-lg border border-[#C4956A]/20 bg-white p-1 text-[10px]" placeholder="🙋 Murid"></div></div></div></template></div></div>
            <div x-show="p.rem&&p.rem.length"><p class="font-semibold text-orange-600 text-[10px]">🩺 Pemulihan</p><div class="space-y-1.5 mt-1"><template x-for="(r,i) in p.rem" :key="i"><div class="rounded-lg border border-orange-200 bg-orange-50 p-2"><textarea x-model="r.t" class="w-full rounded border border-orange-200 bg-white p-1 text-[11px] font-medium text-orange-800" rows="1"></textarea><textarea x-model="r.d" class="w-full rounded border border-orange-200 bg-white p-1 text-[10px] text-orange-700 mt-1" rows="2"></textarea></div></template></div></div>
            <div><p class="font-semibold text-amber-700 text-[10px] mb-1">💬 Refleksi</p><textarea x-model="p.ref" class="w-full rounded-lg border-2 border-amber-200 bg-amber-50 p-3 text-xs text-[#78350f] focus:border-amber-400" rows="3" placeholder="💬 Taip refleksi..."></textarea></div>
            <div class="flex flex-wrap gap-2 border-t border-[#C4956A]/10 pt-3">
              <button @click.stop="ref1(p)" class="rounded-lg border border-amber-300 bg-amber-50 px-3 py-1.5 text-[10px] font-medium text-amber-700 hover:bg-amber-100">💬 Jana Refleksi</button>
              <button @click.stop="cp(p)" class="rounded-lg border border-[#C4956A]/20 bg-white px-3 py-1.5 text-[10px] font-medium text-[#8B5A2B] hover:bg-[#FFF8F0]">📋 Salin</button>
              <button @click.stop="pdf1(p)" class="rounded-lg border border-[#C4956A]/20 bg-white px-3 py-1.5 text-[10px] font-medium text-[#8B5A2B] hover:bg-[#FFF8F0]">📄 PDF</button>
              <button @click.stop="rph=rph.filter(x=>x.id!==p.id);sv()" class="rounded-lg px-3 py-1.5 text-[10px] font-medium text-red-500 hover:bg-red-50">🗑️ Padam</button>
            </div>
          </div>
        </div></template></div></template>
      </section>

      <!-- 📚 KURIKULUM -->
      <section x-show="a==='kur'" x-cloak class="max-w-4xl mx-auto">
        <div class="mb-3"><h2 class="text-base font-bold text-[#3A2A1A]">📚 DSKP Curriculum Standards</h2><p class="text-xs text-[#8B5A2B]/60">Browse Content Standards (SK) and Learning Standards (SP) from official KSSR DSKP documents.</p></div>
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <select x-model="cs" @change="sv()" class="rounded-lg border border-[#C4956A]/20 bg-white px-3 py-1.5 text-xs font-medium text-[#3A2A1A]"><template x-for="s in D.SUBJECTS" :key="s.c"><option :value="s.c" x-text="s.n"></option></template></select>
          <select x-model="cy" @change="sv()" class="rounded-lg border border-[#C4956A]/20 bg-white px-3 py-1.5 text-xs font-medium text-[#3A2A1A]"><template x-for="y in ['Year 1','Year 2','Year 3','Year 4','Year 5','Year 6']" :key="y"><option :value="y" x-text="y.replace('Year ','Tahun ')"></option></template></select>
        </div>
        <template x-if="!gSK().length"><div class="flex h-48 items-center justify-center text-[#8B5A2B]/60 text-sm">📚 Tiada data.</div></template>
        <template x-if="gSK().length">
          <div class="space-y-3">
            <div class="rounded-lg border border-[#C4956A]/20 bg-white shadow-sm">
              <div @click="_skOpen=!_skOpen" class="flex cursor-pointer items-center justify-between px-4 py-2.5 bg-[#FFF8F0] rounded-t-lg border-b border-[#C4956A]/10"><p class="text-xs font-bold text-[#8B5A2B]">📋 SK — <span x-text="gSK().length"></span></p><span class="text-xs text-[#C4956A]" x-text="_skOpen?'▼':'▶'"></span></div>
              <div x-show="_skOpen" x-collapse class="px-4 py-3 space-y-2 max-h-80 overflow-y-auto"><template x-for="(sk,i) in gSK()" :key="i"><div class="flex gap-2 text-xs text-[#3A2A1A]/80 border-b border-[#C4956A]/5 pb-1.5"><span class="shrink-0 font-mono font-bold text-[#C4956A]" x-text="'SK'+(i+1)"></span><span x-text="sk"></span></div></template></div>
            </div>
            <div class="rounded-lg border border-[#C4956A]/20 bg-white shadow-sm">
              <div @click="_spOpen=!_spOpen" class="flex cursor-pointer items-center justify-between px-4 py-2.5 bg-[#FFF8F0] rounded-t-lg border-b border-[#C4956A]/10"><p class="text-xs font-bold text-emerald-700">🎯 SP — <span x-text="gSP().length"></span></p><span class="text-xs text-[#C4956A]" x-text="_spOpen?'▼':'▶'"></span></div>
              <div x-show="_spOpen" x-collapse class="px-4 py-3 space-y-2 max-h-96 overflow-y-auto"><template x-for="(sp,i) in gSP()" :key="i"><div class="flex gap-2 text-xs text-[#3A2A1A]/80 border-b border-[#C4956A]/5 pb-1.5"><span class="shrink-0 font-mono font-bold text-emerald-600" x-text="'SP'+(i+1)"></span><span x-text="sp"></span></div></template></div>
            </div>
          </div>
        </template>
      </section>

      <!-- 💬 REFLEKSI -->
      <section x-show="a==='ref'" x-cloak class="max-w-4xl mx-auto">
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-[#8B5A2B]/60 text-sm">⚡ Jana RPH dahulu.</div></template>
        <template x-if="rph.length">
          <div><div class="mb-3 flex gap-2"><button @click="iRef()" class="inline-flex items-center gap-1 rounded-lg px-4 py-2 text-xs font-semibold text-white shadow-md" style="background:linear-gradient(135deg,#C4956A,#8B5A2B)">💬 Sisip Refleksi</button></div>
          <div class="space-y-2"><template x-for="(p,i) in rph" :key="p.id"><div class="rounded-lg border border-[#C4956A]/20 bg-white p-3 shadow-sm"><p class="text-xs font-semibold text-[#3A2A1A] mb-1" x-text="(i+1)+'. '+p.sn+' - '+p.c+' ('+p.d+')'"></p><textarea x-model="p.ref" class="w-full rounded-lg border-2 border-amber-200 bg-amber-50 p-3 text-xs text-[#78350f]" rows="3" placeholder="💬 Taip refleksi..."></textarea><button @click.stop="ref1(p)" class="mt-1 rounded-lg border border-amber-300 bg-amber-50 px-3 py-1.5 text-[10px] font-medium text-amber-700 hover:bg-amber-100">💬 Jana Refleksi</button></div></template></div></div>
        </template>
      </section>

    </main>
  </div>
</div>

. They could connect learning with real situations in their daily lives.", "Today's lesson successfully improved pupils' critical thinking skills. They could solve given problems creatively and innovatively. The HOTS questions posed challenged pupils' thinking and encouraged them to think outside the box. Pupils enjoyed the challenges given.", "Learning objectives achieved well. Creative and varied use of teaching aids such as interactive videos, animated pictures and real objects successfully attracted pupils' interest. They understood abstract concepts more easily through attractive visuals and concrete materials that could be touched and seen.", "Majority of pupils completed the given tasks well and on time. However, a few pupils need additional guidance in writing and reading skills. Teacher will focus on these skills next session by providing more practice exercises.", "The lesson went smoothly with active participation from all pupils. Group activities conducted successfully encouraged cooperation, communication and interaction among pupils. They helped each other and shared ideas in completing tasks. A positive and conducive learning atmosphere was observed throughout the session.", "Learning objectives achieved excellently. Pupils mastered speaking skills confidently especially during presentation and role-play sessions. Role-play activities greatly helped pupils increase their confidence and communication skills in the correct language.", "Pupils showed very positive attitudes and high interest in learning. The lesson went smoothly according to plan. Formative assessment conducted continuously showed positive development in pupils' mastery of the prescribed learning standards.", "Today's lesson successfully achieved the set objectives. Pupils could work both in groups and individually well. They showed high discipline during activities and listened to teacher instructions carefully. The work produced was also of good quality.", "Learning objectives achieved satisfactorily. Pupils could identify and understand the concepts taught well especially after hands-on activities. Reinforcement exercises will be given to further strengthen pupils' understanding of the topic learned today.", "Pupils enjoyed the activities provided today. They could learn in a fun and stress-free atmosphere. The lesson went smoothly with active participation from pupils. They were not shy to ask questions and give opinions during the discussion session.", "The lesson proceeded according to the planned schedule. Pupils mastered the skills taught well. Pupil reflections at the end of the session showed they understood the lesson content delivered and could connect it with prior knowledge.", "Learning objectives achieved well. Pupils answered the questions posed correctly especially comprehension and application questions. Enrichment and remedial activities were conducted according to pupil needs to ensure each pupil benefited optimally from the lesson.", "Majority of pupils showed positive development in learning. However, a few pupils still need additional guidance especially in writing and reading skills. The next lesson session will focus more on remedial activities for pupils who are still weak.", "Today's lesson was very encouraging. Pupils mastered the learning objectives excellently without any issues. Various interactive activities conducted throughout the session successfully helped pupils' learning process and made the learning experience more meaningful and enjoyable."], "zh": ["今天有12名学生达到了学习目标。3名学生需要额外指导，特别是在阅读和写作方面。使用视频和问答的导入活动成功吸引了学生的兴趣。下次授课需要调整教学节奏，确保所有学生都能跟上课程。应该使用多样化的教具来保持学生的注意力。", "教学目标成功达成。学生能够很好地完成分配的任务，尤其是在小组活动中。他们展现了高度的合作精神。小组活动花费了相当长的时间，因此时间管理需要更有效率。动手操作活动大大帮助学生更清楚地理解抽象概念。", "15名/18名学生达到了预设的学习目标。三名学生需要在下次课进行个别补救活动。通过游戏学习的方法非常有效，成功吸引了学生的兴趣。通过有趣和互动的活动，他们更容易记住所学的概念。", "今天学生的掌握程度令人满意。教学按计划顺利进行，没有任何干扰。学生在整个过程中积极配合，并积极参与讨论。所提供的教具有助于提高学生对所教主题的理解。将给予巩固练习以进一步加强学生的理解。", "大多数学生掌握了规定的学习标准。少数学生需要额外的练习，特别是在写语法正确的句子方面。进行的小组活动成功提高了学生的协作和沟通能力。他们互相帮助，分享想法，完成分配的任务。", "教学目标完全达成。学生在讨论中很活跃，并在画廊漫步活动中贡献了 brilliant 的想法。持续进行的形成性评估显示了学生在理解方面的积极进展。所应用的21世纪学习方法成功提高了学生的积极参与度。", "教学顺利，达到了设定的目标。学生能够将学习与日常生活联系起来，尤其是在集思广益环节。画廊漫步活动非常有效地提高了学生的参与度，并提供了同伴学习的机会。学生也能向朋友提供建设性的反馈。", "所有学生都达到了今天设定的最低目标。通过Think-Pair-Share和Gallery Walk等活动应用了21世纪学习技能。课程结束时的学生反思显示了对所学主题的良好理解。学生也能将新知识与他们之前的经验联系起来。", "教学目标出色地达成。学生很好地完成了小组任务，并展现了高度的创造力。高层次思维技能被融入解决问题的活动中，学生很好地应用了它们。他们在整个过程中成功产生了创造性和创新性的想法。", "学生的掌握程度非常令人满意。教学按计划进行，时间为每个活动适当分配。学生已准备好接受下一堂课，并对继续学习表现出高度兴趣。使用各种教学技巧，如模拟和角色扮演，成功保持了学生的兴趣。", "目标很好地达成。学生能够在新的情况下应用所学知识，特别是在解决问题的活动中。布置了巩固练习作为家庭作业，以进一步加强学生的理解。教师将在下次课检查这些练习并提供建设性反馈。", "10名学生达到了掌握水平4及以上。5名学生仍在水平3，需要额外的练习。下次课将根据个别学生的需要进行补救活动。教师将为这些学生准备特殊的工作纸并提供密切指导。", "教学顺利且愉快。学生喜欢所提供的活动，尤其是互动的语言游戏。各种彩色教具有助于提高学生对所教概念的理解。学生在愉快的氛围中更有学习热情。", "教学目标成功达成。学生在小组中合作并按时完成了分配的任务。进行的同伴评估进展顺利，学生向朋友提供了建设性的反馈。这项活动也有助于提高学生的社交技能。", "学生对今天所教的主题表现出非常高的兴趣。他们在讨论环节积极提问并发表意见。下次课需要继续以更具挑战性的活动来满足优秀学生的需求，同时需要为弱生准备补救活动。", "今天的课顺利进行，80%的学生达到了设定的目标。在补救活动期间，对弱生进行了个别额外指导。给优秀学生提供了充实活动以挑战他们的思维。这种分层学习方法成功满足了学生多样化的学习需求。", "各种互动的学习活动成功帮助保持了学生整节课的兴趣。他们不感到无聊，始终积极参与。教学按计划和分配的时间顺利进行。学生配合良好，仔细听教师的指示。", "教学目标令人满意地达成。学生掌握了所教的技能，尤其是阅读和写作技能。进行的小组活动成功培养了学生之间的合作和互助精神。下次课需要稍微延长教学时间，给学生更多讨论的机会。", "教学顺利且有组织。学生整节课都专心听讲，不容易分心。大多数学生正确回答了教师提出的口头问题。书面练习显示出比前几节课令人鼓舞的进步。学生越来越自信地回答问题。", "14名学生达到了学习目标。4名学生仍在补救过程中，需要特别关注。进行的分层学习活动成功满足了不同掌握水平学生的学习需求。教师将继续定期监测这些补救学生的进展。", "教学目标大体达成。学生在规定时间内完成了分配的任务。使用各种教具，如视频、图片和实物，成功提高了学生对所教概念的理解。通过有吸引力的视觉材料，学生更容易记住课程内容。", "学生在小组活动中非常积极。他们很好地完成了任务，并展现了密切的合作。课程结束时的呈现展示出每个小组的巨大努力。学生勇敢地走上前呈现他们的小组作业。", "教学按计划进行，没有任何问题。学生在动手操作活动后很好地理解了所教的概念。大多数学生很好地完成了课程结束时给出的巩固练习。课程结束时的学生反思显示他们喜欢今天的学习。", "大多数学生达到了设定的目标。然而，少数学生在阅读和写作技能方面仍然薄弱。下次课将为这些学生进行特别干预。教师将准备图画阅读材料和更简单的写作练习，帮助他们掌握基本技能。", "教学顺利，达到了目标。学生能够很好地识别和理解所教的主要概念。动手活动大大帮助了弱生理解主题。他们能够通过直接经验和实物进行具体学习。", "教学目标很好地达成。学生今天对学习表现出非常积极的态度。他们在小组中合作并互相帮助。通过小组活动培养了宽容和相互尊重的价值观。学生也认真倾听朋友的意见。", "学生成功掌握了规定的学习标准。教学按计划顺利进行。根据需要进行了充实和补救活动。给优秀学生分配了额外的挑战性任务，而补救学生则接受了密切的个别指导。", "今天的课非常有趣。学生通过有趣和互动的活动在玩中学。通过玩中学的方法，他们更容易记住所教的概念。愉快和轻松的学习氛围帮助学生更舒适地学习和提问。", "教学目标成功达成。学生在理解所教主题方面显示出令人鼓舞的进步。补救学生需要持续的指导，以确保他们不会在学习中落后。教师将在下次课给予这些学生更多关注。", "整体教学成功，达到了设定的目标。学生达到了预期的学习成果。各种活动，如小组讨论、画廊漫步和呈现，成功满足了具有不同学习风格学生的学习需求。", "今天的课通过互动和愉快的活动成功吸引了学生的兴趣。学生在各自的小组中合作良好并互相帮助。小组学习方法不仅提高了理解，还培养了学生之间的合作和宽容。", "教学目标出色地达成。在教学中使用技术，如视频、动画和互动测验，成功提高了学生的参与度和兴趣。学生喜欢有趣的学习方式，并通过有吸引力的可视化更容易理解抽象概念。", "学生在教师的密切指导下掌握了所教的技能。将给予巩固练习以进一步加强他们的理解，特别是在仍然薄弱的方面。教师将为此准备额外的工作纸和各种练习问题。", "教学顺利进行，学生积极参与。他们在问答环节积极提问和回应。使用的通过游戏学习的方法非常适合今天所教的主题。通过有趣的活动，学生更容易理解概念。", "今天教学目标完全达成。学生的呈现展示出高度的努力和创造力。他们成功制作了高质量和有吸引力的作品。整节课持续进行的形成性评估帮助教师识别学生的优势和弱点。", "16名学生达到了设定的学习目标。两名学生需要特别关注，将给予个别补救活动。教师将为这些学生准备特殊的补救模块，并定期监测他们的进展。", "学生能够在新的情况下很好地应用所学知识。使用的情境教学法成功帮助学生更深入和有意义地理解主题。他们能够将学习与日常生活中的实际情况联系起来。", "今天的课成功提高了学生的批判性思维能力。他们能够创造性和创新性地解决给定的问题。提出的高阶思维问题挑战了学生的思维，鼓励他们跳出框框思考。学生喜欢所给予的挑战。", "教学目标很好地达成。创造性和多样化地使用教具，如互动视频、动画图片和实物，成功吸引了学生的兴趣。通过有吸引力的视觉和可以触摸和看到的具体材料，学生更容易理解抽象概念。", "大多数学生按时很好地完成了分配的任务。然而，少数学生在写作和阅读技能方面需要额外指导。教师将在下次课重点关注这些技能，提供更多的练习。", "教学顺利进行，所有学生积极参与。进行的小组活动成功鼓励了学生之间的合作、沟通和互动。他们在完成任务时互相帮助并分享想法。整节课观察到了积极和有利的学习氛围。", "教学目标出色地达成。学生自信地掌握了口语技能，特别是在呈现和角色扮演环节。角色扮演活动大大帮助学生增强了自信心和用正确语言沟通的能力。", "学生对学习表现出非常积极的态度和高度的兴趣。教学按计划顺利进行。持续进行的形成性评估显示了学生在掌握规定学习标准方面的积极发展。", "今天的课成功达到了设定的目标。学生能够在小组和个别工作中都表现良好。他们在活动中展现出高度的纪律性，并仔细听教师的指示。所制作的作业质量也很好。", "教学目标令人满意地达成。学生在动手操作活动后能够很好地识别和理解所教的概念。将给予巩固练习以进一步加强学生对今天所学主题的理解。", "学生喜欢今天提供的活动。他们能够在有趣和无压力的氛围中学习。教学顺利进行，学生积极参与。他们在讨论环节不害羞地提问和发表意见。", "教学按计划进行。学生很好地掌握了所教的技能。课程结束时的学生反思显示他们理解了所传达的课程内容，并能将其与先前的知识联系起来。", "教学目标很好地达成。学生正确回答了提出的问题，特别是理解题和应用题。根据学生的需要进行了充实和补救活动，以确保每个学生都能从课程中获得最大收益。", "大多数学生在学习上显示出积极的发展。然而，少数学生在写作和阅读技能方面仍然需要额外指导。下次课将更注重为仍然薄弱的学生进行补救活动。", "今天的课非常令人鼓舞。学生出色地掌握了学习目标，没有任何问题。整节课进行的各种互动活动成功帮助了学生的学习过程，并使学习体验更有意义和愉快。"]};
const REM = [{"t": "🧑‍🏫 Bimbingan Individu Berstruktur", "d": "Guru memberi bimbingan secara one-to-one kepada murid yang belum menguasai kemahiran. Gunakan pendekatan langkah-demi-langkah dengan soalan bimbingan. Minta murid mengulang semula langkah yang telah dipelajari. Beri pujian dan pengukuhan positif untuk setiap kejayaan kecil. Ulang sehingga murid benar-benar faham.", "st": ["Bimbingan individu", "Soalan lisan", "Pengulangan", "Pengukuhan positif"]}, {"t": "📝 Latihan Berstruktur Langkah-demi-Langkah", "d": "Sediakan lembaran kerja yang dipermudah dengan arahan yang jelas dan contoh jawapan. Bahagikan tugasan kepada langkah-langkah kecil yang mudah diikuti. Murid menyelesaikan satu langkah pada satu masa. Beri bimbingan pada setiap langkah sebelum beralih ke langkah seterusnya.", "st": ["Latihan berpandu", "Contoh", "Struktur", "Langkah"]}, {"t": "👀 Tunjuk Cara Ulangan", "d": "Guru mendemonstrasi semula kemahiran dengan penerangan yang lebih perlahan dan jelas. Gunakan bahan bantu visual semasa demonstrasi. Minta murid meniru dan mengulang selepas guru. Ulang beberapa kali sehingga murid dapat melakukannya secara berdikari.", "st": ["Demonstrasi", "Pengulangan", "Visual", "Tiru"]}, {"t": "📊 Bahan Bantu Visual", "d": "Gunakan gambar rajah, carta, peta konsep, infografik dan video untuk menjelaskan konsep secara visual. Minta murid melukis atau mewarna gambar rajah sendiri. Kaitkan konsep abstrak dengan contoh konkrit yang boleh dilihat dan disentuh oleh murid.", "st": ["Visual", "Peta konsep", "Infografik", "Konkrit"]}, {"t": "✏️ Latihan Pengukuhan Bertulis", "d": "Sediakan latihan tambahan yang lebih mudah untuk membina keyakinan murid. Mulakan dengan soalan aras rendah sebelum beralih ke aras sederhana. Beri contoh jawapan sebelum murid memulakan latihan. Periksa dan betulkan jawapan murid serta beri maklum balas segera.", "st": ["Latihan", "Pengukuhan", "Keyakinan", "Maklum balas"]}, {"t": "🤝 Pembelajaran Berpasangan (Peer Tutoring)", "d": "Pasangkan murid cemerlang dengan murid pemulihan. Murid cemerlang membimbing rakan dalam menyelesaikan tugasan. Guru memantau dan memberi bantuan jika perlu. Aktiviti ini bukan sahaja membantu murid pemulihan malah mengukuhkan kefahaman murid cemerlang.", "st": ["Bimbingan rakan", "Kolaboratif", "Sosial", "Peer tutoring"]}, {"t": "🎲 Permainan Pendidikan", "d": "Gunakan permainan papan, kad imbas atau permainan digital untuk mengukuhkan kemahiran secara menyeronokkan. Contoh: domino perkataan, bingo matematik, atau kuiz interaktif. Permainan meningkatkan motivasi dan mengurangkan tekanan pembelajaran.", "st": ["Permainan", "Motivasi", "Interaktif", "Seronok"]}, {"t": "🃏 Kad Imbasan (Flashcards)", "d": "Gunakan kad imbasan berwarna dengan gambar dan perkataan. Guru menunjukkan kad, murid menyebut perkataan. Ulang secara konsisten sehingga murid dapat mengingat. Boleh dijadikan permainan siapa cepat dia dapat untuk meningkatkan semangat.", "st": ["Kad imbasan", "Pengulangan", "Visual", "Permainan"]}, {"t": "🎵 Nyanyian dan Gerakan", "d": "Gunakan lagu, irama dan gerakan badan untuk mengukuhkan konsep. Sesuai untuk murid kinestetik. Cipta lirik mudah berdasarkan topik pembelajaran. Murid menyanyi sambil membuat gerakan. Aktiviti ini meningkatkan ingatan jangka panjang.", "st": ["Muzik", "Gerakan", "Kinestetik", "Kreatif"]}, {"t": "🗺️ Peta Konsep Bergambar", "d": "Murid melengkapkan peta konsep bergambar yang mengandungi gambar dan kata kunci. Guru menyediakan peta konsep yang separa lengkap. Murid mengisi tempat kosong dengan perkataan atau gambar yang betul. Aktiviti ini membantu murid mengorganisasi maklumat.", "st": ["Visual", "Organisasi", "Kreatif", "Peta minda"]}, {"t": "📖 Bacaan Bergilir (Guided Reading)", "d": "Guru dan murid membaca bersama-sama. Guru berhenti pada perkataan sukar dan membimbing sebutan. Bincangkan maksud perkataan dalam konteks. Minta murid membaca semula ayat untuk meningkatkan kefahaman dan kefasihan.", "st": ["Bacaan berpandu", "Sebutan", "Kefahaman", "Fasih"]}, {"t": "🔤 Dialog Strip Sequencing", "d": "Potong dialog pendek menjadi jalur-jalur ayat. Murid menyusun dialog mengikut urutan yang betul. Baca dialog bersama selepas selesai menyusun. Aktiviti ini membantu murid memahami struktur ayat dan urutan perbualan.", "st": ["Susunan", "Urutan", "Bertutur", "Membaca"]}, {"t": "📄 Cloze Passage dengan Gambar", "d": "Sediakan teks cloze di mana perkataan yang hilang ditunjukkan sebagai gambar di atas ruang kosong. Murid menulis perkataan yang betul berdasarkan gambar. Aktiviti ini membantu murid memahami konteks dan meningkatkan kosa kata.", "st": ["Cloze", "Visual", "Kefahaman", "Kosa kata"]}, {"t": "🔍 Error Hunt (Cari Kesalahan)", "d": "Tunjukkan 3 ayat bergambar - 1 betul dan 2 dengan kesalahan ejaan/tatabahasa. Murid membulatkan kesalahan dan menulis jawapan betul. Bincangkan jenis kesalahan dan cara membetulkannya. Aktiviti ini meningkatkan kemahiran menyunting.", "st": ["Pengenalpastian", "Pembetulan", "Visual", "Analisis"]}, {"t": "📝 Mini Whiteboard Quick-Write", "d": "Guru menunjukkan gambar dan menyebut perkataan/ayat. Murid menulis pada papan putih mini masing-masing. Semua murid menunjukkan papan serentak. Guru memberi maklum balas segera. Aktiviti ini membolehkan guru menilai pemahaman semua murid dengan cepat.", "st": ["Penulisan", "Maklum balas", "Cepat", "Penilaian"]}, {"t": "🏃 Alphabet / Phonics Hopscotch", "d": "Lukis grid hopscotch dengan huruf atau suku kata di atas lantai. Murid melompat ke huruf dan menyebut bunyi atau perkataan yang bermula dengan huruf tersebut. Gandingkan dengan sebutan perkataan penuh. Aktiviti fizikal ini sesuai untuk murid kinestetik.", "st": ["Kinestetik", "Fonik", "Permainan", "Fizikal"]}, {"t": "📑 Word Family Sorting", "d": "Gunakan poket carta dengan kepala keluarga perkataan (-at, -an, -op, -it). Sediakan kad perkataan pelbagai keluarga. Murid menyusun kad ke dalam keluarga perkataan yang betul. Sebut perkataan selepas menyusun. Aktiviti ini mengukuhkan kemahiran membaca dan mengeja.", "st": ["Pengelasan", "Rakan sebaya", "Visual", "Fonik"]}, {"t": "📦 Realia Show & Tell", "d": "Bawa objek sebenar ke dalam kelas. Guru menyebut nama objek, murid mengulang. Minta murid mengambil objek yang betul apabila guru menyebut namanya. Kemudian murid menyebut sendiri nama objek sambil menunjukkannya. Aktiviti ini mengukuhkan perkaitan antara objek dan perkataan.", "st": ["Objek sebenar", "Visual", "Verbal", "Kinestetik"]}, {"t": "⚽ Question-Question Pass", "d": "Murid berdiri dalam bulatan. Guru memulakan dengan bertanya soalan mudah sambil memegang bola. Bola dihantar kepada murid yang menjawab soalan, kemudian murid tersebut bertanya soalan baru kepada rakan yang lain. Aktiviti ini melatih kemahiran bertutur dan mendengar.", "st": ["Bertutur", "Sosial", "Permainan", "Mendengar"]}, {"t": "🖼️ Talk-the-Picture Frame", "d": "Beri setiap pasangan satu gambar yang besar dan menarik. Murid bergilir-gilir menunjuk dan menyebut apa yang mereka lihat menggunakan rangka ayat yang diberi. Rakan pasangan membantu jika perlu. Aktiviti ini membina keyakinan bertutur.", "st": ["Visual", "Berpasangan", "Bertutur", "Keyakinan"]}, {"t": "✏️ Latihan Menulis Huruf/Perkataan", "d": "Gunakan buku latihan khas dengan titik panduan dan garis bantu. Murid menulis huruf atau perkataan dengan meniru titik-titik. Kurangkan panduan secara beransur-ansur sehingga murid boleh menulis tanpa panduan. Beri ganjaran untuk tulisan yang kemas.", "st": ["Penulisan", "Mekanis", "Latih tubi", "Psikomotor"]}, {"t": "🧮 Pengiraan Menggunakan Bahan Maujud", "d": "Gunakan blok, biji benih, straw atau benda konkrit lain untuk mengira, menambah dan menolak. Murid secara fizikal menggerakkan objek semasa mengira. Aktiviti ini membantu murid memahami konsep nombor secara konkrit sebelum beralih ke abstrak.", "st": ["Konkrit", "Maujud", "Matematik", "Kinestetik"]}, {"t": "📏 Garis Nombor", "d": "Lukis garis nombor yang besar di lantai atau atas meja. Murid melangkah atau menuding ke nombor yang betul semasa membuat pengiraan. Gunakan warna berbeza untuk nombor positif dan negatif. Aktiviti ini memudahkan kefahaman operasi tambah dan tolak.", "st": ["Visual", "Konkrit", "Operasi", "Matematik"]}, {"t": "🧠 Permainan Memori (Memory Game)", "d": "Kad gambar dan perkataan diletakkan terbalik. Murid membuka dua kad untuk mencari padanan gambar-perkataan. Sebut perkataan dengan kuat apabila mendapat padanan. Aktiviti ini mengukuhkan ingatan jangka pendek dan perkaitan gambar-perkataan.", "st": ["Memori", "Padanan", "Permainan", "Kognitif"]}, {"t": "📒 Buku Skrap Pemulihan", "d": "Murid mengumpul semua hasil kerja pemulihan dalam sebuah buku skrap khas. Setiap minggu, murid dan guru melihat perkembangan yang telah dicapai. Beri stiker bintang untuk setiap pencapaian. Aktiviti ini meningkatkan motivasi dan keyakinan diri murid.", "st": ["Dokumentasi", "Motivasi", "Kendiri", "Refleksi"]}, {"t": "✂️ Aktiviti Potong dan Tampal", "d": "Murid memotong gambar atau perkataan dari majalah atau lembaran kerja. Kemudian mereka menampal pada tempat yang betul dalam buku latihan. Aktiviti ini melatih kemahiran psikomotor halus sambil belajar mengelaskan maklumat.", "st": ["Psikomotor", "Pengelasan", "Kreatif", "Fokus"]}, {"t": "💬 Soalan Lisan Berbimbing", "d": "Guru mengemukakan soalan secara lisan dengan bimbingan rapat. Beri masa menunggu yang mencukupi untuk murid berfikir. Beri petunjuk jika murid tidak dapat menjawab. Aktiviti ini dijalankan tanpa tekanan untuk membina keyakinan murid.", "st": ["Lisan", "Bimbingan", "Keyakinan", "Sabar"]}, {"t": "💻 Pembelajaran Atas Talian", "d": "Gunakan platform seperti Quizizz, Google Forms, YouTube atau aplikasi pendidikan lain. Sediakan aktiviti interaktif yang menyeronokkan. Murid boleh mengakses di rumah atau di makmal komputer. Aktiviti ini meningkatkan literasi digital murid.", "st": ["Digital", "Interaktif", "Kendiri", "TMK"]}, {"t": "📓 Jurnal Pembelajaran", "d": "Murid menulis jurnal ringkas setiap hari tentang apa yang mereka pelajari dan apa yang masih sukar difahami. Guru membaca dan memberi komen. Aktiviti ini melatih murid mereflek pembelajaran sendiri dan mengenal pasti kelemahan.", "st": ["Refleksi", "Penulisan", "Kendiri", "Metakognisi"]}, {"t": "🎪 Stesen Pemulihan", "d": "Sediakan 3-4 stesen di dalam kelas dengan aktiviti pemulihan yang berbeza. Murid bergerak secara berkumpulan kecil dari satu stesen ke stesen lain. Setiap stesen mengambil masa 5-7 minit. Guru memantau dan membimbing di stesen yang memerlukan.", "st": ["Kumpulan kecil", "Bimbingan", "Stesen", "Pelbagai"]}, {"t": "🎯 Permainan Sasaran Kata", "d": "Lukis sasaran di papan tulis dengan titik markah. Murid membaling bola magnet atau melemparkan dart magnet ke sasaran. Mereka perlu menyebut perkataan berdasarkan tempat bola mendarat. Aktiviti ini menggabungkan pergerakan fizikal dengan pembelajaran.", "st": ["Permainan", "Sebutan", "Fizikal", "Motivasi"]}, {"t": "🧩 Puzzle Pendidikan", "d": "Gunakan puzzle gambar atau perkataan yang dipotong menjadi kepingan. Murid menyusun semula puzzle untuk membentuk gambar atau perkataan yang lengkap. Aktiviti ini mengukuhkan kemahiran membaca, mengeja dan mengenal pola.", "st": ["Puzzle", "Visual", "Kognitif", "Penyelesaian"]}, {"t": "🎤 Karaoke Pembelajaran", "d": "Murid menyanyikan lagu pembelajaran dengan lirik dipaparkan di skrin. Lirik mengandungi perkataan atau konsep yang sedang dipelajari. Murid menyanyi sambil membaca lirik. Aktiviti ini menyeronokkan dan mengukuhkan ingatan.", "st": ["Muzik", "Pengulangan", "Menyanyi", "Seronok"]}, {"t": "📋 Checklist Kendiri", "d": "Sediakan senarai semak mudah yang mengandungi kriteria yang perlu dikuasai. Murid menyemak sendiri tahap penguasaan mereka dengan menanda (✓) pada petak yang sesuai. Guru menyemak semula dan membincangkan hasilnya dengan murid.", "st": ["Kendiri", "Refleksi", "Penilaian", "Metakognisi"]}, {"t": "🎭 Main Peranan (Role Play)", "d": "Murid melakonkan situasi harian yang berkaitan dengan topik pembelajaran. Guru memberi skrip mudah atau murid boleh improvisasi. Bimbing murid dalam melafazkan dialog dengan sebutan dan intonasi yang betul. Aktiviti ini meningkatkan keyakinan.", "st": ["Lakonan", "Sosial", "Kreatif", "Bertutur"]}, {"t": "🔢 Kad Nombor Berwarna", "d": "Gunakan kad nombor berwarna untuk konsep matematik asas seperti nilai tempat, lebih besar/lebih kecil. Susun kad mengikut urutan. Bandingkan dua kad untuk menentukan nilai yang lebih besar. Aktiviti ini memudahkan kefahaman konsep matematik.", "st": ["Visual", "Matematik", "Warna", "Perbandingan"]}, {"t": "📖 Bacaan Bergambar Besar", "d": "Gunakan buku cerita bergambar besar dengan teks yang mudah dan font besar. Guru membaca sambil menunjuk pada setiap perkataan. Murid membaca bersama-sama. Bincangkan gambar untuk meningkatkan kefahaman.", "st": ["Bacaan", "Visual", "Bimbingan", "Kefahaman"]}, {"t": "🎲 Dadu Perkataan", "d": "Buat dadu besar dengan perkataan atau gambar pada setiap permukaan. Murid melambung dadu dan menyebut perkataan yang tertera pada permukaan atas. Boleh dijadikan permainan berkumpulan. Aktiviti ini menyeronokkan dan mengukuhkan kosa kata.", "st": ["Permainan", "Sebutan", "Interaktif", "Kosa kata"]}, {"t": "📝 Lembaran Kerja Imbuhan", "d": "Sediakan latihan khusus untuk imbuhan awalan (meN-, ber-, ter-) dan akhiran (-kan, -i). Gunakan gambar sebagai petunjuk. Murid melengkapkan ayat dengan imbuhan yang betul. Ulang latihan dengan pelbagai contoh ayat.", "st": ["Tatabahasa", "Latih tubi", "Struktur", "Ayat"]}, {"t": "🧑‍🤝‍🧑 Kumpulan Fokus", "d": "Kumpulkan 3-4 orang murid pemulihan dalam satu kumpulan kecil. Guru memberi bimbingan intensif secara kumpulan. Setiap murid diberi peluang untuk mencuba dan mendapat maklum balas. Aktiviti ini membolehkan guru memberi perhatian lebih.", "st": ["Kumpulan kecil", "Intensif", "Bimbingan", "Fokus"]}, {"t": "🎯 Papan Permainan Ejaan", "d": "Cipta papan permainan ejaan dengan petak-petak yang mengandungi huruf. Murid melambung dadu dan bergerak mengikut bilangan petak. Mereka perlu mengeja perkataan berdasarkan huruf yang didarat. Aktiviti ini menggabungkan permainan dengan pembelajaran ejaan.", "st": ["Ejaan", "Permainan", "Visual", "Menarik"]}, {"t": "📸 Aktiviti Fotografi", "d": "Murid mengambil gambar objek di sekitar sekolah atau rumah menggunakan tablet/telefon. Kemudian mereka melabel gambar tersebut dengan perkataan yang betul. Aktiviti ini mengaitkan pembelajaran dengan dunia sebenar dan meningkatkan kreativiti.", "st": ["Kreatif", "Visual", "Teknologi", "Dunia sebenar"]}, {"t": "🎬 Video Pendek", "d": "Murid menonton video pendek (2-3 minit) yang berkaitan dengan topik pembelajaran. Selepas menonton, murid menjawab soalan mudah secara lisan atau bertulis. Tonton semula bahagian yang sukar jika perlu.", "st": ["Visual", "Digital", "Kefahaman", "Sebutan"]}, {"t": "🧩 Teka Silang Kata", "d": "Sediakan silang kata mudah dengan gambar sebagai petunjuk. Murid mengisi ruangan kosong dengan perkataan yang betul. Aktiviti ini mengukuhkan ejaan dan kosa kata secara menyeronokkan. Boleh dijalankan secara individu atau berpasangan.", "st": ["Kosa kata", "Pengukuhan", "Puzzle", "Ejaan"]}, {"t": "📑 Kad Tugasan Harian", "d": "Sediakan kad tugasan harian dengan arahan yang jelas dan ringkas untuk murid pemulihan. Setiap kad mengandungi 2-3 tugasan mudah yang boleh diselesaikan dalam 10-15 minit. Tugasan bertambah aras secara beransur-ansur.", "st": ["Rutin", "Bimbingan", "Struktur", "Konsisten"]}, {"t": "🎤 Bacaan Berirama", "d": "Murid membaca teks pendek mengikut irama atau rap yang menarik. Guru menunjuk cara bacaan berirama. Murid mengulang dengan iringan muzik atau tepukan. Aktiviti ini meningkatkan kelancaran membaca dan keyakinan.", "st": ["Bacaan", "Irama", "Seronok", "Keyakinan"]}, {"t": "🎨 Mewarna Sambil Belajar", "d": "Sediakan lembaran mewarna yang mengandungi perkataan, huruf atau konsep yang perlu dipelajari. Murid mewarna sambil menyebut perkataan atau konsep tersebut. Aktiviti ini menggabungkan pembelajaran dengan aktiviti santai yang menenangkan.", "st": ["Mewarna", "Visual", "Santai", "Kreatif"]}, {"t": "📋 Buku Panduan Mini", "d": "Murid mencipta buku panduan mini tentang topik yang sukar difahami. Buku mengandungi definisi, gambar dan contoh. Gunakan kertas A4 yang dilipat menjadi buku kecil. Aktiviti ini membantu murid merujuk semula konsep yang telah dipelajari.", "st": ["Kreatif", "Dokumentasi", "Rujukan", "Organisasi"]}, {"t": "🤖 Pembelajaran Gamifikasi", "d": "Gunakan elemen permainan seperti lencana, mata ganjaran, tahap dan cabaran untuk meningkatkan motivasi murid pemulihan. Beri lencana untuk setiap pencapaian. Kumpul mata untuk dapatkan ganjaran. Aktiviti ini meningkatkan semangat untuk belajar.", "st": ["Gamifikasi", "Motivasi", "Digital", "Ganjaran"]}, {"t": "📞 Telefon Bual (Paper Cup Phone)", "d": "Buat telefon daripada cawan kertas dan benang. Murid bercakap melalui telefon untuk meningkatkan kemahiran lisan. Aktiviti ini menyeronokkan dan mengurangkan rasa malu untuk bercakap kerana tidak berhadapan langsung dengan rakan.", "st": ["Bertutur", "Mendengar", "Kreatif", "Seronok"]}];

  SUBJ_NAMES: {'BM':'📖 Bahasa Melayu','BC':'📝 Bahasa Cina','BI':'📗 English','MT':'🔢 Matematik','SN':'🔬 Sains','PM':'🌟 Moral','PI':'🕌 Islam','PJ':'🏃 Jasmani','PK':'💚 Kesihatan','PSV':'🎨 Seni Visual','MZ':'🎵 Muzik','SJ':'📜 Sejarah','RBT':'🛠️ RBT','PKS':'🎭 Kesenian','PJPK':'🏅 PJPK','PMZ':'🎶 Muzik'},
  REF: REF,
  REM: REM,

  sv(){localStorage.setItem('eptg',this.tg);localStorage.setItem('epcs',this.cs);localStorage.setItem('epcy',this.cy);localStorage.setItem('eprph',JSON.stringify(this.rph));localStorage.setItem('epwk',this.currentWeek);this.tabs[1].c=this.rph.length;},
  sw(id){this.a=id;this.sO=false;},
  tI(){const t=this.tabs.find(t=>t.id===this.a);return t?t.i:'';},
  tL(){const t=this.tabs.find(t=>t.id===this.a);return t?t.l:'';},

  sl(){return this.tg?(this.SLOTS[this.tg]||[]):[];},
  gS(d,p){return this.sl().filter(s=>s.d===d&&(s.p===p||(s.p==='P'&&p==='P')));},
  tN(){const t=this.TEACHERS[this.tg];return t?t.n+' ('+this.tg+')':'';},
  lg(s){const m={BM:'bm',BI:'en'};return m[s]||'zh';},

  editSlot(tg,day,period){
    if(this.gS(day,period)[0])return;
    const sj=prompt('Subject code (BM/BI/BC/MT/SN/PM/PJ/PK/PSV/MZ/SJ/RBT):','BM');if(!sj)return;
    const nm=this.SUBJ_NAMES[sj]||sj;
    const cl=prompt('Class:','Tahun 1');if(!cl)return;
    this.SLOTS[tg]=this.SLOTS[tg]||[];this.SLOTS[tg].push({c:cl,d:day,p:period,s:sj,n:nm});this.sv();
  },

  gSK(){return typeof getSK!=='undefined'?getSK(this.cy,this.cs):[];},
  gSP(){return typeof getSP!=='undefined'?getSP(this.cy,this.cs):[];},

  clr(c){const m={BM:'bg-red-50 border-red-200 text-red-800',BC:'bg-amber-50 border-amber-200 text-amber-800',BI:'bg-emerald-50 border-emerald-200 text-emerald-800',MT:'bg-blue-50 border-blue-200 text-blue-800',SN:'bg-teal-50 border-teal-200 text-teal-800',PM:'bg-purple-50 border-purple-200 text-purple-800',PI:'bg-green-50 border-green-200 text-green-800',PJ:'bg-orange-50 border-orange-200 text-orange-800',PK:'bg-rose-50 border-rose-200 text-rose-800',PSV:'bg-yellow-50 border-yellow-200 text-yellow-800',MZ:'bg-indigo-50 border-indigo-200 text-indigo-800',SJ:'bg-cyan-50 border-cyan-200 text-cyan-800',RBT:'bg-violet-50 border-violet-200 text-violet-800'};return m[c]||'bg-slate-50 border-slate-200 text-slate-700';},

  gen(){
    if(!this.tg)return;
    const wk=this.currentWeek;const wkData=wk?TAKWIM.find(w=>w.m==wk):null;
    const plans=[];
    this.sl().forEach(s=>{
      const du=30;const per=this.PERIODS.find(x=>x[0]===s.p);const tm=per?per[1]+'-'+per[2]:'';
      const rem=REM.sort(()=>Math.random()-0.5).slice(0,3);
      let dateStr=s.d;
      if(wkData&&wkData.s){const dm={Isnin:1,Selasa:2,Rabu:3,Khamis:4,Jumaat:5};const dn=dm[s.d]||1;const[sd,sm,sy]=wkData.s.split('/').map(Number);const ws=new Date(sy,sm-1,sd);const sd2=new Date(ws);sd2.setDate(ws.getDate()+dn-1);dateStr=String(sd2.getDate()).padStart(2,'0')+'/'+String(sd2.getMonth()+1).padStart(2,'0')+'/'+sd2.getFullYear();}
      const phases=['🎯 Set Induksi','📚 Pra-PdP','📖 Perkembangan PdP','💡 Pasca-PdP','🎯 Penutup'];
      const duDef=[8,7,22,5,5];const tr=['👩‍🏫 Membimbing','👨‍🏫 Menerangkan','👩‍🏫 Memudahcara','👨‍🏫 Menilai','👩‍🏫 Merumus'];
      const sr=['🙋 Melibatkan diri','👂 Mendengar','✍️ Melaksanakan','🗣️ Membentang','💭 Mereflek'];
      const acts=this.D?.ACTS?.bm||{induction:[],pre:[],dev:[],post:[],closure:[]};
      const pk=['induction','pre','dev','post','closure'];
      plans.push({
        id:Date.now().toString(36)+Math.random().toString(36).slice(2),
        c:s.c,s:s.s,sn:s.n,d:dateStr,per:s.p,tm,dr:du,_wk:wk||'-',
        unit:s.n+' '+s.c,
        sk:['Standard Kandungan mengikut DSKP'],sp:['Standard Pembelajaran mengikut DSKP'],
        obj:['🎯 Pada akhir PdP, murid dapat memahami dan mengaplikasikan konsep.','✅ Murid dapat menjawab soalan dan menunjukkan kefahaman.'],
        kj:['✅ Saya boleh memahami konsep.','✅ Saya boleh menyelesaikan tugasan.'],
        bbm:['📖 Buku teks','📝 Lembaran kerja'],nilai:['🤝 Kerjasama','🙏 Hormat'],emk:['🗣️ Bahasa','🎨 Kreativiti'],
        acts:phases.map((ph,i)=>({ph,d:'Aktiviti '+ph,dr:duDef[i],t:tr[i]||'',s:sr[i]||''})),
        rem:rem.map(r=>({t:r.t,d:r.d,st:r.st||[]})),
        ref:'',o:true,
      });
    });
    this.rph=[...plans,...this.rph];this.a='rph';this.sv();
  },

  ref1(p){const l=this.lg(p.s);const refs=REF[l]||REF['bm']||[];if(refs.length)p.ref=refs[Math.floor(Math.random()*refs.length)];},
  iRef(){this.rph.forEach(p=>{if(!p.ref)this.ref1(p);});this.sv();},

  esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;},

  ht(p){const e=this.esc;
    return '<div style="font-family:sans-serif;max-width:210mm;margin:0;padding:1.5cm;color:#3A2A1A">'
      +'<div style="border-bottom:3px solid #C4956A;padding-bottom:.75rem;margin-bottom:1rem">'
      +'<h1 style="font-size:1.3rem;font-weight:700;margin:0;color:#1E3A5F">🇲🇾 RANCANGAN PENGAJARAN HARIAN</h1>'
      +'<div style="font-size:.8rem;color:#8B5A2B;margin-top:.25rem">'+e(p.sn)+' | '+e(p.c)+' | '+e(p.d)+' | '+e(p.tm)+'</div></div>'
      +(p.sk.length?'<div><h2 style="font-size:.8rem;font-weight:700;color:#1E3A5F;margin:.5rem 0 .3rem">📋 Standard Kandungan</h2>'+p.sk.map(s=>'<span style="background:#FFF8F0;border-radius:999px;padding:2px 8px;font-size:.7rem;color:#3A2A1A;display:inline-block;margin:2px;border:1px solid #C4956A30">'+e(s)+'</span>').join('')+'</div>':'')
      +(p.sp.length?'<div><h2 style="font-size:.8rem;font-weight:700;color:#1E3A5F;margin:.5rem 0 .3rem">🎯 Standard Pembelajaran</h2>'+p.sp.map(s=>'<span style="background:#FFF8F0;border-radius:999px;padding:2px 8px;font-size:.7rem;color:#3A2A1A;display:inline-block;margin:2px;border:1px solid #C4956A30">'+e(s)+'</span>').join('')+'</div>':'')
      +'<div><h2 style="font-size:.8rem;font-weight:700;color:#1E3A5F;margin:.5rem 0 .3rem">🎯 Objektif</h2><ul style="list-style:none;padding:0">'+p.obj.map(o=>'<li style="padding:2px 0;font-size:.75rem;padding-left:1rem">'+e(o)+'</li>').join('')+'</ul></div>'
      +'<div><h2 style="font-size:.8rem;font-weight:700;color:#1E3A5F;margin:.5rem 0 .3rem">📝 Aktiviti</h2>'+p.acts.map(a=>'<div style="border:1px solid #C4956A30;border-radius:6px;padding:6px;margin-bottom:5px"><p style="font-size:.75rem;font-weight:600;color:#8B5A2B;margin:0">'+e(a.ph)+' <span style="font-size:.65rem;color:#C4956A">- '+a.dr+' min</span></p></div>').join('')+'</div>'
      +'<div style="display:flex;gap:.5rem;flex-wrap:wrap;font-size:.7rem;color:#3A2A1A;margin:.5rem 0"><div><strong>BBM:</strong> '+p.bbm.join(', ')+'</div><div><strong>Nilai:</strong> '+p.nilai.join(', ')+'</div><div><strong>EMK:</strong> '+p.emk.join(', ')+'</div></div>'
      +(p.ref?'<div style="border-top:2px solid #C4956A30;padding-top:.4rem;margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#d97706">💬 Refleksi</h2><p style="font-size:.7rem;color:#78350f;font-style:italic;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:6px">'+e(p.ref)+'</p></div>':'')
      +'<div style="margin-top:.5rem;padding-top:.3rem;border-top:1px solid #C4956A20;font-size:.6rem;color:#C4956A;text-align:center">🇲🇾 Dijana oleh eRPH-PM | SJK(C) PIN MIN, BIDOR STESEN, PERAK</div></div>';
  },

  pdf1(p){
    if(typeof html2pdf!=='undefined'){
      const el=document.createElement('div');el.innerHTML=this.ht(p);
      html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:'RPH_'+p.s+'_'+p.c.replace(' ','')+'_'+p.d+'.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}}).from(el).save();
    }else{const w=window.open('','_blank');if(!w)return;w.document.write('<html><head><title>RPH</title></head><body>'+this.ht(p)+'<script>window.print()<'+'/script></body></html>');w.document.close();}
  },
  pAll(){
    if(!this.rph.length)return;
    const ps=this.rph.map((p,i)=>'<div style="'+(i<this.rph.length-1?'page-break-after:always;':'')+'page-break-inside:avoid">'+this.ht(p)+'</div>').join('');
    if(typeof html2pdf!=='undefined'){
      const el=document.createElement('div');el.innerHTML=ps;
      html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:'eRPH_PM_All.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}}).from(el).save();
    }else{const w=window.open('','_blank');if(!w)return;w.document.write('<html><head><title>RPH All</title></head><body>'+ps+'<script>window.print()<'+'/script></body></html>');w.document.close();}
  },

  cp(p){
    const l=['🇲🇾 RANCANGAN PENGAJARAN HARIAN','Guru: '+this.tN(),'Kelas: '+p.c+' | Subjek: '+p.sn,'Hari: '+p.d+' | Masa: '+p.tm,'','📋 Standard Kandungan:',...p.sk.map(s=>'  - '+s),'','🎯 Standard Pembelajaran:',...p.sp.map(s=>'  - '+s),'','🎯 Objektif:',...p.obj.map(o=>'  - '+o),'','📝 Aktiviti:',...p.acts.map(a=>'  ['+a.ph+'] '+a.d+' ('+a.dr+' min)'),'','BBM: '+p.bbm.join(', '),'Nilai: '+p.nilai.join(', '),'EMK: '+p.emk.join(', '),p.ref?'\n💬 Refleksi:\n'+p.ref:'','','🇲🇾 Dijana oleh eRPH-PM'];
    navigator.clipboard.writeText(l.join('\n'));
  },

  get D(){return this;},
  init(){
    this.$watch('rph',()=>{this.sv();this.tabs[1].c=this.rph.length;},{deep:true});
    // Load saved slots
    try{const d=JSON.parse(localStorage.getItem('erphp_slots'));if(d)this.SLOTS=d;}catch(e){}
    this.$watch('SLOTS',v=>localStorage.setItem('erphp_slots',JSON.stringify(v)),{deep:true});
    this.sv();
  },
}));});
</script>
