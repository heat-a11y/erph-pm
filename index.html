<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>eRPH-PM — Jana RPH from Jadual Waktu</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="curriculum-data.js"></script>
<script src="timetable-data.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
<div x-data="app()" class="flex h-screen">
  <template x-teleport="body"><div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 z-30 bg-slate-900/40 backdrop-blur-sm md:hidden"></div></template>
  <aside class="sidebar-transition fixed inset-y-0 left-0 z-40 flex w-64 flex-col bg-slate-900 text-slate-100 md:static" x-bind:class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">
    <div class="flex h-16 items-center gap-2.5 border-b border-slate-700/50 px-5">
      <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-500 text-sm">&#x1F4D6;</span>
      <div><p class="text-sm font-semibold leading-tight">eRPH-PM</p><p class="text-[10px] leading-tight text-slate-400">Jana RPH from Jadual Waktu</p></div>
    </div>
    <nav class="flex-1 space-y-1 overflow-y-auto p-3">
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="switchTab(tab.id)" class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
          x-bind:class="activeTab === tab.id ? 'bg-indigo-500/20 text-indigo-300' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'">
          <span x-text="tab.icon"></span>
          <span x-text="tab.label"></span>
        </button>
      </template>
    </nav>
    <div class="border-t border-slate-700/50 p-4 text-center text-[10px] text-slate-500">SJK(C) PIN MIN, BIDOR STESEN, PERAK</div>
  </aside>
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-16 items-center gap-3 border-b bg-white px-4 md:px-6 lg:px-8">
      <button @click="sidebarOpen = !sidebarOpen" class="-ml-1 rounded-lg p-1.5 text-slate-500 hover:bg-slate-100 md:hidden">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
      </button>
      <div class="flex items-center gap-2 text-sm font-medium text-slate-500">
        <span x-text="tabs.find(t => t.id === activeTab)?.icon"></span>
        <span x-text="tabs.find(t => t.id === activeTab)?.label"></span>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <select x-model="selectedTeacher" @change="onTeacherChange" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 shadow-sm focus:border-indigo-400 focus:outline-none">
          <option value="">-- Pilih Guru --</option>
          <template x-for="(info, code) in TEACHERS" :key="code">
            <option x-bind:value="code" x-text="info.name + ' (' + code + ') ' + info.name_cn"></option>
          </template>
        </select>
        <select x-model="selectedPenggal" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 shadow-sm focus:border-indigo-400 focus:outline-none">
          <option value="1">Penggal 1 (12 Jan 2026)</option>
          <option value="2">Penggal 2 (30 Mac 2026)</option>
        </select>
        <span class="text-xs text-slate-400" x-text="`${lessonPlans.length} RPH`"></span>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
      <!-- ═══ TIMETABLE TAB ═══ -->
      <section x-show="activeTab === 'timetable'" x-cloak class="fade-in mx-auto max-w-6xl">
        <div class="mb-4">
          <h1 class="text-xl font-bold text-slate-900" x-text="selectedTeacherName ? 'Jadual Waktu: ' + selectedTeacherName : 'Pilih Guru'"></h1>
          <p class="mt-1 text-sm text-slate-500" x-text="selectedTeacher ? teacherSlotCount + ' slots across ' + teacherClasses + ' classes' : 'Select a teacher and penggal above.'"></p>
        </div>
        <div x-show="!selectedTeacher" class="flex flex-col items-center justify-center rounded-xl border-2 border-dashed py-16 text-center text-slate-400">
          <span class="text-3xl mb-3">&#x1F468;&#x200D;&#x1F3EB;</span>
          <p class="text-sm font-medium">Pilih guru untuk lihat jadual</p>
        </div>
        <div x-show="selectedTeacher" class="overflow-x-auto rounded-xl border bg-white shadow-sm">
          <table class="w-full min-w-[800px] text-xs">
            <thead>
              <tr class="border-b bg-slate-100">
                <th class="px-2 py-2 text-left font-semibold text-slate-500 w-20">Masa</th>
                <template x-for="d in DAYS" :key="d">
                  <th class="px-2 py-2 text-center font-semibold text-slate-500" x-text="d"></th>
                </template>
              </tr>
            </thead>
            <tbody>
              <template x-for="per in PERIODS" :key="per[0]">
                <tr class="border-b last:border-0" x-bind:class="per[0] === 'REHAT' ? 'bg-amber-50' : ''">
                  <td class="px-2 py-1.5 text-[10px] font-medium text-slate-400 whitespace-nowrap" x-text="per[0] + ' ' + per[1] + '-' + per[2]"></td>
                  <template x-for="d in DAYS" :key="d">
                    <td class="px-1 py-1 text-center border-l">
                      <template x-for="slot in getSlotsFor(d, per[0])" :key="slot.class + slot.subject">
                        <div class="rounded border px-1 py-0.5 text-[10px] leading-tight mb-0.5"
                          x-bind:class="slotClass(slot.subject)">
                          <div class="font-semibold" x-text="slot.subjectName"></div>
                          <div class="text-[9px] opacity-70" x-text="slot.class.replace('Tahun ','Y')"></div>
                        </div>
                      </template>
                    </td>
                  </template>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div x-show="selectedTeacher" class="mt-4 flex gap-2">
          <button @click="generateWeekRPH()" class="inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-md hover:bg-indigo-700">
            <span>&#x26A1;</span> Jana RPH Minggu Ini
          </button>
        </div>
      </section>

      <!-- ═══ GENERATE RPH TAB ═══ -->
      <section x-show="activeTab === 'generate'" x-cloak class="fade-in mx-auto max-w-5xl">
        <div class="mb-6">
          <h1 class="text-xl font-bold text-slate-900">Generated RPH</h1>
          <p class="mt-1 text-sm text-slate-500" x-text="selectedTeacherName ? selectedTeacherName + ' · ' + lessonPlans.length + ' RPH' : 'Select a teacher first.'"></p>
        </div>
        <div class="mb-4 flex flex-wrap items-center gap-2">
          <button @click="generateWeekRPH()" class="inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-4 py-2 text-xs font-semibold text-white shadow-md hover:bg-indigo-700">
            <span>&#x26A1;</span> Jana RPH
          </button>
          <button @click="exportAllPDF()" x-show="lessonPlans.length" class="inline-flex items-center gap-1.5 rounded-lg border bg-white px-3 py-2 text-xs font-medium text-slate-600 shadow-sm hover:bg-slate-50">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg> Export All PDF
          </button>
          <button @click="lessonPlans = []" x-show="lessonPlans.length" class="rounded-lg px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50">Clear</button>
        </div>
        <div x-show="!lessonPlans.length" class="flex flex-col items-center justify-center rounded-xl border-2 border-dashed py-16 text-center text-slate-400">
          <span class="text-3xl mb-3">&#x1F4CB;</span>
          <p class="text-sm font-medium">No RPH yet</p>
          <p class="mt-1 text-xs">Go to Timetable tab and click <strong>Jana RPH Minggu Ini</strong>.</p>
        </div>
        <div x-show="lessonPlans.length" class="space-y-4">
          <template x-for="plan in lessonPlans" :key="plan.id">
            <div class="rounded-xl border bg-white shadow-sm">
              <div @click="plan._open = !plan._open" class="flex cursor-pointer items-center justify-between border-b px-4 sm:px-5 py-3">
                <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                  <span class="shrink-0 text-slate-400" x-text="plan._open ? '▾' : '▸'"></span>
                  <div class="min-w-0">
                    <p class="truncate text-sm font-semibold text-slate-900" x-text="plan.subjectName + ' — ' + plan.class"></p>
                    <p class="text-xs text-slate-500 truncate">
                      <span x-text="plan.day"></span>
                      <span x-text="' · P' + plan.period + ' (' + plan.time + ')'"></span>
                      <span x-text="' · ' + plan.duration + ' min'"></span>
                    </p>
                  </div>
                </div>
                <button @click.stop="deletePlan(plan.id)" class="rounded-lg p-1 text-slate-400 hover:bg-red-50 hover:text-red-500">
                  <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
                </button>
              </div>
              <div x-show="plan._open" x-collapse class="px-5 py-4 space-y-4 text-sm">
                <div class="rounded-lg border bg-indigo-50 p-3">
                  <p class="mb-1 text-xs font-semibold text-indigo-700">&#x1F4DA; Curriculum Unit</p>
                  <p class="text-sm text-indigo-900" x-text="plan.unitTitle || 'Auto-selected based on RPT'"></p>
                </div>
                <div x-show="plan.contentStandards?.length">
                  <h4 class="mb-1 text-xs font-semibold uppercase tracking-wider text-slate-500">Standard Kandungan</h4>
                  <div class="space-y-1"><template x-for="cs in plan.contentStandards" :key="cs"><p class="text-slate-600 text-xs" x-text="cs"></p></template></div>
                </div>
                <div x-show="plan.learningStandards?.length">
                  <h4 class="mb-1 text-xs font-semibold uppercase tracking-wider text-slate-500">Standard Pembelajaran</h4>
                  <div class="space-y-1"><template x-for="ls in plan.learningStandards" :key="ls"><p class="text-slate-600 text-xs" x-text="ls"></p></template></div>
                </div>
                <div>
                  <h4 class="mb-1 text-xs font-semibold uppercase tracking-wider text-indigo-600">Objektif Pembelajaran</h4>
                  <ul class="space-y-1"><template x-for="(obj, i) in plan.learningObjectives" :key="i">
                    <li class="flex items-start gap-2 text-slate-600"><span class="mt-1 block h-1.5 w-1.5 shrink-0 rounded-full bg-indigo-400"></span><span x-text="obj"></span></li>
                  </template></ul>
                </div>
                <div>
                  <h4 class="mb-1 text-xs font-semibold uppercase tracking-wider text-indigo-600">Aktiviti PdP</h4>
                  <div class="space-y-2">
                    <template x-for="(act, i) in plan.activities" :key="act.id">
                      <div class="relative flex gap-3">
                        <div x-show="i < plan.activities.length - 1" class="absolute left-[15px] top-8 h-full w-px bg-slate-200"></div>
                        <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-xs font-bold"
                          x-bind:class="{'bg-amber-100 text-amber-700': act.phase==='Set Induction','bg-blue-100 text-blue-700': act.phase==='Pre-lesson','bg-green-100 text-green-700': act.phase==='Lesson Development','bg-purple-100 text-purple-700': act.phase==='Post-lesson','bg-rose-100 text-rose-700': act.phase==='Closure'}"
                          x-text="act.phase[0]"></div>
                        <div class="flex-1 rounded-lg border bg-slate-50 p-3">
                          <div class="mb-1 flex items-center justify-between gap-2">
                            <span class="text-sm font-medium text-slate-800" x-text="act.phase"></span>
                            <span class="shrink-0 text-xs text-slate-400" x-text="act.duration + ' min'"></span>
                          </div>
                          <p class="text-xs text-slate-600" x-text="act.description"></p>
                          <div class="mt-2 grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs text-slate-500">
                            <div><span class="font-medium text-slate-700">Guru:</span> <span x-text="act.teacherRole"></span></div>
                            <div><span class="font-medium text-slate-700">Murid:</span> <span x-text="act.studentRole"></span></div>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
                <div class="grid grid-cols-1 gap-3 sm:grid-cols-3">
                  <div class="rounded-lg border bg-slate-50 p-3">
                    <p class="mb-1 text-[10px] font-semibold uppercase tracking-wider text-slate-500">&#x1F6E0;&#xFE0F; Bahan Bantu</p>
                    <div class="flex flex-wrap gap-1"><template x-for="aid in plan.teachingAids" :key="aid"><span class="rounded-md border bg-white px-2 py-0.5 text-[11px] text-slate-600" x-text="aid"></span></template></div>
                  </div>
                  <div class="rounded-lg border bg-slate-50 p-3">
                    <p class="mb-1 text-[10px] font-semibold uppercase tracking-wider text-slate-500">&#x2764;&#xFE0F; Nilai Murni</p>
                    <div class="flex flex-wrap gap-1"><template x-for="v in plan.moralValues" :key="v"><span class="rounded-md border bg-white px-2 py-0.5 text-[11px] text-slate-600" x-text="v"></span></template></div>
                  </div>
                  <div class="rounded-lg border bg-slate-50 p-3">
                    <p class="mb-1 text-[10px] font-semibold uppercase tracking-wider text-slate-500">&#x1F310; EMK</p>
                    <div class="flex flex-wrap gap-1"><template x-for="c in plan.cce" :key="c"><span class="rounded-md border bg-white px-2 py-0.5 text-[11px] text-slate-600" x-text="c"></span></template></div>
                  </div>
                </div>
                <div>
                  <h4 class="mb-1 text-xs font-semibold uppercase tracking-wider text-slate-500">&#x1F4DD; Refleksi</h4>
                  <textarea x-model="plan.reflection" placeholder="Refleksi guru..." class="w-full rounded-lg border border-slate-300 bg-white p-3 text-xs text-slate-700 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100" rows="2"></textarea>
                </div>
                <div class="flex flex-wrap gap-2 border-t pt-4">
                  <button @click.stop="copyPlan(plan)" class="inline-flex items-center gap-1.5 rounded-lg border bg-white px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-50">
                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184"/></svg> Salin
                  </button>
                  <button @click.stop="downloadPlanPDF(plan)" class="inline-flex items-center gap-1.5 rounded-lg border bg-white px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-50">
                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg> PDF
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('app', () => ({
    sidebarOpen: false,
    activeTab: localStorage.getItem('erphp_tab') || 'timetable',
    selectedTeacher: localStorage.getItem('erphp_teacher') || '',
    selectedPenggal: parseInt(localStorage.getItem('erphp_penggal') || '1'),
    lessonPlans: [],

    tabs: [
      { id: 'timetable', label: 'Jadual Waktu', icon: '&#x1F4C5;' },
      { id: 'generate',  label: 'Jana RPH', icon: '&#x1F4CB;' },
    ],

    get TEACHERS() { return TEACHERS; },
    get PERIODS() { return PERIODS; },
    get DAYS() { return DAYS; },
    get CLASSES() { return CLASSES; },

    get selectedTeacherName() {
      const t = TEACHERS[this.selectedTeacher];
      return t ? t.name + ' (' + this.selectedTeacher + ')' : '';
    },

    get teacherSlots() {
      if (!this.selectedTeacher) return [];
      return getTeacherSlots(this.selectedTeacher, this.selectedPenggal);
    },

    get teacherSlotCount() { return this.teacherSlots.length; },
    get teacherClasses() {
      const classes = new Set(this.teacherSlots.map(s => s.class));
      return [...classes].join(', ');
    },

    getSlotsFor(day, period) {
      return this.teacherSlots.filter(s => s.day === day && (s.period === period || (s.period === 'P' && period === 'P')));
    },

    slotClass(code) {
      const colors = {
        'BM': 'bg-red-50 border-red-200 text-red-800', 'BC': 'bg-amber-50 border-amber-200 text-amber-800',
        'BI': 'bg-emerald-50 border-emerald-200 text-emerald-800', 'MT': 'bg-blue-50 border-blue-200 text-blue-800',
        'SN': 'bg-teal-50 border-teal-200 text-teal-800', 'PM': 'bg-purple-50 border-purple-200 text-purple-800',
        'PI': 'bg-green-50 border-green-200 text-green-800', 'PJ': 'bg-orange-50 border-orange-200 text-orange-800',
        'PK': 'bg-rose-50 border-rose-200 text-rose-800', 'PSV': 'bg-yellow-50 border-yellow-200 text-yellow-800',
        'MZ': 'bg-indigo-50 border-indigo-200 text-indigo-800', 'SJ': 'bg-cyan-50 border-cyan-200 text-cyan-800',
        'RBT': 'bg-violet-50 border-violet-200 text-violet-800',
      };
      return colors[code] || 'bg-slate-50 border-slate-200 text-slate-700';
    },

    getUnitsFor(className, subjectCode) {
      const y = className.replace('Tahun ', 'Year ');
      const key = `${y}|${subjectCode}`;
      return (CURRICULUM_DATA[key] || {}).units || [];
    },

    getTimeForPeriod(period) {
      const p = PERIODS.find(x => x[0] === period);
      return p ? p[1] + '-' + p[2] : '';
    },

    getDuration(period) {
      const p = PERIODS.find(x => x[0] === period);
      if (!p) return 30;
      const [sh, sm] = p[1].split(':').map(Number);
      const [eh, em] = p[2].split(':').map(Number);
      return (eh * 60 + em) - (sh * 60 + sm);
    },

    generateId() { return crypto.randomUUID?.() ?? Date.now().toString(36) + Math.random().toString(36).slice(2); },

    generateWeekRPH() {
      if (!this.selectedTeacher) { alert('Pilih guru terlebih dahulu.'); return; }
      const plans = [];
      this.teacherSlots.forEach(slot => {
        const units = this.getUnitsFor(slot.class, slot.subject);
        const unit = units.length ? units[Math.floor(Math.random() * units.length)] : null;
        const duration = this.getDuration(slot.period);
        const time = this.getTimeForPeriod(slot.period);

        plans.push({
          id: this.generateId(),
          class: slot.class,
          subject: slot.subject,
          subjectName: slot.subjectName,
          day: slot.day,
          period: slot.period,
          time,
          duration,
          yearGroup: slot.class.replace('Tahun ', 'Year '),
          unitTitle: unit ? unit.title : 'RPT Unit',
          contentStandards: unit && unit.sk ? [unit.sk] : ['Standard Kandungan mengikut DSKP'],
          learningStandards: unit && unit.sp ? [unit.sp] : ['Standard Pembelajaran mengikut DSKP'],
          learningObjectives: [
            `Pada akhir PdP, murid dapat memahami dan mengaplikasikan konsep dalam topik ini.`,
            `Murid dapat menjawab soalan dan menunjukkan kefahaman dengan bimbingan.`,
          ],
          teachingAids: ['Buku teks', 'Lembaran kerja', 'Alat tulis', 'Bahan bantu mengajar'],
          moralValues: ['Kerjasama', 'Hormat-menghormati', 'Tanggungjawab'],
          cce: ['Bahasa', 'Kreativiti dan Inovasi', 'Nilai Murni'],
          activities: [
            { id: this.generateId(), phase: 'Set Induction', description: `Set induksi berkaitan ${unit ? unit.title : 'topik'}.`, duration: Math.max(5, Math.floor(duration * 0.15)), teacherRole: 'Membimbing', studentRole: 'Melibatkan diri' },
            { id: this.generateId(), phase: 'Pre-lesson', description: 'Memperkenalkan konsep dan kosa kata utama.', duration: Math.max(5, Math.floor(duration * 0.15)), teacherRole: 'Menerangkan', studentRole: 'Mendengar dan menyoal' },
            { id: this.generateId(), phase: 'Lesson Development', description: 'Aktiviti PdP utama. Murid melaksanakan tugasan.', duration: Math.max(15, Math.floor(duration * 0.5)), teacherRole: 'Memudahcara', studentRole: 'Melaksanakan tugasan' },
            { id: this.generateId(), phase: 'Post-lesson', description: 'Murid membentang hasil kerja dan memberi maklum balas.', duration: Math.max(5, Math.floor(duration * 0.1)), teacherRole: 'Menilai', studentRole: 'Membentang' },
            { id: this.generateId(), phase: 'Closure', description: 'Rumusan dan refleksi.', duration: Math.max(3, Math.floor(duration * 0.1)), teacherRole: 'Merumus', studentRole: 'Mereflek' },
          ],
          reflection: '',
          _open: true,
        });
      });
      this.lessonPlans = [...plans, ...this.lessonPlans];
      this.activeTab = 'generate';
    },

    deletePlan(id) { this.lessonPlans = this.lessonPlans.filter(p => p.id !== id); },

    copyPlan(plan) {
      const lines = [
        `RANCANGAN PENGAJARAN HARIAN`,
        `Guru: ${this.selectedTeacherName}`,
        `Kelas: ${plan.class}  |  Subjek: ${plan.subjectName}`,
        `Hari: ${plan.day}  |  Masa: ${plan.time}  |  Tempoh: ${plan.duration} min`,
        plan.contentStandards?.length ? `\nStandard Kandungan:\n${plan.contentStandards.join('\n')}` : '',
        plan.learningStandards?.length ? `\nStandard Pembelajaran:\n${plan.learningStandards.join('\n')}` : '',
        `\nObjektif:\n${plan.learningObjectives.map(o => '  • ' + o).join('\n')}`,
        `\nAktiviti:\n${plan.activities.map(a => `  [${a.phase}] ${a.description} (${a.duration} min)`).join('\n')}`,
        `\nBBM: ${plan.teachingAids.join(', ')}`,
        `\nNilai: ${plan.moralValues.join(', ')}`,
        `\nEMK: ${plan.cce.join(', ')}`,
      ];
      navigator.clipboard.writeText(lines.join('\n'));
    },

    buildPDFHtml(plan) {
      return `<div style="font-family:sans-serif;max-width:210mm;margin:0 auto;padding:1.5cm">
        <div style="border-bottom:3px solid #4f46e5;padding-bottom:.75rem;margin-bottom:1.25rem">
          <h1 style="font-size:1.3rem;font-weight:700;margin:0">RANCANGAN PENGAJARAN HARIAN</h1>
          <div style="font-size:.8rem;color:#64748b;margin-top:.25rem">${plan.subjectName} | ${plan.class} | ${plan.day} | ${plan.time}</div>
        </div>
        ${plan.contentStandards?.length ? '<div><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:.25rem;margin-bottom:.5rem">Standard Kandungan</h2>' + plan.contentStandards.map(s => '<span style="background:#f1f5f9;border-radius:9999px;padding:.125rem .55rem;font-size:.72rem;color:#475569;display:inline-block;margin:.125rem">' + this.escapeHtml(s) + '</span>').join('') + '</div>' : ''}
        ${plan.learningStandards?.length ? '<div style="margin-top:1rem"><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:.25rem;margin-bottom:.5rem">Standard Pembelajaran</h2>' + plan.learningStandards.map(s => '<span style="background:#f1f5f9;border-radius:9999px;padding:.125rem .55rem;font-size:.72rem;color:#475569;display:inline-block;margin:.125rem">' + this.escapeHtml(s) + '</span>').join('') + '</div>' : ''}
        <div style="margin-top:1rem"><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:.25rem;margin-bottom:.5rem">Objektif Pembelajaran</h2><ul style="list-style:none;padding:0">${plan.learningObjectives.map(o => '<li style="padding:.2rem 0;font-size:.8rem">' + this.escapeHtml(o) + '</li>').join('')}</ul></div>
        <div style="margin-top:1rem"><h2 style="font-size:.85rem;font-weight:700;color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:.25rem;margin-bottom:.5rem">Aktiviti PdP</h2>${plan.activities.map(a => '<div style="border:1px solid #e2e8f0;border-radius:.5rem;padding:.65rem;margin-bottom:.6rem"><h3 style="font-size:.8rem;font-weight:600;color:#4f46e5;margin-bottom:.2rem">' + this.escapeHtml(a.phase) + ' <span style="font-size:.7rem;color:#94a3b8;font-weight:400">- ' + a.duration + ' min</span></h3><p style="font-size:.78rem;color:#475569;margin:0">' + this.escapeHtml(a.description) + '</p></div>').join('')}</div>
        <div style="margin-top:1rem;display:flex;gap:1rem;flex-wrap:wrap;font-size:.72rem;color:#475569"><div><strong>BBM:</strong> ${plan.teachingAids.join(', ')}</div><div><strong>Nilai:</strong> ${plan.moralValues.join(', ')}</div><div><strong>EMK:</strong> ${plan.cce.join(', ')}</div></div>
        <div style="margin-top:1.5rem;padding-top:.75rem;border-top:2px solid #e2e8f0;font-size:.68rem;color:#94a3b8;text-align:center">Generated by eRPH-PM | SJK(C) PIN MIN, BIDOR STESEN, PERAK</div>
      </div>`;
    },

    downloadPlanPDF(plan) { this.openPDFWindow(this.buildPDFHtml(plan), `RPH_${plan.subject}_${plan.class.replace(' ','')}_${plan.day}.pdf`); },

    exportAllPDF() {
      if (!this.lessonPlans.length) return;
      const pages = this.lessonPlans.map((p, i) =>
        '<div style="' + (i < this.lessonPlans.length - 1 ? 'page-break-after:always;' : '') + 'page-break-inside:avoid">' + this.buildPDFHtml(p) + '</div>'
      ).join('');
      this.openPDFWindow(pages, `eRPH_PM_${this.selectedTeacher}_All.pdf`);
    },

    openPDFWindow(html, filename) {
      const w = window.open('', '_blank');
      if (!w) { alert('Please allow popups.'); return; }
      w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + filename + '</title><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script><\/head><body style="margin:0;padding:0;font-family:sans-serif">' + html + '<script>setTimeout(function(){html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:' + JSON.stringify(filename) + ',image:{type:"jpeg",quality:0.98},html2canvas:{scale:2,useCORS:true,logging:false},jsPDF:{unit:"in",format:"a4",orientation:"portrait"}}).from(document.body).save().then(function(){window.close()})["catch"](function(){window.close()})},500)<\/script><\/body></html>');
      w.document.close();
    },

    escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    },

    switchTab(id) { this.activeTab = id; this.sidebarOpen = false; },
    onTeacherChange() {
      localStorage.setItem('erphp_teacher', this.selectedTeacher);
      localStorage.setItem('erphp_penggal', this.selectedPenggal);
    },
    init() {
      this.$watch('activeTab', v => localStorage.setItem('erphp_tab', v));
      this.$watch('selectedTeacher', v => localStorage.setItem('erphp_teacher', v));
      this.$watch('selectedPenggal', v => localStorage.setItem('erphp_penggal', v));
    },
  }));
});
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
.sidebar-transition { transition: transform 0.25s ease-in-out; }
.fade-in { animation: fadeIn 0.2s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
[x-cloak] { display: none !important; }
</style>
</body>
</html>
