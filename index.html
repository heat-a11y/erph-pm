<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>eRPH-PM - Rancangan Pengajaran Harian</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased" x-data="app()">
<div class="flex h-screen">
  <aside class="sidebar-transition fixed inset-y-0 left-0 z-40 flex w-64 flex-col bg-slate-900 text-slate-100 md:static" x-bind:class="sidebarOpen?'translate-x-0':'-translate-x-full md:translate-x-0'">
    <div class="flex h-14 items-center gap-2 border-b border-slate-700/50 px-4"><span class="flex h-7 w-7 items-center justify-center rounded-lg bg-indigo-500 text-xs font-bold shrink-0">R</span><div><p class="text-sm font-semibold leading-tight">eRPH-PM</p><p class="text-[9px] leading-tight text-slate-400">SJK(C) PIN MIN, BIDOR</p></div></div>
    <div class="border-b border-slate-700/50 p-3"><p class="mb-1.5 text-[10px] font-semibold uppercase tracking-wide text-slate-500">Guru</p>
      <select x-model="tg" @change="save()" class="w-full rounded-lg bg-slate-800 px-2.5 py-2 text-xs text-slate-200 border border-slate-600"><option value="">-- Pilih --</option><template x-for="(info,code) in D.TEACHERS" :key="code"><option :value="code" x-text="info.name+' ('+code+')'+(info.cn?' '+info.cn:'')"></option></template></select>
      <p class="mt-1.5 mb-1 text-[10px] font-semibold uppercase tracking-wide text-slate-500">Penggal</p>
      <select x-model="pg" @change="save()" class="w-full rounded-lg bg-slate-800 px-2.5 py-2 text-xs text-slate-200 border border-slate-600"><option value="1">Penggal 1 (12 Jan-22 Mei)</option><option value="2">Penggal 2 (8 Jun-4 Dis)</option></select>
    </div>
    <nav class="flex-1 space-y-0.5 overflow-y-auto p-2">
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="switchTab(tab.id)" class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-xs font-medium transition-colors" :class="activeTab===tab.id?'bg-indigo-500/20 text-indigo-300':'text-slate-400 hover:bg-slate-800 hover:text-slate-200'"><span x-text="tab.icon"></span><span x-text="tab.label"></span><span x-show="tab.badge" class="ml-auto rounded-full bg-indigo-500/20 px-1.5 py-0.5 text-[9px]" x-text="tab.badge"></span></button>
      </template>
    </nav>
    <div class="border-t border-slate-700/50 p-3 text-center text-[9px] text-slate-600">v2.1 | <span x-text="rph.length"></span> RPH tersimpan</div>
  </aside>
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-14 items-center gap-2 border-b bg-white px-3 shadow-sm">
      <button @click="sidebarOpen=!sidebarOpen" class="rounded-lg p-1.5 text-slate-500 hover:bg-slate-100 md:hidden"><svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button>
      <div class="flex items-center gap-1.5 text-xs font-medium text-slate-500"><span x-text="tabIcon()"></span><span x-text="tabLabel()"></span></div>
      <div class="ml-auto flex items-center gap-2 text-xs text-slate-400"><span x-text="tg?slotCount+' slot':''"></span><template x-if="rph.length"><span class="rounded-full bg-indigo-100 px-2 py-0.5 text-[10px] font-medium text-indigo-700" x-text="rph.length+' RPH'"></span></template></div>
    </header>
    <main class="flex-1 overflow-y-auto p-3 md:p-5">

      <!-- TIMETABLE -->
      <section x-show="activeTab==='tt'" x-cloak class="max-w-6xl mx-auto fade-in">
        <template x-if="!tg"><div class="flex h-48 items-center justify-center text-slate-400"><p class="text-sm">Pilih guru dari sidebar.</p></div></template>
        <template x-if="tg">
          <div><div class="mb-3 flex items-center justify-between"><h2 class="text-base font-bold text-slate-900" x-text="tName()"></h2><button @click="genRPH()" x-show="slots().length" class="inline-flex items-center gap-1 rounded-lg bg-indigo-600 px-3.5 py-2 text-xs font-semibold text-white shadow hover:bg-indigo-700"><span>+</span> Jana RPH</button></div>
          <div class="overflow-x-auto rounded-xl border bg-white shadow-sm"><table class="w-full min-w-[760px] text-xs"><thead><tr class="border-b bg-slate-50"><th class="px-1.5 py-2 text-left font-semibold text-slate-500 w-20">Masa</th><template x-for="d in D.DAYS" :key="d"><th class="px-1.5 py-2 text-center font-semibold text-slate-500" x-text="d"></th></template></tr></thead>
          <tbody><template x-for="per in D.PERIODS" :key="per[0]"><tr class="border-b" :class="per[0]==='REHAT'?'bg-amber-50':''"><td class="px-1.5 py-1 text-[10px] font-medium text-slate-400 whitespace-nowrap" x-text="per[0]+' '+per[1]+'-'+per[2]"></td><template x-for="d in D.DAYS" :key="d"><td class="px-0.5 py-0.5 text-center border-l align-top"><template x-for="slot in getSlots(d,per[0])" :key="slot.c+slot.s"><div class="rounded border px-1 py-0.5 text-[10px] leading-tight mb-0.5" :class="color(slot.s)"><div class="font-semibold" x-text="slot.n"></div><div class="text-[9px] opacity-70" x-text="slot.c.replace('Tahun ','Y')"></div></div></template></td></template></tr></template></tbody></table></div></div>
        </template>
      </section>

      <!-- KURIKULUM -->
      <section x-show="activeTab==='kur'" x-cloak class="max-w-4xl mx-auto fade-in">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <select x-model="cs" @change="save()" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium shadow-sm"><template x-for="s in D.SUBJECTS" :key="s.c"><option :value="s.c" x-text="s.n"></option></template></select>
          <select x-model="cy" @change="save()" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium shadow-sm"><option value="Year 1">Tahun 1</option><option value="Year 2">Tahun 2</option><option value="Year 3">Tahun 3</option><option value="Year 4">Tahun 4</option><option value="Year 5">Tahun 5</option><option value="Year 6">Tahun 6</option></select>
          <span class="text-xs text-slate-500" x-text="curUnits().length+' unit'"></span>
        </div>
        <template x-if="!curUnits().length"><div class="flex h-48 items-center justify-center text-slate-400"><p class="text-sm">Tiada data kurikulum.</p></div></template>
        <template x-if="curUnits().length"><div class="space-y-1.5"><template x-for="(u,i) in curUnits()" :key="i"><div class="rounded-lg border bg-white shadow-sm"><div @click="u._open=!u._open" class="flex cursor-pointer items-center justify-between px-4 py-2.5"><div class="flex items-center gap-2 min-w-0"><span class="shrink-0 text-slate-400 text-xs" x-text="u._open?'v':'>'"></span><p class="text-xs font-medium text-slate-900" x-text="u"></p></div></div><div x-show="u._open" x-collapse class="border-t px-4 py-3 space-y-2 text-xs text-slate-600"><p><span class="font-semibold text-slate-700">SK:</span><template x-for="sk in (D.SK[cs]||[])"><br><span x-text="sk"></span></template></p><p class="mt-1"><span class="font-semibold text-slate-700">SP:</span><template x-for="sp in (D.SP[cs]||[])"><br><span x-text="sp"></span></template></p></div></div></template></div></template>
      </section>

      <!-- JANA RPH -->
      <section x-show="activeTab==='rph'" x-cloak class="max-w-4xl mx-auto fade-in">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <button @click="genRPH()" x-show="tg" class="inline-flex items-center gap-1 rounded-lg bg-indigo-600 px-4 py-2 text-xs font-semibold text-white shadow hover:bg-indigo-700">+ Jana RPH</button>
          <button @click="insRef()" x-show="rph.length" class="rounded-lg border bg-amber-50 px-3 py-2 text-xs font-medium text-amber-700 hover:bg-amber-100">Sisip Refleksi</button>
          <button @click="pdfAll()" x-show="rph.length" class="rounded-lg border bg-white px-3 py-2 text-xs font-medium text-slate-600 hover:bg-slate-50">PDF Semua</button>
          <button @click="rph=[]" x-show="rph.length" class="rounded-lg px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50">Padam</button>
        </div>
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-slate-400"><p class="text-sm">Pilih guru dan generate RPH.</p></div></template>
        <template x-if="rph.length"><div class="space-y-3"><template x-for="(p,i) in rph" :key="p.id"><div class="rounded-xl border bg-white shadow-sm">
          <div @click="p._open=!p._open" class="flex cursor-pointer items-center justify-between border-b px-4 py-2.5"><div class="min-w-0"><p class="text-sm font-semibold text-slate-900 truncate" x-text="p.sn+' - '+p.c"></p><p class="text-xs text-slate-500"><span x-text="p.d"></span> | P<span x-text="p.p"></span> (<span x-text="p.t"></span>) | <span x-text="p.dur"></span> min</p></div><span class="shrink-0 text-slate-400 text-xs" x-text="p._open?'v':'>'"></span></div>
          <div x-show="p._open" x-collapse class="px-4 py-3 space-y-3 text-xs">

            <div class="rounded-lg bg-indigo-50 p-2.5"><span class="font-semibold text-indigo-700">Unit: </span><span class="text-indigo-900" x-text="p.unit"></span></div>

            <div><p class="font-semibold text-slate-600 uppercase tracking-wider text-[10px]">Standard Kandungan</p><template x-for="s in p.sk" :key="s"><p class="text-slate-600 mt-0.5" x-text="s"></p></template></div>

            <div><p class="font-semibold text-slate-600 uppercase tracking-wider text-[10px]">Standard Pembelajaran</p><template x-for="s in p.sp" :key="s"><p class="text-slate-600 mt-0.5" x-text="s"></p></template></div>

            <div><p class="font-semibold text-indigo-600 uppercase tracking-wider text-[10px]">Objektif Pembelajaran</p><ul class="list-disc pl-4 space-y-0.5"><template x-for="o in p.obj" :key="o"><li class="text-slate-600" x-text="o"></li></template></ul></div>

            <div><p class="font-semibold text-emerald-600 uppercase tracking-wider text-[10px]">Kriteria Kejayaan</p><ul class="list-disc pl-4 space-y-0.5"><template x-for="c in p.kj" :key="c"><li class="text-slate-600" x-text="c"></li></template></ul></div>

            <div><p class="font-semibold text-indigo-600 uppercase tracking-wider text-[10px]">Aktiviti Pembelajaran</p><div class="space-y-1.5"><template x-for="(a,i) in p.acts" :key="i"><div class="flex gap-2"><span class="shrink-0 flex h-6 w-6 items-center justify-center rounded-full text-[9px] font-bold" :class="ac(a.ph)" x-text="a.ph[0]"></span><div class="flex-1 rounded border bg-slate-50 p-2"><p class="font-medium text-slate-700 text-[11px]" x-text="a.ph"></p><p class="text-slate-600" x-text="a.desc"></p><p class="text-slate-400 text-[10px]"><span class="font-medium">Guru:</span> <span x-text="a.t"></span> | <span class="font-medium">Murid:</span> <span x-text="a.s"></span> | <span x-text="a.d"></span> min</p></div></div></template></div></div>

            <div class="grid grid-cols-3 gap-2"><div class="rounded border bg-slate-50 p-2"><p class="font-semibold text-slate-500 text-[10px] uppercase tracking-wider">BBM</p><template x-for="b in p.bbm" :key="b"><span class="inline-block rounded bg-white border px-1.5 py-0.5 text-[10px] text-slate-600 mr-0.5 mb-0.5" x-text="b"></span></template></div><div class="rounded border bg-slate-50 p-2"><p class="font-semibold text-slate-500 text-[10px] uppercase tracking-wider">Nilai</p><template x-for="v in p.nilai" :key="v"><span class="inline-block rounded bg-white border px-1.5 py-0.5 text-[10px] text-slate-600 mr-0.5 mb-0.5" x-text="v"></span></template></div><div class="rounded border bg-slate-50 p-2"><p class="font-semibold text-slate-500 text-[10px] uppercase tracking-wider">EMK</p><template x-for="e in p.emk" :key="e"><span class="inline-block rounded bg-white border px-1.5 py-0.5 text-[10px] text-slate-600 mr-0.5 mb-0.5" x-text="e"></span></template></div></div>

            <div x-show="p.rem"><p class="font-semibold text-orange-600 uppercase tracking-wider text-[10px]">Aktiviti Pemulihan</p><template x-for="r in p.rem" :key="r.id"><div class="rounded border border-orange-200 bg-orange-50 p-2 mb-1"><p class="font-medium text-orange-800 text-[11px]" x-text="r.title"></p><p class="text-orange-700 text-[10px]" x-text="r.desc"></p></div></template></div>

            <div><p class="font-semibold text-slate-500 uppercase tracking-wider text-[10px]">Refleksi</p><textarea x-model="p.ref" class="w-full rounded border border-slate-300 bg-white p-2 text-xs focus:border-indigo-400 focus:outline-none" rows="2" placeholder="Taip refleksi..."></textarea></div>

            <div class="flex gap-2 border-t pt-2">
              <button @click.stop="copy(p)" class="rounded border bg-white px-2.5 py-1.5 text-[10px] font-medium text-slate-600 hover:bg-slate-50">Salin</button>
              <button @click.stop="pdfOne(p)" class="rounded border bg-white px-2.5 py-1.5 text-[10px] font-medium text-slate-600 hover:bg-slate-50">PDF</button>
            </div>
          </div>
        </div></template></div></template>
      </section>

      <!-- REFLEKSI -->
      <section x-show="activeTab==='ref'" x-cloak class="max-w-4xl mx-auto fade-in">
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-slate-400"><p class="text-sm">Jana RPH dahulu.</p></div></template>
        <template x-if="rph.length"><div class="space-y-3"><div class="flex gap-2"><button @click="insRef()" class="rounded-lg bg-amber-600 px-4 py-2 text-xs font-semibold text-white hover:bg-amber-700">Sisip Semua</button></div><template x-for="(p,i) in rph" :key="p.id"><div class="rounded-lg border bg-white p-3 shadow-sm"><p class="text-xs font-semibold text-slate-900" x-text="(i+1)+'. '+p.sn+' - '+p.c+' ('+p.d+')'"></p><textarea x-model="p.ref" class="mt-1 w-full rounded border border-slate-300 bg-white p-2 text-xs focus:border-indigo-400 focus:outline-none" rows="2" placeholder="Taip refleksi..."></textarea></div></template></div></template>
      </section>

    </main>
  </div>
</div>

<script>

document.addEventListener('alpine:init',()=>{ Alpine.data('app',()=>({

      +(p.sp.length?'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">Standard Pembelajaran</h2>'+p.sp.map(s=>'<span style="background:#f1f5f9;border-radius:999px;padding:2px 8px;font-size:.7rem;color:#475569;display:inline-block;margin:2px">'+e(s)+'</span>').join('')+'</div>':'')
      +'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">Objektif Pembelajaran</h2><ul style="list-style:none;padding:0">'+p.obj.map(o=>'<li style="padding:2px 0;font-size:.75rem;padding-left:1rem">'+e(o)+'</li>').join('')+'</ul></div>'
      +'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">Aktiviti Pembelajaran</h2>'+p.acts.map(a=>'<div style="border:1px solid #e2e8f0;border-radius:6px;padding:6px;margin-bottom:5px"><p style="font-size:.75rem;font-weight:600;color:#4f46e5;margin:0">'+e(a.ph)+' <span style="font-size:.65rem;color:#94a3b8;font-weight:400">- '+a.d+' min</span></p><p style="font-size:.7rem;color:#475569;margin:0">'+e(a.desc)+'</p><p style="font-size:.65rem;color:#94a3b8;margin-top:2px"><span style="font-weight:600">Guru:</span> '+e(a.t)+' | <span style="font-weight:600">Murid:</span> '+e(a.s)+'</p></div>').join('')+'</div>'
      +(p.rem?'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#ea580c;margin-bottom:.3rem">Aktiviti Pemulihan</h2>'+p.rem.map(r=>'<div style="border:1px solid #fed7aa;border-radius:6px;padding:6px;margin-bottom:4px"><p style="font-size:.7rem;font-weight:600;color:#c2410c;margin:0">'+e(r.title)+'</p><p style="font-size:.68rem;color:#78350f;margin:0">'+e(r.desc)+'</p></div>').join('')+'</div>':'')
      +'<div style="margin-top:.5rem;display:flex;gap:.5rem;flex-wrap:wrap;font-size:.7rem;color:#475569"><div><strong>BBM:</strong> '+p.bbm.map(s=>e(s)).join(', ')+'</div><div><strong>Nilai:</strong> '+p.nilai.map(s=>e(s)).join(', ')+'</div><div><strong>EMK:</strong> '+p.emk.map(s=>e(s)).join(', ')+'</div></div>'
      +(p.ref?'<div style="margin-top:.5rem;border-top:2px solid #e2e8f0;padding-top:.4rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.2rem">Refleksi</h2><p style="font-size:.7rem;color:#475569;font-style:italic">'+e(p.ref)+'</p></div>':'')
      +'<div style="margin-top:.75rem;padding-top:.4rem;border-top:1px solid #e2e8f0;font-size:.6rem;color:#94a3b8;text-align:center">Dijana oleh eRPH-PM | SJK(C) PIN MIN, BIDOR STESEN, PERAK</div></div>';
  },

  pdfOne(p){
    const el=document.createElement('div'); el.innerHTML=this.html(p);
    if(typeof html2pdf!=='undefined'){
      html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:'RPH_'+p.s+'_'+p.c.replace(' ','')+'_'+p.d+'.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}}).from(el).save();
    } else {
      const w=window.open('','_blank'); if(!w){alert('Sila benarkan popup.');return;}
      w.document.write('<html><head><title>RPH</title></head><body>'+this.html(p)+'<script>window.onload=function(){window.print();}<'+'/script></body></html>');
      w.document.close();
    }
  },

  pdfAll(){
    if(!this.rph.length)return;
    const pages=this.rph.map((p,i)=>'<div style="'+(i<this.rph.length-1?'page-break-after:always;':'')+'page-break-inside:avoid">'+this.html(p)+'</div>').join('');
    if(typeof html2pdf!=='undefined'){
      const el=document.createElement('div'); el.innerHTML=pages;
      html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:'eRPH_PM_All.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}}).from(el).save();
    } else {
      const w=window.open('','_blank'); if(!w){alert('Sila benarkan popup.');return;}
      w.document.write('<html><head><title>RPH All</title></head><body>'+pages+'<script>window.onload=function(){window.print();}<'+'/script></body></html>');
      w.document.close();
    }
  },

  copy(p){
    const l=['RANCANGAN PENGAJARAN HARIAN','Guru: '+this.tName(),'Kelas: '+p.c+' | Subjek: '+p.sn,'Hari: '+p.d+' | Masa: '+p.t,'','Standard Kandungan:',...p.sk.map(s=>'  - '+s),'','Standard Pembelajaran:',...p.sp.map(s=>'  - '+s),'','Objektif:',...p.obj.map(o=>'  - '+o),'','Aktiviti:',...p.acts.map(a=>'  ['+a.ph+'] '+a.desc+' ('+a.d+' min)'),'','BBM: '+p.bbm.join(', '),'Nilai: '+p.nilai.join(', '),'EMK: '+p.emk.join(', '),p.ref?'\nRefleksi:\n'+p.ref:'','','Dijana oleh eRPH-PM'];
    navigator.clipboard.writeText(l.join('\n'));
  },

  init(){this.$watch('rph',()=>{this.save();this.tabs[2].badge=this.rph.length;},{deep:true});this.save();},
}));});
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}
.sidebar-transition{transition:transform .25s ease-in-out}
[x-cloak]{display:none!important}
.fade-in{animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</body>
