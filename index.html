<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>eRPH-PM - Rancangan Pengajaran Harian</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased" x-data="app()">
<div class="flex h-screen">
  <aside class="sidebar-transition fixed inset-y-0 left-0 z-40 flex w-64 flex-col bg-slate-900 text-slate-100 md:static" x-bind:class="sOpen?'translate-x-0':'-translate-x-full md:translate-x-0'">
    <div class="flex h-14 items-center gap-2 border-b border-slate-700/50 px-4"><span class="flex h-7 w-7 items-center justify-center rounded-lg bg-indigo-500 text-xs font-bold shrink-0">R</span><div><p class="text-sm font-semibold leading-tight">eRPH-PM</p><p class="text-[9px] leading-tight text-slate-400">SJK(C) PIN MIN, BIDOR</p></div></div>
    <div class="border-b border-slate-700/50 p-3"><p class="mb-1.5 text-[10px] font-semibold uppercase tracking-wide text-slate-500">Guru</p>
      <select x-model="tg" @change="sv()" class="w-full rounded-lg bg-slate-800 px-2.5 py-2 text-xs text-slate-200 border border-slate-600"><option value="">-- Pilih --</option><template x-for="(info,code) in D.TEACHERS" :key="code"><option :value="code" x-text="info.n+' ('+code+')'+(info.c?' '+info.c:'')"></option></template></select>
    </div>
    <nav class="flex-1 space-y-0.5 overflow-y-auto p-2">
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="sw(tab.id)" class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-xs font-medium transition-colors" :class="a===tab.id?'bg-indigo-500/20 text-indigo-300':'text-slate-400 hover:bg-slate-800 hover:text-slate-200'"><span x-text="tab.i"></span><span x-text="tab.l"></span><span x-show="tab.c" class="ml-auto rounded-full bg-indigo-500/20 px-1.5 py-0.5 text-[9px]" x-text="tab.c"></span></button>
      </template>
    </nav>
    <div class="border-t border-slate-700/50 p-3 text-center text-[9px] text-slate-600">v2.2 | <span x-text="rph.length"></span> RPH</div>
  </aside>
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-14 items-center gap-2 border-b bg-white px-3 shadow-sm">
      <button @click="sOpen=!sOpen" class="rounded-lg p-1.5 text-slate-500 hover:bg-slate-100 md:hidden"><svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button>
      <div class="flex items-center gap-1.5 text-xs font-medium text-slate-500"><span x-text="tIcon()"></span><span x-text="tLabel()"></span></div>
      <div class="ml-auto flex items-center gap-2 text-xs text-slate-400"><span x-text="tg?sl().length+' slot':''"></span><template x-if="rph.length"><span class="rounded-full bg-indigo-100 px-2 py-0.5 text-[10px] font-medium text-indigo-700" x-text="rph.length+' RPH'"></span></template></div>
    </header>
    <main class="flex-1 overflow-y-auto p-2 md:p-4">

      <!-- TIMETABLE -->
      <section x-show="a==='tt'" x-cloak class="max-w-6xl mx-auto">
        <template x-if="!tg"><div class="flex h-48 items-center justify-center text-slate-400 text-sm">Pilih guru dari sidebar.</div></template>
        <template x-if="tg">
          <div><div class="mb-2 flex items-center justify-between"><h2 class="text-base font-bold text-slate-900" x-text="tName()"></h2><button @click="gen()" x-show="sl().length" class="inline-flex items-center gap-1 rounded-lg bg-indigo-600 px-3.5 py-2 text-xs font-semibold text-white shadow hover:bg-indigo-700">+ Jana RPH</button></div>
          <div class="overflow-x-auto rounded-xl border bg-white shadow-sm"><table class="w-full min-w-[760px] text-xs"><thead><tr class="border-b bg-slate-50"><th class="px-1.5 py-2 text-left font-semibold text-slate-500 w-20">Masa</th><template x-for="d in D.DAYS" :key="d"><th class="px-1.5 py-2 text-center font-semibold text-slate-500" x-text="d"></th></template></tr></thead>
          <tbody><template x-for="per in D.PERIODS" :key="per[0]"><tr class="border-b" :class="per[0]==='REHAT'?'bg-amber-50':''"><td class="px-1.5 py-1 text-[10px] font-medium text-slate-400" x-text="per[0]+' '+per[1]+'-'+per[2]"></td><template x-for="d in D.DAYS" :key="d"><td class="px-0.5 py-0.5 text-center border-l align-top"><template x-for="s in gS(d,per[0])" :key="s.c+s.s"><div class="rounded border px-1 py-0.5 text-[10px] leading-tight mb-0.5" :class="clr(s.s)"><div class="font-semibold" x-text="s.n"></div><div class="text-[9px] opacity-70" x-text="s.c.replace('Tahun ','Y')"></div></div></template></td></template></tr></template></tbody></table></div></div>
        </template>
      </section>

      <!-- CURRICULUM -->
      <section x-show="a==='kur'" x-cloak class="max-w-4xl mx-auto">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <select x-model="cs" @change="sv()" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium shadow-sm"><template x-for="s in D.SUBJECTS" :key="s.c"><option :value="s.c" x-text="s.n"></option></template></select>
          <select x-model="cy" @change="sv()" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium shadow-sm"><option value="Year 1">Tahun 1</option><option value="Year 2">Tahun 2</option><option value="Year 3">Tahun 3</option><option value="Year 4">Tahun 4</option><option value="Year 5">Tahun 5</option><option value="Year 6">Tahun 6</option></select>
          <span class="text-xs text-slate-500" x-text="uList().length+' unit'"></span>
        </div>
        <template x-if="!uList().length"><div class="flex h-48 items-center justify-center text-slate-400 text-sm">Tiada data kurikulum.</div></template>
        <template x-if="uList().length"><div class="space-y-1.5"><template x-for="(u,i) in uList()" :key="i"><div class="rounded-lg border bg-white shadow-sm"><div @click="u.o=!u.o" class="flex cursor-pointer items-center justify-between px-4 py-2.5"><div class="flex items-center gap-2 min-w-0"><span class="shrink-0 text-slate-400 text-xs" x-text="u.o?'v':'>'"></span><p class="text-xs font-medium text-slate-900" x-text="u"></p></div></div><div x-show="u.o" x-collapse class="border-t px-4 py-3 space-y-2 text-xs text-slate-600"><p><span class="font-semibold text-slate-700">SK:</span><template x-for="sk in getSK()"><br><span x-text="sk"></span></template></p><p class="mt-1"><span class="font-semibold text-slate-700">SP:</span><template x-for="sp in getSP()"><br><span x-text="sp"></span></template></p></div></div></template></div></template>
      </section>

      <!-- RPH -->
      <section x-show="a==='rph'" x-cloak class="max-w-4xl mx-auto">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <button @click="gen()" x-show="tg" class="inline-flex items-center gap-1 rounded-lg bg-indigo-600 px-4 py-2 text-xs font-semibold text-white shadow hover:bg-indigo-700">+ Jana RPH</button>
          <button @click="insRef()" x-show="rph.length" class="rounded-lg border bg-amber-50 px-3 py-2 text-xs font-medium text-amber-700 hover:bg-amber-100">Sisip Refleksi</button>
          <button @click="pdfAll()" x-show="rph.length" class="rounded-lg border bg-white px-3 py-2 text-xs font-medium text-slate-600 hover:bg-slate-50">PDF Semua</button>
          <button @click="rph=[];sv()" x-show="rph.length" class="rounded-lg px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50">Padam</button>
        </div>
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-slate-400 text-sm">Pilih guru dan Jana RPH.</div></template>
        <template x-if="rph.length"><div class="space-y-3"><template x-for="(p,i) in rph" :key="p.id"><div class="rounded-xl border bg-white shadow-sm">
          <div @click="p.o=!p.o" class="flex cursor-pointer items-center justify-between border-b px-4 py-2.5"><div class="min-w-0"><p class="text-sm font-semibold text-slate-900 truncate" x-text="p.sn+' - '+p.c"></p><p class="text-xs text-slate-500"><span x-text="p.d"></span> | P<span x-text="p.per"></span> (<span x-text="p.tm"></span>) | <span x-text="p.dr"></span> min</p></div><span class="shrink-0 text-slate-400 text-xs" x-text="p.o?'v':'>'"></span></div>
          <div x-show="p.o" x-collapse class="px-4 py-3 space-y-3 text-xs">
            <div class="rounded-lg bg-indigo-50 p-2.5"><span class="font-semibold text-indigo-700">Unit: </span><span class="text-indigo-900" x-text="p.unit"></span></div>
            <div><p class="font-semibold text-slate-600 uppercase tracking-wider text-[10px]">Standard Kandungan</p><template x-for="s in p.sk" :key="s"><p class="text-slate-600 mt-0.5" x-text="s"></p></template></div>
            <div><p class="font-semibold text-slate-600 uppercase tracking-wider text-[10px]">Standard Pembelajaran</p><template x-for="s in p.sp" :key="s"><p class="text-slate-600 mt-0.5" x-text="s"></p></template></div>
            <div><p class="font-semibold text-indigo-600 uppercase tracking-wider text-[10px]">Objektif</p><ul class="list-disc pl-4 space-y-0.5"><template x-for="o in p.obj" :key="o"><li class="text-slate-600" x-text="o"></li></template></ul></div>
            <div><p class="font-semibold text-emerald-600 uppercase tracking-wider text-[10px]">Kriteria Kejayaan</p><ul class="list-disc pl-4 space-y-0.5"><template x-for="k in p.kj" :key="k"><li class="text-slate-600" x-text="k"></li></template></ul></div>
            <div><p class="font-semibold text-indigo-600 uppercase tracking-wider text-[10px]">Aktiviti</p><div class="space-y-1.5"><template x-for="(a,i) in p.acts" :key="i"><div class="flex gap-2"><span class="shrink-0 flex h-6 w-6 items-center justify-center rounded-full text-[9px] font-bold" :class="aClr(a.ph)" x-text="a.ph[0]"></span><div class="flex-1 rounded border bg-slate-50 p-2"><p class="font-medium text-slate-700 text-[11px]" x-text="a.ph"></p><p class="text-slate-600" x-text="a.d"></p><p class="text-slate-400 text-[10px]"><span class="font-medium">Guru:</span> <span x-text="a.t"></span> | <span class="font-medium">Murid:</span> <span x-text="a.s"></span> | <span x-text="a.dr"></span> min</p></div></div></template></div></div>
            <div class="grid grid-cols-3 gap-2"><div class="rounded border bg-slate-50 p-2"><p class="font-semibold text-slate-500 text-[10px] uppercase tracking-wider">BBM</p><template x-for="b in p.bbm" :key="b"><span class="inline-block rounded bg-white border px-1.5 py-0.5 text-[10px] text-slate-600 mr-0.5 mb-0.5" x-text="b"></span></template></div><div class="rounded border bg-slate-50 p-2"><p class="font-semibold text-slate-500 text-[10px] uppercase tracking-wider">Nilai</p><template x-for="v in p.nilai" :key="v"><span class="inline-block rounded bg-white border px-1.5 py-0.5 text-[10px] text-slate-600 mr-0.5 mb-0.5" x-text="v"></span></template></div><div class="rounded border bg-slate-50 p-2"><p class="font-semibold text-slate-500 text-[10px] uppercase tracking-wider">EMK</p><template x-for="e in p.emk" :key="e"><span class="inline-block rounded bg-white border px-1.5 py-0.5 text-[10px] text-slate-600 mr-0.5 mb-0.5" x-text="e"></span></template></div></div>
            <div class="flex gap-2 border-t pt-2">
              <button @click.stop="cp(p)" class="rounded border bg-white px-2.5 py-1.5 text-[10px] font-medium text-slate-600 hover:bg-slate-50">Salin</button>
              <button @click.stop="pdf1(p)" class="rounded border bg-white px-2.5 py-1.5 text-[10px] font-medium text-slate-600 hover:bg-slate-50">PDF</button>
              <button @click.stop="ref1(p)" class="rounded border bg-amber-50 px-2.5 py-1.5 text-[10px] font-medium text-amber-700 hover:bg-amber-100">Refleksi</button>
            </div>
          </div>
        </div></template></div></template>
      </section>

      <!-- REFLEKSI -->
      <section x-show="a==='ref'" x-cloak class="max-w-4xl mx-auto">
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-slate-400 text-sm">Jana RPH dahulu.</div></template>
        <template x-if="rph.length">
          <div><div class="mb-3 flex gap-2"><button @click="insRef()" class="rounded-lg bg-amber-600 px-4 py-2 text-xs font-semibold text-white hover:bg-amber-700">Sisip Refleksi Semua</button></div>
          <div class="space-y-2"><template x-for="(p,i) in rph" :key="p.id"><div class="rounded-lg border bg-white p-3 shadow-sm"><p class="text-xs font-semibold text-slate-900" x-text="(i+1)+'. '+p.sn+' - '+p.c+' ('+p.d+')'"></p><textarea x-model="p.ref" class="mt-1 w-full rounded border border-slate-300 bg-white p-2 text-xs focus:border-indigo-400 focus:outline-none" rows="2" placeholder="Taip refleksi..."></textarea><button @click.stop="ref1(p)" class="mt-1 rounded border border-amber-200 bg-amber-50 px-2.5 py-1 text-[10px] font-medium text-amber-700 hover:bg-amber-100">Jana Refleksi</button></div></template></div></div>
        </template>
      </section>

    </main>
  </div>
</div>

  D, tabs:[{i:'T',l:'Jadual',id:'tt'},{i:'K',l:'Kurikulum',id:'kur'},{i:'R',l:'Jana RPH',id:'rph',c:0},{i:'F',l:'Refleksi',id:'ref'}],

  sv(){localStorage.setItem('eptg',this.tg);localStorage.setItem('epcs',this.cs);localStorage.setItem('epcy',this.cy);localStorage.setItem('eprph',JSON.stringify(this.rph));this.tabs[2].c=this.rph.length;},
  sw(id){this.a=id;this.sOpen=false;},
  tIcon(){const t=this.tabs.find(t=>t.id===this.a);return t?t.i:'';},
  tLabel(){const t=this.tabs.find(t=>t.id===this.a);return t?t.l:'';},

  getLang(s){
    const m={BM:'bm',BI:'en'}; return m[s]||'zh';
  },
  sl(){return this.tg?(this.D.SLOTS[this.tg]||[]):[];},
  gS(d,p){return this.sl().filter(s=>s.d===d&&(s.p===p||(s.p==='P'&&p==='P')));},
  tName(){const t=this.D.TEACHERS[this.tg];return t?t.n+' ('+this.tg+')':'';},
  uList(){return this.D.UNITS[this.cs]?.[this.cy]||[];},
  getSK(){const lg=this.getLang(this.cs);return this.D.SK[lg]||[];},
  getSP(){const lg=this.getLang(this.cs);return this.D.SP[lg]||[];},
  pick(a){return a.length?a[Math.floor(Math.random()*a.length)]:'';},

  clr(c){const m={BM:'bg-red-50 border-red-200 text-red-800',BC:'bg-amber-50 border-amber-200 text-amber-800',BI:'bg-emerald-50 border-emerald-200 text-emerald-800',MT:'bg-blue-50 border-blue-200 text-blue-800',SN:'bg-teal-50 border-teal-200 text-teal-800',PM:'bg-purple-50 border-purple-200 text-purple-800',PI:'bg-green-50 border-green-200 text-green-800',PJ:'bg-orange-50 border-orange-200 text-orange-800',PK:'bg-rose-50 border-rose-200 text-rose-800',PSV:'bg-yellow-50 border-yellow-200 text-yellow-800',MZ:'bg-indigo-50 border-indigo-200 text-indigo-800',SJ:'bg-cyan-50 border-cyan-200 text-cyan-800',RBT:'bg-violet-50 border-violet-200 text-violet-800'};return m[c]||'bg-slate-50 border-slate-200 text-slate-700';},
  aClr(p){const m={'Set Induction':'bg-amber-100 text-amber-700','Set Induksi':'bg-amber-100 text-amber-700','导入':'bg-amber-100 text-amber-700','Pre-lesson':'bg-blue-100 text-blue-700','Pra-PdP':'bg-blue-100 text-blue-700','课前活动':'bg-blue-100 text-blue-700','Lesson Development':'bg-green-100 text-green-700','Perkembangan PdP':'bg-green-100 text-green-700','主要教学':'bg-green-100 text-green-700','Post-lesson':'bg-purple-100 text-purple-700','Pasca-PdP':'bg-purple-100 text-purple-700','课后活动':'bg-purple-100 text-purple-700','Closure':'bg-rose-100 text-rose-700','Penutup':'bg-rose-100 text-rose-700','总结':'bg-rose-100 text-rose-700'};return m[p]||'bg-slate-100 text-slate-700';},

  dur(per){const p=D.PERIODS.find(x=>x[0]===per);if(!p)return 30;const[a,b]=p[1].split(':').map(Number),[c,d]=p[2].split(':').map(Number);return(c*60+d)-(a*60+b);},

  gen(){
    if(!this.tg)return;const plans=[];
    this.sl().forEach(s=>{
      const y=s.c.replace('Tahun ','Year '); const lg=this.getLang(s.s);
      const units=this.D.UNITS[s.s]?.[y]||[]; const unit=units.length?units[Math.floor(Math.random()*units.length)]:s.n+' '+s.c;
      const sk=this.D.SK[lg]||[]; const sp=this.D.SP[lg]||[]; const obj=this.D.OBJ[lg]||[]; const kj=this.D.KJ[lg]||[];
      const bbm=this.D.BBM[lg]||[]; const nilai=this.D.NILAI[lg]||[]; const emk=this.D.EMK[lg]||[];
      const phases=this.D.PHASES[lg]||[]; const acts=this.D.ACTS[lg]||[]; const tr=this.D.TROLES[lg]||[]; const sr=this.D.SROLES[lg]||[];
      const dur=[8,7,22,5,5]; const per=D.PERIODS.find(x=>x[0]===s.p); const tm=per?per[1]+'-'+per[2]:'';

      plans.push({
        id:Date.now().toString(36)+Math.random().toString(36).slice(2),c:s.c,s:s.s,sn:s.n,d:s.d,per:s.p,tm,dr:this.dur(s.p),
        unit:typeof unit==='string'?unit:unit.title,sk:sk.slice(0,2),sp:sp.slice(0,2),
        obj:obj.slice(0,2),kj:kj.slice(0,2),bbm,nilai,emk,
        acts:phases.map((ph,i)=>({ph,td:lg==='en'?'Lesson Development':'',d:lg==='en'?acts[2]?.[Math.floor(Math.random()*acts[2].length)]||'':this.pick(acts[i]||acts[0]||['']),dr:dur[i],t:tr[i]||'',s:sr[i]||'',get desc(){return this.d}})),
        ref:'',o:true,
      });
    });
    this.rph=[...plans,...this.rph];this.a='rph';this.sv();
  },

  ref1(p){
    const lg=this.getLang(p.s); const refs=this.D.REF[lg]||[];
    if(refs.length)p.ref=refs[Math.floor(Math.random()*refs.length)];
  },
  insRef(){this.rph.forEach(p=>{if(!p.ref)this.ref1(p);});this.sv();},

  esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;},

  htm(p){
    const e=this.esc,lg=this.getLang(p.s);
    const skT=lg==='en'?'Content Standards':lg==='bm'?'Standard Kandungan':'内容标准';
    const spT=lg==='en'?'Learning Standards':lg==='bm'?'Standard Pembelajaran':'学习标准';
    const objT=lg==='en'?'Learning Objectives':lg==='bm'?'Objektif Pembelajaran':'学习目标';
    const actT=lg==='en'?'Activities':lg==='bm'?'Aktiviti':'教学活动';
    const bbmT=lg==='en'?'Teaching Aids':lg==='bm'?'BBM':'教具';
    const nilT=lg==='en'?'Moral Values':lg==='bm'?'Nilai Murni':'价值观';
    const emkT=lg==='en'?'CCE':lg==='bm'?'EMK':'跨课程元素';
    const refT=lg==='en'?'Reflection':lg==='bm'?'Refleksi':'教学反思';
    return '<div style="font-family:sans-serif;max-width:210mm;margin:0 auto;padding:1.5cm">'
      +'<div style="border-bottom:3px solid #4f46e5;padding-bottom:.75rem;margin-bottom:1rem">'
      +'<h1 style="font-size:1.3rem;font-weight:700;margin:0">'+e(lg==='en'?'LESSON PLAN':lg==='bm'?'RANCANGAN PENGAJARAN HARIAN':'教学计划')+'</h1>'
      +'<div style="font-size:.8rem;color:#64748b;margin-top:.25rem">'+e(p.sn)+' | '+e(p.c)+' | '+e(p.d)+' | '+e(p.tm)+'</div>'
      +'<div style="font-size:.7rem;color:#94a3b8;margin-top:.1rem">Guru: '+e(this.tName())+'</div></div>'
      +(p.sk.length?'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">'+e(skT)+'</h2>'+p.sk.map(s=>'<span style="background:#f1f5f9;border-radius:999px;padding:2px 8px;font-size:.7rem;color:#475569;display:inline-block;margin:2px">'+e(s)+'</span>').join('')+'</div>':'')
      +(p.sp.length?'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">'+e(spT)+'</h2>'+p.sp.map(s=>'<span style="background:#f1f5f9;border-radius:999px;padding:2px 8px;font-size:.7rem;color:#475569;display:inline-block;margin:2px">'+e(s)+'</span>').join('')+'</div>':'')
      +'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">'+e(objT)+'</h2><ul style="list-style:none;padding:0">'+p.obj.map(o=>'<li style="padding:2px 0;font-size:.75rem;padding-left:1rem">'+e(o)+'</li>').join('')+'</ul></div>'
      +'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">'+e(actT)+'</h2>'+p.acts.map(a=>'<div style="border:1px solid #e2e8f0;border-radius:6px;padding:6px;margin-bottom:5px"><p style="font-size:.75rem;font-weight:600;color:#4f46e5;margin:0">'+e(a.ph)+' <span style="font-size:.65rem;color:#94a3b8;font-weight:400">- '+a.dr+' min</span></p><p style="font-size:.7rem;color:#475569;margin:0">'+e(a.d||a.td||'')+'</p></div>').join('')+'</div>'
      +'<div style="margin-top:.5rem;display:flex;gap:.5rem;flex-wrap:wrap;font-size:.7rem;color:#475569"><div><strong>'+e(bbmT)+':</strong> '+p.bbm.map(s=>e(s)).join(', ')+'</div><div><strong>'+e(nilT)+':</strong> '+p.nilai.map(s=>e(s)).join(', ')+'</div><div><strong>'+e(emkT)+':</strong> '+p.emk.map(s=>e(s)).join(', ')+'</div></div>'
      +(p.ref?'<div style="margin-top:.5rem;border-top:2px solid #e2e8f0;padding-top:.4rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.2rem">'+e(refT)+'</h2><p style="font-size:.7rem;color:#475569;font-style:italic;white-space:pre-wrap">'+e(p.ref)+'</p></div>':'')
      +'<div style="margin-top:.75rem;padding-top:.4rem;border-top:1px solid #e2e8f0;font-size:.6rem;color:#94a3b8;text-align:center">Dijana oleh eRPH-PM | SJK(C) PIN MIN, BIDOR STESEN, PERAK</div></div>';
  },

  pdf1(p){
    if(typeof html2pdf!=='undefined'){
      const el=document.createElement('div');el.innerHTML=this.htm(p);
      html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:'RPH_'+p.s+'_'+p.c.replace(' ','')+'_'+p.d+'.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}}).from(el).save();
    }else{const w=window.open('','_blank');if(!w)return;w.document.write('<html><head><title>RPH</title></head><body>'+this.htm(p)+'<script>window.print()<'+'/script></body></html>');w.document.close();}
  },
  pdfAll(){
    if(!this.rph.length)return;
    const pages=this.rph.map((p,i)=>'<div style="'+(i<this.rph.length-1?'page-break-after:always;':'')+'page-break-inside:avoid">'+this.htm(p)+'</div>').join('');
    if(typeof html2pdf!=='undefined'){
      const el=document.createElement('div');el.innerHTML=pages;
      html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:'eRPH_PM_All.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}}).from(el).save();
    }else{const w=window.open('','_blank');if(!w)return;w.document.write('<html><head><title>RPH All</title></head><body>'+pages+'<script>window.print()<'+'/script></body></html>');w.document.close();}
  },

  cp(p){
    const l=['RANCANGAN PENGAJARAN HARIAN','Guru: '+this.tName(),'Kelas: '+p.c+' | Subjek: '+p.sn,'Hari: '+p.d+' | Masa: '+p.tm,'','Standard Kandungan:',...p.sk.map(s=>'  - '+s),'','Standard Pembelajaran:',...p.sp.map(s=>'  - '+s),'','Objektif:',...p.obj.map(o=>'  - '+o),'','Aktiviti:',...p.acts.map(a=>'  ['+a.ph+'] '+a.d+' ('+a.dr+' min)'),'','BBM: '+p.bbm.join(', '),'Nilai: '+p.nilai.join(', '),'EMK: '+p.emk.join(', '),p.ref?'\nRefleksi:\n'+p.ref:'','','Dijana oleh eRPH-PM'];
    navigator.clipboard.writeText(l.join('\n'));
  },

  init(){this.$watch('rph',()=>{this.sv();this.tabs[2].c=this.rph.length;},{deep:true});this.sv();},
}));});
</script>
