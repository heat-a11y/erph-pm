ty: Pupils write 3 things learned, 2 interesting things and 1 question still wondering about. Write on paper or sticky note. Then post on the reflection board in the class corner. [Diff: A - Write completely in correct sentences, B - Write guided content with prompt questions, C - Draw pictures and write labels]", "🗣️ Class brainstorming to summarise the lesson. The teacher writes pupils' ideas on the whiteboard in a mind map format. Pupils discuss connections between ideas and make conclusions together. [Diff: A - Give insightful and connected ideas, B - Agree or disagree with appropriate reasons, C - Repeat friends' ideas]", "⭐ Peer assessment: Pupils assess friends' work using a simple rubric like stars or smiley faces. Pupils give oral or written comments about strengths and suggestions for improvement. [Diff: A - Use assessment rubric accurately and objectively, B - Give stars and short comments, C - Paste stickers on work]", "📊 Mini Exhibition: All work is displayed in the class corner or on tables. Pupils walk around viewing the exhibition in groups. A few pupils are selected to explain their work to visitors. [Diff: A - Set up and organise the exhibition creatively, B - Explain the work clearly, C - Visit and view the exhibition]", "🎯 Quick oral quiz: The teacher poses spontaneous questions randomly to test understanding. Pupils answer orally. Questions cover various levels from simple to HOTS. [Diff: A - Challenging HOTS questions that stimulate thinking, B - Standard level questions, C - Simple questions with help and clues]", "🔄 Round Table activity: Each pupil in a group writes one idea in turn on a piece of paper. The paper is rotated clockwise until all group members contribute. Results are shared with the class. [Diff: A - Write complete ideas in grammatically correct sentences, B - Write related keywords, C - Draw related pictures]", "💭 Written reflection in a short learning journal. Pupils write what they learned, what was interesting and what is still unclear. The teacher reads and gives comments and encouragement. [Diff: A - Write a full paragraph with deep reflection, B - Write a few simple sentences, C - Draw pictures and write labels]"], "c": ["📋 Summary using a mind map or i-Think map. The teacher guides pupils to complete the concept map. Pupils fill in blanks with correct information based on today's learning. The summary is done collaboratively by the whole class. [Diff: A - Complete the concept map independently, B - Fill in half of the map with guidance, C - Colour and paste labels on the map]", "🎫 Exit Ticket: Pupils write answers on small paper or sticky note before leaving class. Simple questions like One thing I learned today... or I'm still confused about... The teacher collects and checks exit tickets to assess understanding. [Diff: A - Write answer in full sentences, B - Write words or phrases, C - Draw picture and write labels]", "✅ True or False game: The teacher states several statements related to the topic. Pupils stand if true and sit if false. Or use green cards (true) and red cards (false). This fun activity quickly tests understanding. [Diff: A - Give reasons for true or false, B - Answer true or false confidently, C - Follow friends' actions]", "🙏 Closing prayer or song. Oral reflection by 2-3 selected pupils. The teacher leads the prayer and pupils respond. The learning session ends on a positive note. [Diff: A - Lead the prayer and give a reflection, B - Share a short reflection, C - Listen and respond to the prayer]", "📚 The teacher assigns homework for reinforcement. Homework is based on the topic learned. The teacher explains instructions clearly and gives examples. Pupils keep homework in their bags. [Diff: A - HOTS and problem-solving homework, B - Standard level homework, C - Basic reinforcement homework]", "🔮 Preview the next lesson: The teacher shows a picture or poses a teaser question about the next topic. Pupils predict what they will learn to arouse interest and curiosity. [Diff: A - Predict in full sentences, B - Predict in one word, C - Look at the picture with guidance]", "🎯 Pupils complete What Stuck With You Today? on a sticky note. They write the concept or skill they remember most from today's learning. Sticky notes are posted on a special board in the class corner. [Diff: A - Write in clear full sentences, B - Write short phrases, C - Draw a picture]", "🔄 Quick Q&A session using mini whiteboards. The teacher asks questions related to the topic. Pupils write answers on whiteboards and show simultaneously. The teacher gives immediate feedback. This activity allows the teacher to quickly assess all pupils' understanding. [Diff: A - Challenging HOTS questions, B - Standard level questions, C - Show the written answer]", "⭐ Pupils place a magnet or marker on the Understanding Level chart which has three sections: Understand, Unsure and Don't Understand. The teacher can visually see the class understanding level and plan follow-up actions. [Diff: A - Explain the understanding level choice, B - Place the magnet on own level, C - Help a friend place the magnet]", "✏️ Daily reflection journal: Pupils write a short paragraph about today's learning. Focus on what was learned, how it felt and what will be done. The teacher reads and gives motivating comments. [Diff: A - Write a complete paragraph with reflection, B - Write 3 simple sentences, C - Draw a picture with labels]"]}, "zh": {"i": ["🎵 学生唱与主题相关的歌曲。教师用吉他或录音带领，同时在白板上显示歌词。学生分组创作与歌词匹配的创意动作。唱完后，教师就歌曲内容提问以激发思维并联系课程主题。[分层: A - 自创新歌词和创意动作, B - 在指导下唱歌并跟随示范, C - 拍手跟节奏]", "🎬 播放与主题相关的短视频（2-3分钟），如自然现象、日常情境或有趣故事。观看前教师提出2-3个引导性问题以激活先备知识。观看时学生做简要笔记或记住重要信息。观看后学生根据视频内容猜测课程主题。[分层: A - 用完整句子联系视频内容和主题并举例, B - 用一个词或短语猜主题, C - 将视频中的图片与主题匹配]", "🧩 找朋友游戏：准备图片卡和词语卡。每个学生随机拿一张卡。教师发出信号后，学生走动找到配对的伙伴（图片配词语）。配对的伙伴坐在一起读卡。这个活动帮助学生以有趣的方式掌握新词汇。[分层: A - 将词语与句子描述配对, B - 将图片与正确词语配对, C - 将相同图片配对]", "🎭 教师使用手指玩偶或手偶以吸引人的语调和多变的面部表情讲故事。玩偶作为媒介来传递与主题相关的内容。讲故事时教师在特定部分停下来问预测性问题。学生猜测角色、情节和可吸取的道德价值观。[分层: A - 用自己的话创造性地复述故事, B - 用语调重复主要角色的对话, C - 说出故事中角色的名字]", "🖼️ 准备4-6张顺序打乱的图片。学生分组根据对主题的理解将图片按正确顺序排列。排列后每组解释形成的故事情节。教师引导学生识别最逻辑的顺序。[分层: A - 排列图片并用自己句子创作完整故事, B - 排列图片并读提供的句子, C - 在指导下排列顺序]", "❓ 带与主题相关的实物或有趣图片。物品放在班前或分发给小组。教师提出引导性问题如你看到了什么？你感觉到了什么？或你想知道什么？以激发好奇心。学生根据观察口头回答。[分层: A - 用完整句子回答并给原因和例子, B - 用适当短语回答, C - 指认并点头或摇头]", "🔄 找不同游戏：展示两幅相似的图片，有几处不同。学生分组或个人比较并找出尽可能多的不同。这个活动训练观察能力和注意力。[分层: A - 用完整句子解释不同之处, B - 找出并指出不同, C - 匹配两幅图中的相同物体]", "👂 播放与主题相关的声音或简短音频，如动物叫声、车辆声、自然声或环境声。学生仔细听并辨认声音来源。这个活动刺激听觉技能并提高主动聆听能力。[分层: A - 猜测并详细描述声音特征, B - 准确辨认声音来源, C - 选择匹配声音的正确图片]", "🎈 传话球游戏：学生坐成圆圈。教师拿着球开始提问。球被随机传递。接球者必须自信地回答再传给下一个。这个活动建立学生在小组前说话的自信心。[分层: A - 用完整句子回答高阶思维问题并给理由, B - 用短语回答简单问题, C - 用提示帮助朋友回答]", "📦 神秘箱：准备一个封闭的箱子，里面装有与主题相关的物品。学生轮流把手伸进箱子，不看不摸物品并凭触觉猜。猜完后拿出物品确认。这个活动激发好奇心并训练推理能力。[分层: A - 全面描述物品的特征, B - 准确猜出物品, C - 触摸并指向匹配的图片]"], "p": ["📇 使用彩色大号字卡介绍新词汇。每张卡包含吸引人的图片和清晰的文字。教师展示卡片并正确发音。学生以全班、小组和个人形式认读、拼写和说出词语。将图片与词语联系起来以便理解。[分层: A - 用新词造句, B - 正确说出和拼写词语, C - 跟教师重复]", "👥 使用Think-Pair-Share技巧进行小组讨论。教师提出与主题相关的问题或议题。学生有1-2分钟独立思考（Think）。然后与同伴讨论（Pair）分享想法。最后选定的几组与全班分享（Share）。[分层: A - 用完整句子分享想法并给理由, B - 用短语分享观点, C - 听并重复朋友的想法]", "🔗 准备图片卡和词语卡。学生在桌子或白板上将图片与正确词语配对。教师指导并给反馈。配对后大声说词语。[分层: A - 配对并写简单句子, B - 配对并说出词语, C - 配相同的图片]", "🗣️ 听和重复关键短语的练习。教师用正确语调和重音说短语。学生以全班、小组和个人形式仔细听和重复。强调难词的发音和句子语调。[分层: A - 用正确语调和表情说短语, B - 在帮助下说简单短语, C - 说关键的词]", "📋 分类卡游戏：学生拿到词语卡需要分类到正确的组别如动物、植物、颜色或形状。教师在白板或桌子上提供类别。学生将卡贴在正确类别下同时说出词语。[分层: A - 分类并给出分类理由, B - 在朋友指导下分类, C - 匹配给的例子]", "📝 全班口头练习：教师展示图片或物品。学生齐声回答以建立信心。然后个别回答以进行评估。教师即时反馈。[分层: A - 用完整句子回答, B - 用一个词回答, C - 举手或指向答案]", "🎯 按时间类别（日、月、年）排列词语卡。学生拿到打乱的词语卡，分组按正确顺序排列。[分层: A - 排列并用时间造句, B - 按正确顺序排列卡, C - 将卡与图片匹配]", "🎲 教育棋盘游戏：学生掷骰子并按数字移动。每个格子包含与主题相关的问题如猜词、回答问题或造句。学生必须正确回答才能继续移动。[分层: A - 高阶思维水平题, B - 标准水平题, C - 帮助朋友回答]", "🃏 禁忌词游戏：学生选一张卡，必须向朋友描述这个词但不能说出这个词。其他朋友猜被描述的词。这个活动训练思维和沟通能力。[分层: A - 用完整句子描述, B - 用身体语言和手势, C - 向朋友展示图片]", "✏️ 画一个关于主题先备知识的简单思维导图。教师引导学生识别主要思想和辅助细节。学生在纸上或用数字应用画自己的思维导图。[分层: A - 带子主题和分支的完整导图, B - 有引导的部分导图, C - 在导图上涂色和贴图片]"], "d": ["📖 结对阅读短文。教师准备3个难度级别（容易、标准、挑战）的短文。学生与同伴轮流阅读并讨论内容。教师提供分层理解题涵盖字面、推理和高阶思维水平。学生口头或书面回答。[分层: A - 读高级短文回答高阶思维题, B - 读标准短文回答字面题, C - 读图画短文画答案]", "✍️ 使用i-Think思维图（圆圈图、气泡图、树状图）写段落。学生写之前用思维图规划写作。个人或结对照写。教师提供写作框架和检查清单指导。[分层: A - 写内容组织良好语法正确的完整段落, B - 用框架和短语写引导句, C - 排列给的句子并描写]", "🎭 角色扮演活动：学生表演与主题相关的日常情景对话。教师提供各种情景卡。学生分组设计对话并练习后在班前表演。教师评估语调、发音和表情。[分层: A - 根据情景创造性地创作自己的对话, B - 用给对话并改编, C - 在教师指导下表演对话]", "🖼️ 画廊漫步：学生作品展示在桌子上或墙上。学生分组走动看朋友作品并记录重要信息。他们在便利贴或反馈卡上留言。每组在每站停2-3分钟。[分层: A - 写有建设性、具体和有意义的评论, B - 写简短积极评论, C - 在作品上贴贴纸或标记]", "📘 基于主题制作折叠小书。教师用A4纸提供小书模板。学生创造性地填写内容包括定义、图片、例子和总结。小书包含课堂摘要。[分层: A - 用自己的话和插图填写完整内容, B - 用问题和图片填写引导内容, C - 涂色并贴给的标签]", "🏫 站点式学习：学生分组轮流到4-5个不同任务的站点。每站5-7分钟。站点包括阅读、写作、涂色、游戏和创意。教师监测并在需要帮助的站点指导。[分层: A - 带复杂任务的高阶思维挑战站, B - 带明确指示的标准任务站, C - 带密切支持的教师辅导站]", "🧩 语言游戏：Scrabble、Boggle、词语卡游戏或填字游戏。学生分组玩以加强词汇、拼写和句子结构。游戏在规定时间内轮换。[分层: A - 用找到的词造句, B - 在网格中找隐藏的词, C - 匹配字母组成词]", "🗺️ 分组创建思维导图或思考图。用马尼拉纸和彩色马克笔。学生画带图片和颜色的创意思维导图。每组呈现自己的导图。作品展示在教室角落。[分层: A - 完整导图带子主题和详细分支, B - 带相关主要思想的圆圈图, C - 在朋友帮助下画图]", "💻 使用Quizizz、Kahoot!、Google Classroom或Wordwall等教育应用。学生用手机、平板或电脑个人或分组回答互动测验。问题涵盖各种难度。分数实时显示。[分层: A - 带推理的高阶思维题, B - 带选项的标准题, C - 带答案选项的图片题]", "🎨 手工艺活动：制作与主题相关的海报、剪贴簿、3D模型或立体模型。学生用彩纸、回收盒、胶水、剪刀、彩铅和回收材料。作品展示和呈现。[分层: A - 没有范例创造性地制作手工艺, B - 用给的模板和范例, C - 帮助涂色和装饰]", "🔬 小组实验或调查。学生进行科学活动以验证假设。他们分组记录观察、分析数据并得出结论。教师逐步指导。[分层: A - 用变量控制设计自己的实验, B - 按提供的实验步骤操作, C - 帮助朋友记录数据和观察]", "📊 小组项目：学生分组完成项目并呈现作品。项目包括研究、信息收集、分析和创意呈现。项目为期1-2周。[分层: A - 有深入研究和分析的复杂项目, B - 有指导的标准项目, C - 帮助小组完成简单任务]", "🎪 学习嘉年华：学生设置与主题相关的互动展位。每组管理一个展位，活动包括测验、游戏或展览。其他班或教师参观展位。[分层: A - 独立完全管理和运营展位, B - 在指导下帮助管理展位, C - 参观和参与展位活动]", "📝 项目式学习：学生分组完成文件夹或剪贴簿。项目包括标题、目标、内容、插图和总结。参考来源包括书籍、互联网和访谈。[分层: A - 内容和创意详细的完整文件夹, B - 有引导内容的剪贴簿, C - 带标签的图片和材料收集]", "🎯 热座活动：一名学生坐在班前的热座上。同学轮流问与主题相关的问题。热座上的学生必须自信清晰地回答。这个活动建立自信心和流利度。[分层: A - 问有挑战性和深度的问题, B - 自信准确回答, C - 记录答案并帮助朋友]"], "ps": ["👨‍🏫 选定小组在班前呈现作品。小组代表用海报、幻灯片或模型等辅助工具呈现。解释涵盖目标、过程和成果。其他组给反馈和提问。[分层: A - 自信、清晰、创造性地呈现, B - 在教师指导和不记帮助下呈现, C - 展示作品由教师解释]", "📝 使用Kahoot!或Quizizz进行个人或小组快速测验。问题涵盖从基础到高阶思维的各种难度。学生在限定时间内作答。分数和排名实时显示以提高动力。[分层: A - 带推理的高阶思维题, B - 带选项的标准题, C - 带答案选项的图片题]", "💬 反射圈：每位学生口头分享今天学到的一件事。教师随机选几位学生分享。反射也可以在学习日志中书面完成。[分层: A - 用完整句子分享并举例和联系, B - 用短语简短分享, C - 指向图片或学习材料]", "✏️ 3-2-1活动：学生写3件学到的事、2件有趣的事和1个仍然想知道的问题。写在纸或便利贴上。然后贴在教室角落的反射板上。[分层: A - 用正确句子完整写, B - 用提示问题写引导内容, C - 画图并写标签]", "🗣️ 全班集思广益总结课程。教师以思维导图格式把学生想法写在白板上。学生讨论想法之间的联系并一起做结论。[分层: A - 给有洞察力和联系的想法, B - 用适当理由同意或不同意, C - 复述朋友的想法]", "⭐ 同伴互评：学生用简单量规如星星或笑脸评估朋友的作品。学生就给优势和改进建议给出口头或书面评论。[分层: A - 准确客观地使用评估量规, B - 给星星和短评, C - 在作品上贴贴纸]", "📊 迷你展览：所有作品展示在教室角落或桌子上。学生分组走动看展览。选几位学生向参观者解释他们的作品。[分层: A - 创造性地布置和组织展览, B - 清晰解释作品, C - 参观和看展览]", "🎯 快速口头测验：教师随机提出即兴问题以测试理解。学生口头回答。问题涵盖从简单到高阶思维的各种水平。[分层: A - 挑战思维的进阶题, B - 标准水平题, C - 有帮助和提示的简单题]", "🔄 圆桌活动：小组中每位学生轮流在一张纸上写一个想法。纸按顺时针方向轮转直到所有组员都贡献。与全班分享结果。[分层: A - 用语法正确的句子写完整想法, B - 写相关的关键词, C - 画相关图片]", "💭 在简短学习日志中写书面反思。学生写学到了什么、什么有趣以及什么还不清楚。教师阅读并给评论和鼓励。[分层: A - 写带深度反思的完整段落, B - 写几个简单句子, C - 画图并写标签]"], "c": ["📋 用思维图或i-Think图总结。教师引导学生完成概念图。学生根据今天的学习用正确信息填空。全班合作完成总结。[分层: A - 独立完成概念图, B - 在指导下填一半图, C - 涂色并在图上贴标签]", "🎫 Exit Ticket：学生离开前在小纸或便利贴上写答案。简单问题如今天我学到的一件事或我仍然困惑的是。教师收集并检查以评估理解。[分层: A - 用完整句子写答案, B - 写词语或短语, C - 画图并写标签]", "✅ 对或错游戏：教师陈述与主题相关的说法。学生认为对就站，错就坐。或用绿卡（对）和红卡（错）。这个有趣的游戏快速测试理解。[分层: A - 给出对或错的理由, B - 自信答对或错, C - 跟朋友的动作]", "🙏 结束祈祷或歌曲。选2-3名学生口头反思。教师领祷学生回应。学习在积极氛围中结束。[分层: A - 领祷并给反思, B - 分享简短反思, C - 听并对祈祷回应]", "📚 教师布置巩固练习作为家庭作业。作业基于所学主题。教师清楚说明指示并给例子。学生把作业收进书包。[分层: A - 高阶思维和解决问题作业, B - 标准题, C - 基础巩固题]", "🔮 预习下节课：教师展示图片或提出关于下节课的引导性问题。学生预测将要学的内容以激发兴趣和好奇心。[分层: A - 用完整句子预测, B - 用一个词预测, C - 在指导下看图]", "🎯 学生在便利贴上完成今天学到的。他们写下今天学习中最记得的概念或技能。便利贴在教室角落的专设板上。[分层: A - 用清晰完整句子写, B - 写短短语, C - 画图]", "🔄 用小白板进行快速问答。教师问与主题相关的问题。学生把答案写在小白板上并同时展示。教师即时反馈。这个活动让教师快速评估全班理解。[分层: A - 挑战性高阶思维题, B - 标准水平题, C - 展示写的答案]", "⭐ 学生在理解程度表（理解/不确定/不理解三个部分）上放磁铁或标记。教师可以直观看到全班的理解水平并计划后续行动。[分层: A - 解释理解水平选择, B - 在自已的水平上放磁铁, C - 帮朋友放磁铁]", "✏️ 每日反思日志：学生写关于今天学习的短段落。重点写学到了什么、感受如何以及将要做什么。教师阅读并给鼓励性评论。[分层: A - 写带反思的完整段落, B - 写3个简单句子, C - 画带标签的图]"]}}; const REM = [{"t": "🧑‍🏫 Bimbingan Individu Berstruktur", "d": "Guru memberi bimbingan secara one-to-one kepada murid yang belum menguasai kemahiran. Gunakan pendekatan langkah-demi-langkah dengan soalan bimbingan. Minta murid mengulang semula langkah yang telah dipelajari. Beri pujian dan pengukuhan positif untuk setiap kejayaan kecil. Ulang sehingga murid benar-benar faham.", "st": ["Bimbingan individu", "Soalan lisan", "Pengulangan", "Pengukuhan positif"]}, {"t": "📝 Latihan Berstruktur Langkah-demi-Langkah", "d": "Sediakan lembaran kerja yang dipermudah dengan arahan yang jelas dan contoh jawapan. Bahagikan tugasan kepada langkah-langkah kecil yang mudah diikuti. Murid menyelesaikan satu langkah pada satu masa. Beri bimbingan pada setiap langkah sebelum beralih ke langkah seterusnya.", "st": ["Latihan berpandu", "Contoh", "Struktur", "Langkah"]}, {"t": "👀 Tunjuk Cara Ulangan", "d": "Guru mendemonstrasi semula kemahiran dengan penerangan yang lebih perlahan dan jelas. Gunakan bahan bantu visual semasa demonstrasi. Minta murid meniru dan mengulang selepas guru. Ulang beberapa kali sehingga murid dapat melakukannya secara berdikari.", "st": ["Demonstrasi", "Pengulangan", "Visual", "Tiru"]}, {"t": "📊 Bahan Bantu Visual", "d": "Gunakan gambar rajah, carta, peta konsep, infografik dan video untuk menjelaskan konsep secara visual. Minta murid melukis atau mewarna gambar rajah sendiri. Kaitkan konsep abstrak dengan contoh konkrit yang boleh dilihat dan disentuh oleh murid.", "st": ["Visual", "Peta konsep", "Infografik", "Konkrit"]}, {"t": "✏️ Latihan Pengukuhan Bertulis", "d": "Sediakan latihan tambahan yang lebih mudah untuk membina keyakinan murid. Mulakan dengan soalan aras rendah sebelum beralih ke aras sederhana. Beri contoh jawapan sebelum murid memulakan latihan. Periksa dan betulkan jawapan murid serta beri maklum balas segera.", "st": ["Latihan", "Pengukuhan", "Keyakinan", "Maklum balas"]}, {"t": "🤝 Pembelajaran Berpasangan (Peer Tutoring)", "d": "Pasangkan murid cemerlang dengan murid pemulihan. Murid cemerlang membimbing rakan dalam menyelesaikan tugasan. Guru memantau dan memberi bantuan jika perlu. Aktiviti ini bukan sahaja membantu murid pemulihan malah mengukuhkan kefahaman murid cemerlang.", "st": ["Bimbingan rakan", "Kolaboratif", "Sosial", "Peer tutoring"]}, {"t": "🎲 Permainan Pendidikan", "d": "Gunakan permainan papan, kad imbas atau permainan digital untuk mengukuhkan kemahiran secara menyeronokkan. Contoh: domino perkataan, bingo matematik, atau kuiz interaktif. Permainan meningkatkan motivasi dan mengurangkan tekanan pembelajaran.", "st": ["Permainan", "Motivasi", "Interaktif", "Seronok"]}, {"t": "🃏 Kad Imbasan (Flashcards)", "d": "Gunakan kad imbasan berwarna dengan gambar dan perkataan. Guru menunjukkan kad, murid menyebut perkataan. Ulang secara konsisten sehingga murid dapat mengingat. Boleh dijadikan permainan siapa cepat dia dapat untuk meningkatkan semangat.", "st": ["Kad imbasan", "Pengulangan", "Visual", "Permainan"]}, {"t": "🎵 Nyanyian dan Gerakan", "d": "Gunakan lagu, irama dan gerakan badan untuk mengukuhkan konsep. Sesuai untuk murid kinestetik. Cipta lirik mudah berdasarkan topik pembelajaran. Murid menyanyi sambil membuat gerakan. Aktiviti ini meningkatkan ingatan jangka panjang.", "st": ["Muzik", "Gerakan", "Kinestetik", "Kreatif"]}, {"t": "🗺️ Peta Konsep Bergambar", "d": "Murid melengkapkan peta konsep bergambar yang mengandungi gambar dan kata kunci. Guru menyediakan peta konsep yang separa lengkap. Murid mengisi tempat kosong dengan perkataan atau gambar yang betul. Aktiviti ini membantu murid mengorganisasi maklumat.", "st": ["Visual", "Organisasi", "Kreatif", "Peta minda"]}, {"t": "📖 Bacaan Bergilir (Guided Reading)", "d": "Guru dan murid membaca bersama-sama. Guru berhenti pada perkataan sukar dan membimbing sebutan. Bincangkan maksud perkataan dalam konteks. Minta murid membaca semula ayat untuk meningkatkan kefahaman dan kefasihan.", "st": ["Bacaan berpandu", "Sebutan", "Kefahaman", "Fasih"]}, {"t": "🔤 Dialog Strip Sequencing", "d": "Potong dialog pendek menjadi jalur-jalur ayat. Murid menyusun dialog mengikut urutan yang betul. Baca dialog bersama selepas selesai menyusun. Aktiviti ini membantu murid memahami struktur ayat dan urutan perbualan.", "st": ["Susunan", "Urutan", "Bertutur", "Membaca"]}, {"t": "📄 Cloze Passage dengan Gambar", "d": "Sediakan teks cloze di mana perkataan yang hilang ditunjukkan sebagai gambar di atas ruang kosong. Murid menulis perkataan yang betul berdasarkan gambar. Aktiviti ini membantu murid memahami konteks dan meningkatkan kosa kata.", "st": ["Cloze", "Visual", "Kefahaman", "Kosa kata"]}, {"t": "🔍 Error Hunt (Cari Kesalahan)", "d": "Tunjukkan 3 ayat bergambar - 1 betul dan 2 dengan kesalahan ejaan/tatabahasa. Murid membulatkan kesalahan dan menulis jawapan betul. Bincangkan jenis kesalahan dan cara membetulkannya. Aktiviti ini meningkatkan kemahiran menyunting.", "st": ["Pengenalpastian", "Pembetulan", "Visual", "Analisis"]}, {"t": "📝 Mini Whiteboard Quick-Write", "d": "Guru menunjukkan gambar dan menyebut perkataan/ayat. Murid menulis pada papan putih mini masing-masing. Semua murid menunjukkan papan serentak. Guru memberi maklum balas segera. Aktiviti ini membolehkan guru menilai pemahaman semua murid dengan cepat.", "st": ["Penulisan", "Maklum balas", "Cepat", "Penilaian"]}, {"t": "🏃 Alphabet / Phonics Hopscotch", "d": "Lukis grid hopscotch dengan huruf atau suku kata di atas lantai. Murid melompat ke huruf dan menyebut bunyi atau perkataan yang bermula dengan huruf tersebut. Gandingkan dengan sebutan perkataan penuh. Aktiviti fizikal ini sesuai untuk murid kinestetik.", "st": ["Kinestetik", "Fonik", "Permainan", "Fizikal"]}, {"t": "📑 Word Family Sorting", "d": "Gunakan poket carta dengan kepala keluarga perkataan (-at, -an, -op, -it). Sediakan kad perkataan pelbagai keluarga. Murid menyusun kad ke dalam keluarga perkataan yang betul. Sebut perkataan selepas menyusun. Aktiviti ini mengukuhkan kemahiran membaca dan mengeja.", "st": ["Pengelasan", "Rakan sebaya", "Visual", "Fonik"]}, {"t": "📦 Realia Show & Tell", "d": "Bawa objek sebenar ke dalam kelas. Guru menyebut nama objek, murid mengulang. Minta murid mengambil objek yang betul apabila guru menyebut namanya. Kemudian murid menyebut sendiri nama objek sambil menunjukkannya. Aktiviti ini mengukuhkan perkaitan antara objek dan perkataan.", "st": ["Objek sebenar", "Visual", "Verbal", "Kinestetik"]}, {"t": "⚽ Question-Question Pass", "d": "Murid berdiri dalam bulatan. Guru memulakan dengan bertanya soalan mudah sambil memegang bola. Bola dihantar kepada murid yang menjawab soalan, kemudian murid tersebut bertanya soalan baru kepada rakan yang lain. Aktiviti ini melatih kemahiran bertutur dan mendengar.", "st": ["Bertutur", "Sosial", "Permainan", "Mendengar"]}, {"t": "🖼️ Talk-the-Picture Frame", "d": "Beri setiap pasangan satu gambar yang besar dan menarik. Murid bergilir-gilir menunjuk dan menyebut apa yang mereka lihat menggunakan rangka ayat yang diberi. Rakan pasangan membantu jika perlu. Aktiviti ini membina keyakinan bertutur.", "st": ["Visual", "Berpasangan", "Bertutur", "Keyakinan"]}, {"t": "✏️ Latihan Menulis Huruf/Perkataan", "d": "Gunakan buku latihan khas dengan titik panduan dan garis bantu. Murid menulis huruf atau perkataan dengan meniru titik-titik. Kurangkan panduan secara beransur-ansur sehingga murid boleh menulis tanpa panduan. Beri ganjaran untuk tulisan yang kemas.", "st": ["Penulisan", "Mekanis", "Latih tubi", "Psikomotor"]}, {"t": "🧮 Pengiraan Menggunakan Bahan Maujud", "d": "Gunakan blok, biji benih, straw atau benda konkrit lain untuk mengira, menambah dan menolak. Murid secara fizikal menggerakkan objek semasa mengira. Aktiviti ini membantu murid memahami konsep nombor secara konkrit sebelum beralih ke abstrak.", "st": ["Konkrit", "Maujud", "Matematik", "Kinestetik"]}, {"t": "📏 Garis Nombor", "d": "Lukis garis nombor yang besar di lantai atau atas meja. Murid melangkah atau menuding ke nombor yang betul semasa membuat pengiraan. Gunakan warna berbeza untuk nombor positif dan negatif. Aktiviti ini memudahkan kefahaman operasi tambah dan tolak.", "st": ["Visual", "Konkrit", "Operasi", "Matematik"]}, {"t": "🧠 Permainan Memori (Memory Game)", "d": "Kad gambar dan perkataan diletakkan terbalik. Murid membuka dua kad untuk mencari padanan gambar-perkataan. Sebut perkataan dengan kuat apabila mendapat padanan. Aktiviti ini mengukuhkan ingatan jangka pendek dan perkaitan gambar-perkataan.", "st": ["Memori", "Padanan", "Permainan", "Kognitif"]}, {"t": "📒 Buku Skrap Pemulihan", "d": "Murid mengumpul semua hasil kerja pemulihan dalam sebuah buku skrap khas. Setiap minggu, murid dan guru melihat perkembangan yang telah dicapai. Beri stiker bintang untuk setiap pencapaian. Aktiviti ini meningkatkan motivasi dan keyakinan diri murid.", "st": ["Dokumentasi", "Motivasi", "Kendiri", "Refleksi"]}, {"t": "✂️ Aktiviti Potong dan Tampal", "d": "Murid memotong gambar atau perkataan dari majalah atau lembaran kerja. Kemudian mereka menampal pada tempat yang betul dalam buku latihan. Aktiviti ini melatih kemahiran psikomotor halus sambil belajar mengelaskan maklumat.", "st": ["Psikomotor", "Pengelasan", "Kreatif", "Fokus"]}, {"t": "💬 Soalan Lisan Berbimbing", "d": "Guru mengemukakan soalan secara lisan dengan bimbingan rapat. Beri masa menunggu yang mencukupi untuk murid berfikir. Beri petunjuk jika murid tidak dapat menjawab. Aktiviti ini dijalankan tanpa tekanan untuk membina keyakinan murid.", "st": ["Lisan", "Bimbingan", "Keyakinan", "Sabar"]}, {"t": "💻 Pembelajaran Atas Talian", "d": "Gunakan platform seperti Quizizz, Google Forms, YouTube atau aplikasi pendidikan lain. Sediakan aktiviti interaktif yang menyeronokkan. Murid boleh mengakses di rumah atau di makmal komputer. Aktiviti ini meningkatkan literasi digital murid.", "st": ["Digital", "Interaktif", "Kendiri", "TMK"]}, {"t": "📓 Jurnal Pembelajaran", "d": "Murid menulis jurnal ringkas setiap hari tentang apa yang mereka pelajari dan apa yang masih sukar difahami. Guru membaca dan memberi komen. Aktiviti ini melatih murid mereflek pembelajaran sendiri dan mengenal pasti kelemahan.", "st": ["Refleksi", "Penulisan", "Kendiri", "Metakognisi"]}, {"t": "🎪 Stesen Pemulihan", "d": "Sediakan 3-4 stesen di dalam kelas dengan aktiviti pemulihan yang berbeza. Murid bergerak secara berkumpulan kecil dari satu stesen ke stesen lain. Setiap stesen mengambil masa 5-7 minit. Guru memantau dan membimbing di stesen yang memerlukan.", "st": ["Kumpulan kecil", "Bimbingan", "Stesen", "Pelbagai"]}, {"t": "🎯 Permainan Sasaran Kata", "d": "Lukis sasaran di papan tulis dengan titik markah. Murid membaling bola magnet atau melemparkan dart magnet ke sasaran. Mereka perlu menyebut perkataan berdasarkan tempat bola mendarat. Aktiviti ini menggabungkan pergerakan fizikal dengan pembelajaran.", "st": ["Permainan", "Sebutan", "Fizikal", "Motivasi"]}, {"t": "🧩 Puzzle Pendidikan", "d": "Gunakan puzzle gambar atau perkataan yang dipotong menjadi kepingan. Murid menyusun semula puzzle untuk membentuk gambar atau perkataan yang lengkap. Aktiviti ini mengukuhkan kemahiran membaca, mengeja dan mengenal pola.", "st": ["Puzzle", "Visual", "Kognitif", "Penyelesaian"]}, {"t": "🎤 Karaoke Pembelajaran", "d": "Murid menyanyikan lagu pembelajaran dengan lirik dipaparkan di skrin. Lirik mengandungi perkataan atau konsep yang sedang dipelajari. Murid menyanyi sambil membaca lirik. Aktiviti ini menyeronokkan dan mengukuhkan ingatan.", "st": ["Muzik", "Pengulangan", "Menyanyi", "Seronok"]}, {"t": "📋 Checklist Kendiri", "d": "Sediakan senarai semak mudah yang mengandungi kriteria yang perlu dikuasai. Murid menyemak sendiri tahap penguasaan mereka dengan menanda (✓) pada petak yang sesuai. Guru menyemak semula dan membincangkan hasilnya dengan murid.", "st": ["Kendiri", "Refleksi", "Penilaian", "Metakognisi"]}, {"t": "🎭 Main Peranan (Role Play)", "d": "Murid melakonkan situasi harian yang berkaitan dengan topik pembelajaran. Guru memberi skrip mudah atau murid boleh improvisasi. Bimbing murid dalam melafazkan dialog dengan sebutan dan intonasi yang betul. Aktiviti ini meningkatkan keyakinan.", "st": ["Lakonan", "Sosial", "Kreatif", "Bertutur"]}, {"t": "🔢 Kad Nombor Berwarna", "d": "Gunakan kad nombor berwarna untuk konsep matematik asas seperti nilai tempat, lebih besar/lebih kecil. Susun kad mengikut urutan. Bandingkan dua kad untuk menentukan nilai yang lebih besar. Aktiviti ini memudahkan kefahaman konsep matematik.", "st": ["Visual", "Matematik", "Warna", "Perbandingan"]}, {"t": "📖 Bacaan Bergambar Besar", "d": "Gunakan buku cerita bergambar besar dengan teks yang mudah dan font besar. Guru membaca sambil menunjuk pada setiap perkataan. Murid membaca bersama-sama. Bincangkan gambar untuk meningkatkan kefahaman.", "st": ["Bacaan", "Visual", "Bimbingan", "Kefahaman"]}, {"t": "🎲 Dadu Perkataan", "d": "Buat dadu besar dengan perkataan atau gambar pada setiap permukaan. Murid melambung dadu dan menyebut perkataan yang tertera pada permukaan atas. Boleh dijadikan permainan berkumpulan. Aktiviti ini menyeronokkan dan mengukuhkan kosa kata.", "st": ["Permainan", "Sebutan", "Interaktif", "Kosa kata"]}, {"t": "📝 Lembaran Kerja Imbuhan", "d": "Sediakan latihan khusus untuk imbuhan awalan (meN-, ber-, ter-) dan akhiran (-kan, -i). Gunakan gambar sebagai petunjuk. Murid melengkapkan ayat dengan imbuhan yang betul. Ulang latihan dengan pelbagai contoh ayat.", "st": ["Tatabahasa", "Latih tubi", "Struktur", "Ayat"]}, {"t": "🧑‍🤝‍🧑 Kumpulan Fokus", "d": "Kumpulkan 3-4 orang murid pemulihan dalam satu kumpulan kecil. Guru memberi bimbingan intensif secara kumpulan. Setiap murid diberi peluang untuk mencuba dan mendapat maklum balas. Aktiviti ini membolehkan guru memberi perhatian lebih.", "st": ["Kumpulan kecil", "Intensif", "Bimbingan", "Fokus"]}, {"t": "🎯 Papan Permainan Ejaan", "d": "Cipta papan permainan ejaan dengan petak-petak yang mengandungi huruf. Murid melambung dadu dan bergerak mengikut bilangan petak. Mereka perlu mengeja perkataan berdasarkan huruf yang didarat. Aktiviti ini menggabungkan permainan dengan pembelajaran ejaan.", "st": ["Ejaan", "Permainan", "Visual", "Menarik"]}, {"t": "📸 Aktiviti Fotografi", "d": "Murid mengambil gambar objek di sekitar sekolah atau rumah menggunakan tablet/telefon. Kemudian mereka melabel gambar tersebut dengan perkataan yang betul. Aktiviti ini mengaitkan pembelajaran dengan dunia sebenar dan meningkatkan kreativiti.", "st": ["Kreatif", "Visual", "Teknologi", "Dunia sebenar"]}, {"t": "🎬 Video Pendek", "d": "Murid menonton video pendek (2-3 minit) yang berkaitan dengan topik pembelajaran. Selepas menonton, murid menjawab soalan mudah secara lisan atau bertulis. Tonton semula bahagian yang sukar jika perlu.", "st": ["Visual", "Digital", "Kefahaman", "Sebutan"]}, {"t": "🧩 Teka Silang Kata", "d": "Sediakan silang kata mudah dengan gambar sebagai petunjuk. Murid mengisi ruangan kosong dengan perkataan yang betul. Aktiviti ini mengukuhkan ejaan dan kosa kata secara menyeronokkan. Boleh dijalankan secara individu atau berpasangan.", "st": ["Kosa kata", "Pengukuhan", "Puzzle", "Ejaan"]}, {"t": "📑 Kad Tugasan Harian", "d": "Sediakan kad tugasan harian dengan arahan yang jelas dan ringkas untuk murid pemulihan. Setiap kad mengandungi 2-3 tugasan mudah yang boleh diselesaikan dalam 10-15 minit. Tugasan bertambah aras secara beransur-ansur.", "st": ["Rutin", "Bimbingan", "Struktur", "Konsisten"]}, {"t": "🎤 Bacaan Berirama", "d": "Murid membaca teks pendek mengikut irama atau rap yang menarik. Guru menunjuk cara bacaan berirama. Murid mengulang dengan iringan muzik atau tepukan. Aktiviti ini meningkatkan kelancaran membaca dan keyakinan.", "st": ["Bacaan", "Irama", "Seronok", "Keyakinan"]}, {"t": "🎨 Mewarna Sambil Belajar", "d": "Sediakan lembaran mewarna yang mengandungi perkataan, huruf atau konsep yang perlu dipelajari. Murid mewarna sambil menyebut perkataan atau konsep tersebut. Aktiviti ini menggabungkan pembelajaran dengan aktiviti santai yang menenangkan.", "st": ["Mewarna", "Visual", "Santai", "Kreatif"]}, {"t": "📋 Buku Panduan Mini", "d": "Murid mencipta buku panduan mini tentang topik yang sukar difahami. Buku mengandungi definisi, gambar dan contoh. Gunakan kertas A4 yang dilipat menjadi buku kecil. Aktiviti ini membantu murid merujuk semula konsep yang telah dipelajari.", "st": ["Kreatif", "Dokumentasi", "Rujukan", "Organisasi"]}, {"t": "🤖 Pembelajaran Gamifikasi", "d": "Gunakan elemen permainan seperti lencana, mata ganjaran, tahap dan cabaran untuk meningkatkan motivasi murid pemulihan. Beri lencana untuk setiap pencapaian. Kumpul mata untuk dapatkan ganjaran. Aktiviti ini meningkatkan semangat untuk belajar.", "st": ["Gamifikasi", "Motivasi", "Digital", "Ganjaran"]}, {"t": "📞 Telefon Bual (Paper Cup Phone)", "d": "Buat telefon daripada cawan kertas dan benang. Murid bercakap melalui telefon untuk meningkatkan kemahiran lisan. Aktiviti ini menyeronokkan dan mengurangkan rasa malu untuk bercakap kerana tidak berhadapan langsung dengan rakan.", "st": ["Bertutur", "Mendengar", "Kreatif", "Seronok"]}];

@media(prefers-reduced-motion:reduce){.btn-jana,.sidebar-transition{animation:none!important;transition:none!important}}

/* ── Back to Top ── */
.back-to-top{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#C4956A,#8B5A2B);color:#fff;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 2px 12px rgba(196,149,106,0.3);transition:all .2s;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none}
.back-to-top.show{opacity:1;pointer-events:auto}
.back-to-top:hover{transform:scale(1.1);box-shadow:0 4px 20px rgba(196,149,106,0.4)}
/* ── Standardized Theme ── */
:root{--primary:#1E3A5F;--accent:#C4956A;--bg:#FFF8F0;--text:#3A2A1A;--text-light:#8B5A2B;--border:#C4956A20;--card-bg:#fff;--sidebar-bg:linear-gradient(180deg,#1E3A5F,#162D4A)}
body{background:var(--bg);color:var(--text)}
.cc-box{background:var(--card-bg);border:1.5px solid var(--accent);border-radius:.75rem;padding:.75rem;max-width:100%;word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap;line-height:1.6;width:100%;box-sizing:border-box;box-shadow:0 1px 3px rgba(196,149,106,0.08)}
.cc-box textarea,.cc-box input,.cc-box select{max-width:100%;box-sizing:border-box}
.activity-row{display:flex;gap:.5rem;width:100%;max-width:100%}
.activity-row > div:last-child{flex:1;min-width:0;max-width:100%}
.activity-row textarea{width:100%;max-width:100%;box-sizing:border-box;word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap;line-height:1.6}
.meta-chip{display:inline-flex;align-items:center;gap:.25rem;padding:.15rem .5rem;border-radius:9999px;background:var(--bg);border:1px solid var(--border);font-size:.65rem;color:var(--text-light);white-space:nowrap}
/* Mobile adjustments */
@media(max-width:640px){
  .cc-box{padding:.5rem;border-radius:.5rem}
  .activity-row{flex-direction:column;gap:.35rem}
  .activity-row > div:last-child{width:100%}
  .rph-grid{gap:.75rem}
  .meta-chip{font-size:.6rem;padding:.1rem .35rem}
}
</style>

<button onclick='document.querySelector("main").scrollTo({top:0,behavior:"smooth"})' 
style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:99999;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#C4956A,#8B5A2B);color:#fff;border:2px solid #fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;transition:transform .2s"
onmouseover='this.style.transform="scale(1.1)"' onmouseout='this.style.transform="scale(1)"'>↑</button>
</body>
</html>
