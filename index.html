<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>eRPH-PM - Rancangan Pengajaran Harian</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
<div x-data="app()" class="flex h-screen">
  <template x-teleport="body"><div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 z-30 bg-slate-900/40 backdrop-blur-sm md:hidden"></div></template>
  <aside class="sidebar-transition fixed inset-y-0 left-0 z-40 flex w-64 flex-col bg-slate-900 text-slate-100 md:static" x-bind:class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">
    <div class="flex h-16 items-center gap-2 border-b border-slate-700/50 px-5">
      <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-500 text-sm shrink-0 font-bold">R</span>
      <div><p class="text-sm font-semibold leading-tight">eRPH-PM</p><p class="text-[10px] leading-tight text-slate-400">SJK(C) PIN MIN, BIDOR</p></div>
    </div>
    <div class="border-b border-slate-700/50 p-3">
      <p class="mb-1.5 text-[10px] font-semibold uppercase tracking-wide text-slate-500">Guru</p>
      <select x-model="selectedTeacher" @change="refresh()" class="w-full rounded-lg bg-slate-800 px-2.5 py-2 text-xs text-slate-200 border border-slate-600">
        <option value="">-- Pilih --</option>
        <template x-for="(info, code) in TEACHERS" :key="code">
          <option x-bind:value="code" x-text="info.name + ' (' + code + ')' + (info.name_cn ? ' '+info.name_cn : '')"></option>
        </template>
      </select>
      <p class="mt-1.5 mb-1 text-[10px] font-semibold uppercase tracking-wide text-slate-500">Penggal</p>
      <select x-model="selectedPenggal" @change="refresh()" class="w-full rounded-lg bg-slate-800 px-2.5 py-2 text-xs text-slate-200 border border-slate-600">
        <option value="1">Penggal 1 (12 Jan - 22 Mei)</option>
        <option value="2">Penggal 2 (8 Jun - 4 Dis)</option>
      </select>
    </div>
    <nav class="flex-1 space-y-0.5 overflow-y-auto p-2">
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="switchTab(tab.id)" class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-xs font-medium transition-colors"
          x-bind:class="activeTab === tab.id ? 'bg-indigo-500/20 text-indigo-300' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'">
          <span x-text="tab.icon"></span>
          <span x-text="tab.label"></span>
          <span x-show="tab.badge" class="ml-auto rounded-full bg-indigo-500/20 px-1.5 py-0.5 text-[9px]" x-text="tab.badge"></span>
        </button>
      </template>
    </nav>
    <div class="border-t border-slate-700/50 p-3 text-center text-[9px] text-slate-600">v2.0 | Data stored locally</div>
  </aside>
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-14 items-center gap-2 border-b bg-white px-3 shadow-sm">
      <button @click="sidebarOpen = !sidebarOpen" class="rounded-lg p-1.5 text-slate-500 hover:bg-slate-100 md:hidden">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
      </button>
      <div class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
        <span x-text="tabIcon()"></span>
        <span x-text="tabLabel()"></span>
      </div>
      <div class="ml-auto flex items-center gap-2 text-xs text-slate-400">
        <span x-text="selectedTeacher ? teacherSlotCount+' slot' : 'Pilih guru'"></span>
        <template x-if="lessonPlans.length">
          <span class="rounded-full bg-indigo-100 px-2 py-0.5 text-[10px] font-medium text-indigo-700" x-text="lessonPlans.length+' RPH'"></span>
        </template>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-3 md:p-5">

      <!-- TAB: JADUAL WAKTU -->
      <section x-show="activeTab==='timetable'" x-cloak class="max-w-6xl mx-auto fade-in">
        <template x-if="!selectedTeacher">
          <div class="flex items-center justify-center h-48 text-slate-400"><p class="text-sm">Pilih guru dari sidebar untuk lihat jadual.</p></div>
        </template>
        <template x-if="selectedTeacher">
          <div>
            <div class="mb-3 flex items-center justify-between">
              <h2 class="text-base font-bold text-slate-900" x-text="selectedTeacherName"></h2>
              <button @click="generateRPH()" x-show="teacherSlots.length" class="inline-flex items-center gap-1 rounded-lg bg-indigo-600 px-3.5 py-2 text-xs font-semibold text-white shadow hover:bg-indigo-700">
                <span>+</span> Jana RPH
              </button>
            </div>
            <div class="overflow-x-auto rounded-xl border bg-white shadow-sm">
              <table class="w-full min-w-[760px] text-xs">
                <thead><tr class="border-b bg-slate-50">
                  <th class="px-1.5 py-2 text-left font-semibold text-slate-500 w-20">Masa</th>
                  <template x-for="d in DAYS" :key="d">
                    <th class="px-1.5 py-2 text-center font-semibold text-slate-500" x-text="d"></th>
                  </template>
                </tr></thead>
                <tbody>
                  <template x-for="per in PERIODS" :key="per[0]">
                    <tr class="border-b" x-bind:class="per[0]==='REHAT'?'bg-amber-50':''">
                      <td class="px-1.5 py-1 text-[10px] font-medium text-slate-400 whitespace-nowrap" x-text="per[0]+' '+per[1]+'-'+per[2]"></td>
                      <template x-for="d in DAYS" :key="d">
                        <td class="px-0.5 py-0.5 text-center border-l align-top">
                          <template x-for="slot in getSlotsFor(d, per[0])" :key="slot.class+slot.subject">
                            <div class="rounded border px-1 py-0.5 text-[10px] leading-tight mb-0.5" x-bind:class="color(slot.subject)">
                              <div class="font-semibold" x-text="slot.subjectName"></div>
                              <div class="text-[9px] opacity-70" x-text="slot.class.replace('Tahun ','Y')"></div>
                            </div>
                          </template>
                        </td>
                      </template>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </section>

      <!-- TAB: KURIKULUM -->
      <section x-show="activeTab==='kurikulum'" x-cloak class="max-w-4xl mx-auto fade-in">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <div>
            <select x-model="curriculumSubj" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium shadow-sm">
              <template x-for="s in subjectList" :key="s.code">
                <option x-bind:value="s.code" x-text="s.name"></option>
              </template>
            </select>
          </div>
          <div>
            <select x-model="curriculumYear" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium shadow-sm">
              <option value="Year 1">Tahun 1</option><option value="Year 2">Tahun 2</option><option value="Year 3">Tahun 3</option>
              <option value="Year 4">Tahun 4</option><option value="Year 5">Tahun 5</option><option value="Year 6">Tahun 6</option>
            </select>
          </div>
        </div>
        <template x-if="!curriculumUnits.length">
          <div class="flex items-center justify-center h-48 text-slate-400"><p class="text-sm">Tiada data kurikulum untuk subjek ini.</p></div>
        </template>
        <template x-if="curriculumUnits.length">
          <div class="space-y-2">
            <template x-for="(unit, i) in curriculumUnits" :key="i">
              <div class="rounded-lg border bg-white shadow-sm">
                <div @click="unit._open=!unit._open" class="flex cursor-pointer items-center justify-between px-4 py-2.5">
                  <div class="flex items-center gap-2 min-w-0">
                    <span class="shrink-0 text-slate-400 text-xs" x-text="unit._open?'v':'>'"></span>
                    <p class="text-xs font-medium text-slate-900" x-text="unit"></p>
                  </div>
                </div>
                <div x-show="unit._open" x-collapse class="border-t px-4 py-3 space-y-2 text-xs text-slate-600">
                  <p><span class="font-semibold text-slate-700">Standard Kandungan:</span> SK mengikut DSKP</p>
                  <p><span class="font-semibold text-slate-700">Standard Pembelajaran:</span> SP mengikut DSKP</p>
                  <p class="text-slate-400 italic">Rujuk DSKP untuk butiran lengkap.</p>
                </div>
              </div>
            </template>
          </div>
        </template>
      </section>

      <!-- TAB: JANA RPH -->
      <section x-show="activeTab==='generate'" x-cloak class="max-w-4xl mx-auto fade-in">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <button @click="generateRPH()" x-show="selectedTeacher" class="inline-flex items-center gap-1 rounded-lg bg-indigo-600 px-4 py-2 text-xs font-semibold text-white shadow hover:bg-indigo-700">+ Jana RPH</button>
          <button @click="insertReflections()" x-show="lessonPlans.length" class="rounded-lg border bg-amber-50 px-3 py-2 text-xs font-medium text-amber-700 hover:bg-amber-100">Sisip Refleksi</button>
          <button @click="exportAllPDF()" x-show="lessonPlans.length" class="rounded-lg border bg-white px-3 py-2 text-xs font-medium text-slate-600 hover:bg-slate-50">PDF Semua</button>
          <button @click="lessonPlans=[]" x-show="lessonPlans.length" class="rounded-lg px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50">Padam</button>
        </div>
        <template x-if="!lessonPlans.length">
          <div class="flex items-center justify-center h-48 text-slate-400"><p class="text-sm">Pilih guru dan klik Jana RPH.</p></div>
        </template>
        <template x-if="lessonPlans.length">
          <div class="space-y-3">
            <template x-for="plan in lessonPlans" :key="plan.id">
              <div class="rounded-xl border bg-white shadow-sm">
                <div @click="plan._open=!plan._open" class="flex cursor-pointer items-center justify-between border-b px-4 py-2.5">
                  <div class="min-w-0">
                    <p class="text-sm font-semibold text-slate-900 truncate" x-text="plan.subjectName+' - '+plan.class"></p>
                    <p class="text-xs text-slate-500"><span x-text="plan.day"></span> | P<span x-text="plan.period"></span> (<span x-text="plan.time"></span>) | <span x-text="plan.duration"></span> min</p>
                  </div>
                  <span class="shrink-0 text-slate-400 text-xs" x-text="plan._open?'v':'>'"></span>
                </div>
                <div x-show="plan._open" x-collapse class="px-4 py-3 space-y-3 text-xs">
                  <div class="rounded-lg bg-indigo-50 p-2.5"><span class="font-semibold text-indigo-700">Unit: </span><span class="text-indigo-900" x-text="plan.unitTitle"></span></div>

                  <div x-show="plan.sk.length"><p class="font-semibold text-slate-600 uppercase tracking-wider text-[10px]">Standard Kandungan</p><template x-for="s in plan.sk" :key="s"><p class="text-slate-600" x-text="s"></p></template></div>

                  <div x-show="plan.sp.length"><p class="font-semibold text-slate-600 uppercase tracking-wider text-[10px]">Standard Pembelajaran</p><template x-for="s in plan.sp" :key="s"><p class="text-slate-600" x-text="s"></p></template></div>

                  <div><p class="font-semibold text-indigo-600 uppercase tracking-wider text-[10px]">Objektif</p><ul class="list-disc pl-4 space-y-0.5"><template x-for="o in plan.obj" :key="o"><li class="text-slate-600" x-text="o"></li></template></ul></div>

                  <div><p class="font-semibold text-emerald-600 uppercase tracking-wider text-[10px]">Kriteria Kejayaan</p><ul class="list-disc pl-4 space-y-0.5"><template x-for="c in plan.success" :key="c"><li class="text-slate-600" x-text="c"></li></template></ul></div>

                  <div><p class="font-semibold text-indigo-600 uppercase tracking-wider text-[10px]">Aktiviti</p><div class="space-y-1.5">
                    <template x-for="(a, i) in plan.activities" :key="i">
                      <div class="flex gap-2">
                        <span class="shrink-0 flex h-6 w-6 items-center justify-center rounded-full text-[9px] font-bold" x-bind:class="aColor(a.phase)" x-text="a.phase[0]"></span>
                        <div class="flex-1 rounded border bg-slate-50 p-2">
                          <p class="font-medium text-slate-700 text-[11px]" x-text="a.phase"></p>
                          <p class="text-slate-600" x-text="a.desc"></p>
                          <p class="text-slate-400 text-[10px]"><span class="font-medium">Guru:</span> <span x-text="a.t"></span> | <span class="font-medium">Murid:</span> <span x-text="a.s"></span> | <span x-text="a.d"></span> min</p>
                        </div>
                      </div>
                    </template>
                  </div></div>

                  <div class="grid grid-cols-3 gap-2">
                    <div class="rounded border bg-slate-50 p-2"><p class="font-semibold text-slate-500 text-[10px] uppercase tracking-wider">BBM</p><template x-for="b in plan.bbm" :key="b"><span class="inline-block rounded bg-white border px-1.5 py-0.5 text-[10px] text-slate-600 mr-0.5 mb-0.5" x-text="b"></span></template></div>
                    <div class="rounded border bg-slate-50 p-2"><p class="font-semibold text-slate-500 text-[10px] uppercase tracking-wider">Nilai</p><template x-for="v in plan.nilai" :key="v"><span class="inline-block rounded bg-white border px-1.5 py-0.5 text-[10px] text-slate-600 mr-0.5 mb-0.5" x-text="v"></span></template></div>
                    <div class="rounded border bg-slate-50 p-2"><p class="font-semibold text-slate-500 text-[10px] uppercase tracking-wider">EMK</p><template x-for="e in plan.emk" :key="e"><span class="inline-block rounded bg-white border px-1.5 py-0.5 text-[10px] text-slate-600 mr-0.5 mb-0.5" x-text="e"></span></template></div>
                  </div>

                  <div x-show="plan.remedial"><p class="font-semibold text-orange-600 uppercase tracking-wider text-[10px]">Pemulihan</p><template x-for="r in plan.remedial" :key="r"><div class="rounded border border-orange-200 bg-orange-50 p-2 mb-1"><p class="font-medium text-orange-800 text-[11px]" x-text="r.title"></p><p class="text-orange-700 text-[10px]" x-text="r.desc"></p></div></template></div>

                  <div><p class="font-semibold text-slate-500 uppercase tracking-wider text-[10px]">Refleksi</p><textarea x-model="plan.reflection" class="w-full rounded border border-slate-300 bg-white p-2 text-xs focus:border-indigo-400 focus:outline-none" rows="2"></textarea></div>

                  <div class="flex gap-2 border-t pt-2">
                    <button @click.stop="copyPlan(plan)" class="rounded border bg-white px-2.5 py-1.5 text-[10px] font-medium text-slate-600 hover:bg-slate-50">Salin</button>
                    <button @click.stop="downloadPDF(plan)" class="rounded border bg-white px-2.5 py-1.5 text-[10px] font-medium text-slate-600 hover:bg-slate-50">PDF</button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>
      </section>

      <!-- TAB: REFLEKSI -->
      <section x-show="activeTab==='reflection'" x-cloak class="max-w-4xl mx-auto fade-in">
        <template x-if="!lessonPlans.length">
          <div class="flex items-center justify-center h-48 text-slate-400"><p class="text-sm">Jana RPH dahulu untuk refleksi.</p></div>
        </template>
        <template x-if="lessonPlans.length">
          <div class="space-y-3">
            <div class="flex gap-2"><button @click="insertReflections()" class="rounded-lg bg-amber-600 px-4 py-2 text-xs font-semibold text-white hover:bg-amber-700">Sisip Refleksi Semua</button></div>
            <template x-for="(plan, i) in lessonPlans" :key="plan.id">
              <div class="rounded-lg border bg-white p-3 shadow-sm">
                <p class="text-xs font-semibold text-slate-900" x-text="(i+1)+'. '+plan.subjectName+' - '+plan.class+' ('+plan.day+')'"></p>
                <textarea x-model="plan.reflection" class="mt-1 w-full rounded border border-slate-300 bg-white p-2 text-xs focus:border-indigo-400 focus:outline-none" rows="2" placeholder="Taip refleksi..."></textarea>
              </div>
            </template>
          </div>
        </template>
      </section>

    </main>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('app', () => ({
    sidebarOpen: false,
    activeTab: localStorage.getItem('ept')||'timetable',
    selectedTeacher: localStorage.getItem('epte')||'',
    selectedPenggal: parseInt(localStorage.getItem('eptg')||'1'),
    lessonPlans: [],
    curriculumSubj: localStorage.getItem('epcs')||'BM',
    curriculumYear: localStorage.getItem('epcy')||'Year 5',
    tabs: [{id:'timetable',label:'Jadual Waktu',icon:'T'},{id:'kurikulum',label:'Kurikulum',icon:'K'},{id:'generate',label:'Jana RPH',icon:'R',badge:0},{id:'reflection',label:'Refleksi',icon:'F'}],

    TEACHERS: {"TBS": {"name": "TEOH BOON SIM", "name_cn": "\u5f20\u6c76\u68ee"}, "LET": {"name": "LEE EE TING", "name_cn": "\u674e\u4f9d\u5a77"}, "HLF": {"name": "HEW LEE FUN", "name_cn": "\u4e18\u4e3d\u82ac"}, "LJX": {"name": "LIAN JUNXIANG", "name_cn": "\u8fde\u6d5a\u7fd4"}, "LSW": {"name": "LEE SHU WEN", "name_cn": "\u674e\u6dd1\u96ef"}, "WKS": {"name": "WONG KA SUIT (MELISSA)", "name_cn": "\u9ec4\u5bb6\u7166"}, "LYY": {"name": "LOOI YUN YUAN", "name_cn": "\u96f7\u6600\u82d1"}, "OWY": {"name": "ONG WEI YI", "name_cn": "\u738b\u7ef4\u4eea"}, "ARMAN": {"name": "ARMAN BIN AWANG", "name_cn": ""}, "COW": {"name": "CHONG OOI WEI", "name_cn": "\u953a\u7231\u5a9a"}, "BALKIS": {"name": "NUR BALKIS BINTI ZULKHAIRANI", "name_cn": ""}, "YH": {"name": "YOONG HAI", "name_cn": "\u718a\u6d77\u5e08"}},
    PERIODS: [["P", "07:45", "08:15"], ["1", "08:15", "08:45"], ["2", "08:45", "09:15"], ["3", "09:15", "09:45"], ["4", "09:45", "10:15"], ["REHAT", "10:15", "10:35"], ["5", "10:35", "11:05"], ["6", "11:05", "11:35"], ["7", "11:35", "12:05"], ["8", "12:05", "12:35"], ["9", "12:35", "13:05"], ["10", "13:05", "13:35"], ["11", "13:35", "14:05"], ["12", "14:05", "14:35"]],

    ACTIVITIES: {"default": {"induction": ["Aktiviti set induksi berkaitan topik.", "Soal jawab tentang pengalaman murid.", "Video pendek sebagai rangsangan.", "Permainan teka-teki.", "Bercerita tentang situasi sebenar."], "pre": ["Perkenal konsep utama menggunakan BBM.", "Perbincangan dalam kumpulan kecil.", "Latihan lisan secara kelas.", "Kad imbasan untuk pengukuhan kosa kata.", "Demonstrasi oleh guru."], "dev": ["Aktiviti berkumpulan - murid menyelesaikan tugasan.", "Latihan individu dalam buku latihan.", "Lembaran kerja secara berpasangan.", "Pembentangan hasil kerja kumpulan.", "Gallery walk dan maklum balas rakan."], "post": ["Pembentangan hasil kerja.", "Kuiz ringkas secara lisan.", "Sesi soal jawab untuk pengukuhan.", "Gallery walk.", "Rumusan oleh murid."], "closure": ["Rumusan oleh guru.", "Refleksi murid secara lisan.", "Soalan untuk menguji kefahaman.", "Latihan pengukuhan.", "Menyanyi lagu/nyanyian pengukuhan."]}, "MT": {"induction": ["Tunjuk cara menggunakan bahan maujud.", "Soal kiraan cepat secara lisan.", "Permainan matematik.", "Video konsep matematik.", "Kaitkan dengan situasi harian."], "pre": ["Ulang kaji prasyarat.", "Perkenal istilah matematik.", "Demonstrasi penggunaan alat.", "Latihan lisan secara kelas.", "Kad soalan kilat."], "dev": ["Aktiviti kumpulan menyelesaikan masalah.", "Latihan individu dalam buku latihan.", "Penggunaan alat peraga.", "Permainan matematik berkumpulan.", "Kerja projek secara berpasangan."], "post": ["Pembentangan hasil kerja kumpulan.", "Semakan jawapan secara kelas.", "Kuiz bertulis pendek.", "Perbincangan strategi penyelesaian.", "Gallery walk hasil kerja."], "closure": ["Rumusan konsep utama.", "Refleksi pemahaman murid.", "Latihan pengukuhan.", "Soalan untuk sesi akan datang.", "Permainan matematik pantas."]}, "SN": {"induction": ["Demonstrasi eksperimen ringkas.", "Soal jawab tentang fenomena alam.", "Video sains.", "Menyentuh bahan maujud.", "Pemerhatian di persekitaran."], "pre": ["Perkenal konsep sains.", "Ulang kaji prasyarat.", "Perbincangan secara berkumpulan.", "Melihat carta/gambar.", "Soal jawab lisan."], "dev": ["Eksperimen secara berkumpulan.", "Mengumpul dan merekod data.", "Menganalisis dan mentafsir data.", "Perbincangan dapatan.", "Pembentangan hasil eksperimen."], "post": ["Pembentangan dapatan.", "Kuiz sains.", "Perbincangan secara kelas.", "Gallery walk.", "Refleksi pembelajaran."], "closure": ["Rumusan secara lisan.", "Refleksi murid.", "Soalan pengukuhan.", "Kaitkan dengan kehidupan harian.", "Latihan bertulis."]}},

    subjectList: [{code:'BM',name:'Bahasa Melayu'},{code:'BC',name:'Bahasa Cina'},{code:'BI',name:'Bahasa Inggeris'},{code:'MT',name:'Matematik'},{code:'SN',name:'Sains'},{code:'PM',name:'Pendidikan Moral'},{code:'PI',name:'Pendidikan Islam'},{code:'PJ',name:'Pendidikan Jasmani'},{code:'PK',name:'Pendidikan Kesihatan'},{code:'PSV',name:'Pendidikan Seni Visual'},{code:'MZ',name:'Pendidikan Muzik'},{code:'SJ',name:'Sejarah'},{code:'RBT',name:'Reka Bentuk dan Teknologi'}],

    get teacherSlots() { return this.selectedTeacher ? (this.SLOTS[this.selectedTeacher]||[]) : []; },
    get teacherSlotCount() { return this.teacherSlots.length; },
    get selectedTeacherName() { const t=this.TEACHERS[this.selectedTeacher]; return t ? t.name+' ('+this.selectedTeacher+')' : ''; },
    getSlotsFor(d,p) { return this.teacherSlots.filter(s=>s.day===d&&(s.period===p||(s.period==='P'&&p==='P'))); },

    get curriculumUnits() { return this.UNITS[this.curriculumSubj]?.[this.curriculumYear]||[]; },

    color(c) { const m={BM:'bg-red-50 border-red-200 text-red-800',BC:'bg-amber-50 border-amber-200 text-amber-800',BI:'bg-emerald-50 border-emerald-200 text-emerald-800',MT:'bg-blue-50 border-blue-200 text-blue-800',SN:'bg-teal-50 border-teal-200 text-teal-800',PM:'bg-purple-50 border-purple-200 text-purple-800',PI:'bg-green-50 border-green-200 text-green-800',PJ:'bg-orange-50 border-orange-200 text-orange-800',PK:'bg-rose-50 border-rose-200 text-rose-800',PSV:'bg-yellow-50 border-yellow-200 text-yellow-800',MZ:'bg-indigo-50 border-indigo-200 text-indigo-800',SJ:'bg-cyan-50 border-cyan-200 text-cyan-800',RBT:'bg-violet-50 border-violet-200 text-violet-800'}; return m[c]||'bg-slate-50 border-slate-200 text-slate-700'; },
    aColor(p) { const m={'Set Induction':'bg-amber-100 text-amber-700','Pre-lesson':'bg-blue-100 text-blue-700','Lesson Development':'bg-green-100 text-green-700','Post-lesson':'bg-purple-100 text-purple-700','Closure':'bg-rose-100 text-rose-700'}; return m[p]||'bg-slate-100 text-slate-700'; },
    rand(n){return Math.floor(Math.random()*n);},
    pick(a){return a.length?a[this.rand(a.length)]:'';},
    id(){return crypto.randomUUID?.()??Date.now().toString(36)+Math.random().toString(36).slice(2);},

    refresh(){localStorage.setItem('epte',this.selectedTeacher);localStorage.setItem('eptg',this.selectedPenggal);this.$watch('lessonPlans',v=>this.tabs[2].badge=v.length,{deep:true});},
    switchTab(id){this.activeTab=id;this.sidebarOpen=false;},
    tabIcon(){const t=this.tabs.find(t=>t.id===this.activeTab);return t?t.icon:'';},
    tabLabel(){const t=this.tabs.find(t=>t.id===this.activeTab);return t?t.label:'';},

    generateRPH() {
      if(!this.selectedTeacher)return;
      const plans=[];
      this.teacherSlots.forEach(slot=>{
        const units=this.UNITS[slot.subject]?.[slot.class.replace('Tahun ','Year ')]||[];
        const unit=units.length?units[this.rand(units.length)]:slot.subjectName+' '+slot.class;
        const sk=this.SK[slot.subject]||[];
        const sp=this.SP[slot.subject]||[];
        const acts=this.ACTIVITIES[slot.subject]||this.ACTIVITIES['default'];
        const phases=['Set Induction','Pre-lesson','Lesson Development','Post-lesson','Closure'];
        const keys=['induction','pre','dev','post','closure'];
        const dur=[8,7,22,5,5];
        const tRoles=['Membimbing','Menerangkan','Memudahcara','Menilai','Merumus'];
        const sRoles=['Melibat diri','Mendengar','Melaksana','Membentang','Mereflek'];
        const p=PERIODS.find(x=>x[0]===slot.period);
        const time=p?p[1]+'-'+p[2]:'';

        plans.push({
          id:this.id(),class:slot.class,subject:slot.subject,subjectName:slot.subjectName,
          day:slot.day,period:slot.period,time,duration:slot.period==='REHAT'?0:((()=>{const q=PERIODS.find(x=>x[0]===slot.period);if(!q)return 30;const[a,b]=q[1].split(':').map(Number),[c,d]=q[2].split(':').map(Number);return(c*60+d)-(a*60+b);})()),
          unitTitle:typeof unit==='string'?unit:unit.title,
          sk:sk.slice(0,2),sp:sp.slice(0,2),
          obj:['Pada akhir PdP, murid dapat memahami dan mengaplikasikan konsep dalam topik ini.','Murid dapat menjawab soalan dan menunjukkan kefahaman.'],
          success:['Saya boleh memahami konsep.','Saya boleh menyelesaikan tugasan.','Saya boleh menerangkan kepada rakan.'],
          activities:phases.map((p,i)=>({phase:p,desc:this.pick(acts[keys[i]]||this.ACTIVITIES['default'][keys[i]]),d:dur[i],t:tRoles[i],s:sRoles[i]})),
          bbm:['Buku teks','Lembaran kerja','Alat tulis','Kad imbasan'],
          nilai:['Kerjasama','Hormat','Tanggungjawab'],
          emk:['Bahasa','Kreativiti dan Inovasi','Nilai Murni'],
          remedial:[{title:'Bimbingan Individu',desc:'Bimbingan tambahan oleh guru untuk murid yang memerlukan.'},{title:'Latihan Berstruktur',desc:'Latihan dipermudah langkah demi langkah.'}],
          reflection:'',_open:true,
        });
      });
      this.lessonPlans=[...plans,...this.lessonPlans];
      this.activeTab='generate';
    },

    insertReflections(){
      const refs={
        'Year 1':['12 murid dapat menguasai objektif. 3 murid perlukan bimbingan tambahan.','Aktiviti set induksi menarik minat murid.'],
        'Year 2':['Objektif tercapai. Murid dapat menyelesaikan tugasan.','15/18 murid mencapai objektif. 3 murid perlu pemulihan.'],
        'Year 3':['Penguasaan murid memuaskan. PdP berjalan lancar.','Majoriti dapat menguasai SP. Beberapa murid perlukan latihan tambahan.'],
        'Year 4':['Objektif PdP tercapai. Murid aktif dalam perbincangan.','PdP berjalan lancar. Murid kaitkan dengan kehidupan harian.'],
        'Year 5':['Semua murid mencapai objektif minimum. Kemahiran abad ke-21 diaplikasi.','Objektif tercapai sepenuhnya. Murid selesa dengan tugasan kumpulan.'],
        'Year 6':['Penguasaan sangat memuaskan. PdP mengikut perancangan.','Objektif tercapai. Murid aplikasikan pengetahuan dalam situasi baru.'],
      };
      this.lessonPlans.forEach(p=>{
        if(!p.reflection){const r=refs[p.class.replace('Tahun ','Year ')];if(r)p.reflection=r[this.rand(r.length)];}
      });
    },

    copyPlan(plan){
      const l=['RANCANGAN PENGAJARAN HARIAN','Guru: '+this.selectedTeacherName,'Kelas: '+plan.class+' | Subjek: '+plan.subjectName,'Hari: '+plan.day+' | Masa: '+plan.time,'','Standard Kandungan:',...plan.sk.map(s=>'  - '+s),'','Standard Pembelajaran:',...plan.sp.map(s=>'  - '+s),'','Objektif:',...plan.obj.map(o=>'  - '+o),'','Aktiviti:',...plan.activities.map(a=>'  ['+a.phase+'] '+a.desc+' ('+a.d+' min)'),'','BBM: '+plan.bbm.join(', '),'Nilai: '+plan.nilai.join(', '),'EMK: '+plan.emk.join(','),plan.reflection?'\nRefleksi:\n'+plan.reflection:'','','Dijana oleh eRPH-PM'];
      navigator.clipboard.writeText(l.join('\n'));
    },

    esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;},
    pdfHtml(plan){
      const e=this.esc;
      return '<div style="font-family:sans-serif;max-width:210mm;margin:0 auto;padding:1.5cm">'
        +'<div style="border-bottom:3px solid #4f46e5;padding-bottom:.75rem;margin-bottom:1rem">'
        +'<h1 style="font-size:1.3rem;font-weight:700;margin:0">RANCANGAN PENGAJARAN HARIAN</h1>'
        +'<div style="font-size:.8rem;color:#64748b;margin-top:.25rem">'+e(plan.subjectName)+' | '+e(plan.class)+' | '+e(plan.day)+' | '+e(plan.time)+'</div>'
        +'<div style="font-size:.7rem;color:#94a3b8;margin-top:.1rem">Guru: '+e(this.selectedTeacherName)+'</div></div>'
        +(plan.sk.length?'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">Standard Kandungan</h2>'+plan.sk.map(s=>'<span style="background:#f1f5f9;border-radius:999px;padding:2px 8px;font-size:.7rem;color:#475569;display:inline-block;margin:2px">'+e(s)+'</span>').join('')+'</div>':'')
        +(plan.sp.length?'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">Standard Pembelajaran</h2>'+plan.sp.map(s=>'<span style="background:#f1f5f9;border-radius:999px;padding:2px 8px;font-size:.7rem;color:#475569;display:inline-block;margin:2px">'+e(s)+'</span>').join('')+'</div>':'')
        +'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">Objektif</h2><ul style="list-style:none;padding:0">'+plan.obj.map(o=>'<li style="padding:2px 0;font-size:.75rem;padding-left:1rem">'+e(o)+'</li>').join('')+'</ul></div>'
        +'<div style="margin-top:.5rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.3rem">Aktiviti</h2>'+plan.activities.map(a=>'<div style="border:1px solid #e2e8f0;border-radius:6px;padding:6px;margin-bottom:5px"><p style="font-size:.75rem;font-weight:600;color:#4f46e5;margin:0">'+e(a.phase)+' <span style="font-size:.65rem;color:#94a3b8;font-weight:400">- '+a.d+' min</span></p><p style="font-size:.7rem;color:#475569;margin:0">'+e(a.desc)+'</p></div>').join('')+'</div>'
        +'<div style="margin-top:.5rem;display:flex;gap:.5rem;flex-wrap:wrap;font-size:.7rem;color:#475569"><div><strong>BBM:</strong> '+plan.bbm.map(s=>e(s)).join(', ')+'</div><div><strong>Nilai:</strong> '+plan.nilai.map(s=>e(s)).join(', ')+'</div><div><strong>EMK:</strong> '+plan.emk.map(s=>e(s)).join(', ')+'</div></div>'
        +(plan.reflection?'<div style="margin-top:.5rem;border-top:2px solid #e2e8f0;padding-top:.4rem"><h2 style="font-size:.8rem;font-weight:700;color:#4f46e5;margin-bottom:.2rem">Refleksi</h2><p style="font-size:.75rem;color:#475569;font-style:italic">'+e(plan.reflection)+'</p></div>':'')
        +'<div style="margin-top:.75rem;padding-top:.4rem;border-top:1px solid #e2e8f0;font-size:.6rem;color:#94a3b8;text-align:center">Dijana oleh eRPH-PM | SJK(C) PIN MIN, BIDOR STESEN, PERAK</div></div>';
    },
    downloadPDF(plan){this.openPDF(this.pdfHtml(plan),'RPH_'+plan.subject+'_'+plan.class.replace(' ','')+'_'+plan.day+'.pdf');},
    exportAllPDF(){if(!this.lessonPlans.length)return;const p=this.lessonPlans.map((pl,i)=>'<div style="'+(i<this.lessonPlans.length-1?'page-break-after:always;':'')+'page-break-inside:avoid">'+this.pdfHtml(pl)+'</div>').join('');this.openPDF(p,'eRPH_PM_All.pdf');},
    openPDF(h,n){const w=window.open('','_blank');if(!w){alert('Sila benarkan popup.');return;}
      w.document.write('<!DOCTYPE html><html><head><meta charset=UTF-8><title>'+n+'</title><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><'+'/script></head><body style="margin:0;padding:0;font-family:sans-serif">'+h+'<script>setTimeout(function(){html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:'+JSON.stringify(n)+',image:{type:"jpeg",quality:0.98},html2canvas:{scale:2,useCORS:true,logging:false},jsPDF:{unit:"in",format:"a4",orientation:"portrait"}}).from(document.body).save().then(function(){window.close()})["catch"](function(){window.close()})},500)<'+'/script></body></html>');w.document.close();},

    init(){
      this.$watch('activeTab',v=>localStorage.setItem('ept',v));
      this.$watch('curriculumSubj',v=>localStorage.setItem('epcs',v));
      this.$watch('curriculumYear',v=>localStorage.setItem('epcy',v));
      this.$watch('lessonPlans',v=>{this.tabs[2].badge=v.length;},{deep:true});
    },
  }));
});
