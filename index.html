<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🇲🇾 eRPH-PM - Rancangan Pengajaran Harian Malaysia</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="curriculum-db.js"></script>
</head>
<body class="bg-[#FFF8F0] text-[#3A2A1A] font-sans antialiased" x-data="app()">
<div class="flex h-screen">
  <aside class="sidebar-transition fixed inset-y-0 left-0 z-40 flex w-72 flex-col text-white md:static" x-bind:class="sO?'translate-x-0':'-translate-x-full md:translate-x-0'" style="background:linear-gradient(180deg,#1E3A5F,#162D4A)">
    <div class="flex h-14 items-center gap-2 border-b border-white/10 px-4"><span class="flex h-8 w-8 items-center justify-center rounded-xl bg-[#C4956A] text-sm font-bold">🇲🇾</span><div><p class="text-sm font-semibold">eRPH-PM</p><p class="text-[9px] text-blue-200/70">SJK(C) PIN MIN, BIDOR</p></div></div>
    <div class="border-b border-white/10 p-3"><p class="mb-1.5 text-[10px] font-semibold uppercase tracking-wide text-blue-300/50">👨‍🏫 Guru</p>
      <select x-model="tg" @change="sv()" class="w-full rounded-lg bg-slate-800/50 px-2.5 py-2 text-xs text-slate-200 border border-slate-600"><option value="">-- Pilih Guru --</option><template x-for="(info,code) in D.TEACHERS" :key="code"><option :value="code" x-text="info.n+' ('+code+')'+(info.c?' '+info.c:'')"></option></template></select>
    </div>
    <nav class="flex-1 space-y-0.5 overflow-y-auto p-2">
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="sw(tab.id)" class="flex w-full items-center gap-2 rounded-lg px-3 py-2.5 text-xs font-medium transition-colors" :class="a===tab.id?'bg-[#C4956A]/20 text-[#C4956A]':'text-blue-200/80 hover:bg-white/10 hover:text-white'"><span x-text="tab.i"></span><span x-text="tab.l"></span><span x-show="tab.c" class="ml-auto rounded-full bg-[#C4956A]/20 px-1.5 py-0.5 text-[9px] text-[#C4956A]" x-text="tab.c"></span></button>
      </template>
    </nav>
    <div class="border-t border-white/10 p-3 text-center text-[9px] text-blue-300/40">🇲🇾 v4.0 | Dibuat dengan ❤️ kat Malaysia</div>
  </aside>
  <div class="flex min-w-0 flex-1 flex-col">
    <header class="flex h-14 items-center gap-2 border-b border-[#C4956A]/10 bg-[#FFF8F0]/95 backdrop-blur-md px-3 shadow-sm">
      <button @click="sO=!sO" class="rounded-lg p-1.5 text-[#8B5A2B] hover:bg-[#C4956A]/10 md:hidden"><svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button>
      <div class="flex items-center gap-1.5 text-xs font-medium text-[#8B5A2B]"><span x-text="tI()"></span><span x-text="tL()"></span></div>
      <div class="ml-auto flex items-center gap-2 text-xs text-[#8B5A2B]/60"><span x-text="tg?sl().length+' slot':''"></span><template x-if="rph.length"><span class="rounded-full bg-[#C4956A]/20 px-2 py-0.5 text-[10px] font-medium text-[#8B5A2B]" x-text="rph.length+' RPH'"></span></template></div>
    </header>
  <button onclick="window.scrollTo({top:0,behavior:'smooth'})" class="back-to-top" id="backToTop">↑</button>
  <script>
    window.addEventListener('scroll',function(){var b=document.getElementById('backToTop');if(b){if(window.scrollY>300)b.classList.add('show');else b.classList.remove('show');}});
  </script>
  <main class="flex-1 overflow-y-auto p-2 md:p-4">

      <!-- 📅 JADUAL -->
      <section x-show="a==='tt'" x-cloak class="max-w-6xl mx-auto">
        <template x-if="!tg"><div class="flex h-48 items-center justify-center text-[#8B5A2B]/60 text-sm">👈 Pilih guru dari sidebar untuk lihat jadual.</div></template>
        <template x-if="tg">
          <div><div class="mb-2 flex items-center justify-between"><h2 class="text-base font-bold text-[#3A2A1A]">📅 Jadual Waktu: <span x-text="tN()"></span></h2><button @click="gen()" x-show="sl().length" class="btn-jana inline-flex items-center gap-1 rounded-lg px-3.5 py-2 text-xs font-semibold text-white shadow-md" style="background:linear-gradient(135deg,#C4956A,#8B5A2B)">⚡ Jana RPH</button></div>
          <div class="overflow-x-auto rounded-xl border border-[#C4956A]/20 bg-white shadow-sm"><table class="w-full min-w-[760px] text-xs"><thead><tr class="border-b bg-[#FFF8F0]"><th class="px-1.5 py-2 text-left font-semibold text-[#8B5A2B] w-20">⏰ Masa</th><template x-for="d in D.DAYS" :key="d"><th class="px-1.5 py-2 text-center font-semibold text-[#8B5A2B]"><div x-text="d"></div><div class="text-[9px] font-normal opacity-60" x-text="dayDate(d)"></div></th></template></tr></thead>
          <tbody><template x-for="per in D.PERIODS" :key="per[0]"><tr class="border-b border-[#C4956A]/10" :class="per[0]==='REHAT'?'bg-amber-50/50':''"><td class="px-1.5 py-1 text-[10px] font-medium text-[#8B5A2B]/60" x-text="per[0]+' '+per[1]+'-'+per[2]"></td><template x-for="d in D.DAYS" :key="d"><td @click="editSlot(tg,d,per[0])" class="px-0.5 py-0.5 text-center border-l border-[#C4956A]/10 align-top cursor-pointer hover:bg-[#C4956A]/5 transition-colors min-h-[32px]"><template x-for="s in gS(d,per[0])" :key="s.c+s.s"><div class="rounded border px-1 py-0.5 text-[10px] leading-tight mb-0.5" :class="clr(s.s)"><div class="font-semibold text-[9px]" x-text="s.n"></div><div class="text-[8px] opacity-70" x-text="s.c.replace('Tahun ','Y')"></div></div></template></td></template></tr></template></tbody></table></div><p class="mt-1 text-[9px] text-[#8B5A2B]/40 italic">💡 Klik pada petak kosong untuk tambah subjek</p></div>
        </template>
      </section>

      <!-- ⚡ JANA RPH -->
      <section x-show="a==='rph'" x-cloak class="max-w-4xl mx-auto">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <button @click="gen()" x-show="tg" class="inline-flex items-center gap-1 rounded-lg px-4 py-2 text-xs font-semibold text-white shadow-md" style="background:linear-gradient(135deg,#C4956A,#8B5A2B)">⚡ Jana RPH</button>
          <select x-model="currentWeek" @change="sv()" class="rounded-lg border border-[#C4956A]/20 bg-white px-2 py-1.5 text-xs font-medium text-[#3A2A1A]"><option value="">📅 Pilih Minggu</option><template x-for="w in D.TAKWIM" :key="w.m"><option :value="w.m" x-text="(w.l?w.l:'Minggu '+w.m+' ('+w.s+' - '+w.e+')')" :disabled="w.m===0"></option></template></select>
          <button @click="iRef()" x-show="rph.length" class="inline-flex items-center gap-1 rounded-lg border border-amber-300 bg-amber-50 px-3 py-2 text-xs font-medium text-amber-700 hover:bg-amber-100">💬 Sisip Refleksi</button>
          <button @click="pAll()" x-show="rph.length" class="inline-flex items-center gap-1 rounded-lg border border-[#C4956A]/20 bg-white px-3 py-2 text-xs font-medium text-[#8B5A2B] hover:bg-[#FFF8F0]">📄 PDF Semua</button>
          <button @click="rph=[];sv()" x-show="rph.length" class="rounded-lg px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50">🗑️ Padam</button>
        </div>
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-[#8B5A2B]/60 text-sm">⚡ Pilih guru dan minggu, kemudian Jana RPH.</div></template>
        <template x-if="rph.length"><div class="space-y-4"><template x-for="(p,i) in rph" :key="p.id">
<div>
  <div x-show="i===0||rph[i-1].d!==p.d" class="day-divider border-l-4" 
    :style="'border-left-color:'+({Isnin:'#60a5fa',Selasa:'#fb923c',Rabu:'#4ade80',Khamis:'#a78bfa',Jumaat:'#fb7185'})[p.d]+';background:'+({Isnin:'#eff6ff',Selasa:'#fff7ed',Rabu:'#f0fdf4',Khamis:'#faf5ff',Jumaat:'#fff1f2'})[p.d]">
    <span style="font-size:1.3rem" x-text="({Isnin:'🌙',Selasa:'🔥',Rabu:'💡',Khamis:'⭐',Jumaat:'🌙'})[p.d]||'📅'"></span>
    <span style="font-weight:800;font-size:1.1rem;text-transform:uppercase;letter-spacing:.05em" x-text="p.d"></span>
    <span style="margin-left:auto;font-size:.85rem;font-weight:501;opacity:.7" x-text="('Minggu '+p._wk)"></span>
  </div>
          <div @click="p.o=!p.o" class="flex cursor-pointer items-center justify-between border-b border-[#C4956A]/10 px-3 py-2 sm:px-4 sm:py-2.5 gap-2"><div class="min-w-0 flex-1"><p class="text-sm font-semibold text-[#3A2A1A] truncate">📚 <span x-text="p.sn+' | '+p.c"></span></p><div class="cc-header-mobile text-xs text-[#8B5A2B]/70 mt-0.5"><span>📅 M<span x-text="p._wk"></span></span><span>|</span><span x-text="p.d"></span><span>|</span><span>⏰ P<span x-text="p.per"></span></span><span>(<span x-text="p.tm"></span>)</span><span>|</span><span class="meta-chip" x-text="p.dr+'min'"></span></div></div><span class="shrink-0 text-[#C4956A] text-xs ml-1" x-text="p.o?'▼':'▶'"></span></div>
          <div x-show="p.o" x-collapse class="p-4 space-y-4 text-xs">
            <div><p class="font-semibold text-[#C4956A] text-[11px]">📖 Unit</p><input type="text" x-model="p.unit" class="w-full rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-2 text-xs font-medium text-[#3A2A1A]"></div>
            <div><div class="flex items-center justify-between"><p class="font-semibold text-[#3A2A1A] text-[10px]">📋 Standard Kandungan</p><button @click="p.sk.push('')" class="text-[#C4956A] text-[10px]">+ Tambah</button></div><template x-for="(sk,i) in p.sk" :key="i"><div class="flex gap-1 mt-1"><select x-model="p.sk[i]" class="flex-1 rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-1.5 text-xs"><template x-for="o in skOpts(p)" :key="o"><option :value="o" x-text="o" :selected="o===p.sk[i]"></option></template></select><button @click="p.sk.splice(i,1)" class="text-red-400 text-[10px]" x-show="p.sk.length>1">✕</button></div></template></div>
            <div><div class="flex items-center justify-between"><p class="font-semibold text-[#3A2A1A] text-[10px]">🎯 Standard Pembelajaran</p><button @click="p.sp.push('')" class="text-[#C4956A] text-[10px]">+ Tambah</button></div><template x-for="(sp,i) in p.sp" :key="i"><div class="flex gap-1 mt-1"><select x-model="p.sp[i]" class="flex-1 rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-1.5 text-xs"><template x-for="o in spOpts(p)" :key="o"><option :value="o" x-text="o" :selected="o===p.sp[i]"></option></template></select><button @click="p.sp.splice(i,1)" class="text-red-400 text-[10px]" x-show="p.sp.length>1">✕</button></div></template></div>
            <div><p class="font-semibold text-[#8B5A2B] text-[10px]">🎯 Objektif</p><div class="cc-box mt-1 space-y-1"><template x-for="(o,i) in p.obj" :key="i"><textarea x-model="p.obj[i]" class="w-full rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-1.5 text-xs mt-1" rows="1"></textarea></template></div>
            <div><p class="font-semibold text-emerald-600 text-[10px]">✅ Kriteria Kejayaan</p><template x-for="(k,i) in p.kj" :key="i"><textarea x-model="p.kj[i]" class="w-full rounded-lg border border-[#C4956A]/20 bg-[#FFF8F0] p-1.5 text-xs mt-1" rows="1"></textarea></template></div>
            <div><p class="font-semibold text-[#8B5A2B] text-[10px]">📝 Aktiviti</p><div class="space-y-2 mt-1"><template x-for="(a,i) in p.acts" :key="i"><div class="activity-row"><span class="shrink-0 flex h-7 w-7 items-center justify-center rounded-full text-[10px] font-bold mt-0.5 flex-shrink-0" :class="aC(a.ph)" x-text="a.ph.match(/[\u{1F000}-\u{1FFFF}]/u)?.[0]||'?'"></span><div class="cc-box"><div class="flex items-center justify-between gap-2 mb-1"><span class="font-medium text-[#3A2A1A] text-[11px]" x-text="a.ph"></span><span class="text-[10px] text-[#8B5A2B]/60 meta-chip" x-text="a.dr+' min'"></span></div><textarea x-model="a.d" class="w-full border-0 bg-transparent p-0 text-xs resize-none focus:outline-none" rows="2" style="word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap;line-height:1.6;min-height:2.5em"></textarea><div class="flex gap-2 mt-2 pt-2 border-t border-[#C4956A]/10"><input type="text" x-model="a.t" class="flex-1 rounded-md border border-[#C4956A]/20 bg-[#FFF8F0] px-2 py-1 text-[10px]" placeholder="👩‍🏫 Guru"><input type="text" x-model="a.s" class="flex-1 rounded-md border border-[#C4956A]/20 bg-[#FFF8F0] px-2 py-1 text-[10px]" placeholder="🙋 Murid"></div></div></div></template><p class="font-semibold text-orange-600 text-[10px]">🩺 Pemulihan</p><div class="space-y-1.5 mt-1"><template x-for="(r,i) in p.rem" :key="i"><div class="rounded-lg border border-orange-200 bg-orange-50 p-2"><textarea x-model="r.t" class="w-full rounded border border-orange-200 bg-white p-1 text-[11px] font-medium text-orange-800" rows="1"></textarea><textarea x-model="r.d" class="w-full rounded border border-orange-200 bg-white p-1 text-[10px] text-orange-700 mt-1" rows="2"></textarea></div></template></div></div>
            <div><p class="font-semibold text-amber-700 text-[10px] mb-1">💬 Refleksi</p><textarea x-model="p.ref" class="w-full rounded-lg border-2 border-amber-200 bg-amber-50 p-3 text-xs text-[#78350f] focus:border-amber-400" rows="3" placeholder="💬 Taip refleksi..."></textarea></div>
            <div class="border-t border-[#C4956A]/10 pt-2 mt-2">
              <div class="flex items-center justify-between mb-1">
                <p class="font-semibold text-indigo-700 text-[10px] uppercase">📊 Rekod Transit</p>
                <button @click.stop="genTP(p)" class="rounded border border-indigo-300 bg-indigo-50 px-2 py-0.5 text-[9px] font-medium text-indigo-700 hover:bg-indigo-100">🎲 Jana TP</button>
              </div>
              <div>
                <div class="overflow-x-auto rounded-lg border border-indigo-200 bg-white text-xs">
                <table class="w-full min-w-[350px]">
                  <thead><tr class="border-b bg-indigo-50">
                    <th class="px-2 py-1 text-left font-semibold text-indigo-600 w-8">#</th>
                    <th class="px-2 py-1 text-left font-semibold text-indigo-600">Nama</th>
                    <th class="px-2 py-1 text-center font-semibold text-indigo-600 w-12">TP</th>
                    <th class="px-2 py-1 text-left font-semibold text-indigo-600">Catatan</th>
                  </tr></thead>
                  <tbody><template x-for="(s,si) in p._students" :key="si">
                    <tr class="border-b last:border-0 hover:bg-indigo-50/50">
                      <td class="px-2 py-1 text-center text-indigo-400 text-[10px]" x-text="si+1"></td>
                      <td class="px-2 py-1"><input type="text" x-model="s.n" class="w-full min-w-[90px] rounded border-0 bg-transparent p-0 text-xs font-medium text-slate-700 focus:outline-none"></td>
                      <td class="px-2 py-1 text-center">
                        <select x-model="s.tp" class="w-9 rounded border border-indigo-200 bg-white px-0 py-0.5 text-center text-xs font-bold focus:border-indigo-400">
                          <template x-for="tp in 6" :key="tp"><option :value="tp" x-text="tp"></option></template>
                        </select>
                      </td>
                      <td class="px-2 py-1"><input type="text" x-model="s.c" class="w-full min-w-[80px] rounded border-0 bg-transparent p-0 text-[10px] text-amber-700 placeholder-slate-300 focus:outline-none" placeholder="Intervensi..."></td>
                    </tr>
                  </template></tbody>
                </table>
                </div>
              </div>
              <button @click.stop="p._tpOpen=!p._tpOpen;if(p._tpOpen&&!p._tpInit){p._tpInit=true;const y=p.c==='Prasekolah'?'Prasekolah':p.c.replace('Tahun ','Year ');const ns=STUDENTS[y]||[];p._students=ns.map(n=>{const tp=Math.floor(Math.random()*6)+1;return{n,tp,c:tp<=2?'Bimbingan tambahan dalam kemas asas.':tp<=4?'Bimbingan sederhana.':'Aktiviti pengayaan.'};});}" class="mt-1 inline-flex items-center gap-1 rounded border border-indigo-300 bg-indigo-50 px-2.5 py-1 text-[10px] font-medium text-indigo-700 hover:bg-indigo-100">📊 Buka Rekod Transit</button>
            </div>
            <div class="flex flex-wrap gap-2 border-t border-[#C4956A]/10 pt-3">
              <button @click.stop="ref1(p)" class="rounded-lg border border-amber-300 bg-amber-50 px-3 py-1.5 text-[10px] font-medium text-amber-700 hover:bg-amber-100">💬 Jana Refleksi</button>
              <button @click.stop="cp(p)" class="rounded-lg border border-[#C4956A]/20 bg-white px-3 py-1.5 text-[10px] font-medium text-[#8B5A2B] hover:bg-[#FFF8F0]">📋 Salin</button>
              <button @click.stop="pdf1(p)" class="rounded-lg border border-[#C4956A]/20 bg-white px-3 py-1.5 text-[10px] font-medium text-[#8B5A2B] hover:bg-[#FFF8F0]">📄 PDF</button>
              <button @click.stop="rph=rph.filter(x=>x.id!==p.id);sv()" class="rounded-lg px-3 py-1.5 text-[10px] font-medium text-red-500 hover:bg-red-50">🗑️ Padam</button>
            </div>
          </div>
        </div></template></div></template>
      </section>

      <!-- 📚 KURIKULUM -->
      <section x-show="a==='kur'" x-cloak class="max-w-4xl mx-auto">
        <div class="mb-3"><h2 class="text-base font-bold text-[#3A2A1A]">📚 DSKP Curriculum Standards</h2><p class="text-xs text-[#8B5A2B]/60">Browse Content Standards (SK) and Learning Standards (SP) from official KSSR DSKP documents.</p></div>
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <select x-model="cs" @change="sv()" class="rounded-lg border border-[#C4956A]/20 bg-white px-3 py-1.5 text-xs font-medium text-[#3A2A1A]"><template x-for="s in D.SUBJECTS" :key="s.c"><option :value="s.c" x-text="s.n"></option></template></select>
          <select x-model="cy" @change="sv()" class="rounded-lg border border-[#C4956A]/20 bg-white px-3 py-1.5 text-xs font-medium text-[#3A2A1A]"><template x-for="y in ['Year 1','Year 2','Year 3','Year 4','Year 5','Year 6']" :key="y"><option :value="y" x-text="y.replace('Year ','Tahun ')"></option></template></select>
        </div>
        <template x-if="!gSK().length"><div class="flex h-48 items-center justify-center text-[#8B5A2B]/60 text-sm">📚 Tiada data.</div></template>
        <template x-if="gSK().length">
          <div class="space-y-3">
            <div class="rounded-lg border border-[#C4956A]/20 bg-white shadow-sm">
              <div @click="_skOpen=!_skOpen" class="flex cursor-pointer items-center justify-between px-4 py-2.5 bg-[#FFF8F0] rounded-t-lg border-b border-[#C4956A]/10"><p class="text-xs font-bold text-[#8B5A2B]">📋 SK — <span x-text="gSK().length"></span></p><span class="text-xs text-[#C4956A]" x-text="_skOpen?'▼':'▶'"></span></div>
              <div x-show="_skOpen" x-collapse class="px-4 py-3 space-y-2 max-h-80 overflow-y-auto"><template x-for="(sk,i) in gSK()" :key="i"><div class="flex gap-2 text-xs text-[#3A2A1A]/80 border-b border-[#C4956A]/5 pb-1.5"><span class="shrink-0 font-mono font-bold text-[#C4956A]" x-text="'SK'+(i+1)"></span><span x-text="sk"></span></div></template></div>
            </div>
            <div class="rounded-lg border border-[#C4956A]/20 bg-white shadow-sm">
              <div @click="_spOpen=!_spOpen" class="flex cursor-pointer items-center justify-between px-4 py-2.5 bg-[#FFF8F0] rounded-t-lg border-b border-[#C4956A]/10"><p class="text-xs font-bold text-emerald-700">🎯 SP — <span x-text="gSP().length"></span></p><span class="text-xs text-[#C4956A]" x-text="_spOpen?'▼':'▶'"></span></div>
              <div x-show="_spOpen" x-collapse class="px-4 py-3 space-y-2 max-h-96 overflow-y-auto"><template x-for="(sp,i) in gSP()" :key="i"><div class="flex gap-2 text-xs text-[#3A2A1A]/80 border-b border-[#C4956A]/5 pb-1.5"><span class="shrink-0 font-mono font-bold text-emerald-600" x-text="'SP'+(i+1)"></span><span x-text="sp"></span></div></template></div>
            </div>
          </div>
        </template>
      </section>

      <!-- 💬 REFLEKSI -->
      <section x-show="a==='ref'" x-cloak class="max-w-4xl mx-auto">
        <template x-if="!rph.length"><div class="flex h-48 items-center justify-center text-[#8B5A2B]/60 text-sm">⚡ Jana RPH dahulu.</div></template>
        <template x-if="rph.length">
          <div><div class="mb-3 flex gap-2"><button @click="iRef()" class="inline-flex items-center gap-1 rounded-lg px-4 py-2 text-xs font-semibold text-white shadow-md" style="background:linear-gradient(135deg,#C4956A,#8B5A2B)">💬 Sisip Refleksi</button></div>

saikan tugasan. Suasana pembelajaran yang positif dan kondusif dapat dilihat sepanjang sesi.", "Objektif PdP tercapai dengan cemerlang. Murid dapat menguasai kemahiran bertutur dengan yakin terutamanya semasa sesi pembentangan dan main peranan. Aktiviti main peranan yang dijalankan sangat membantu murid meningkatkan keyakinan diri dan kemahiran berkomunikasi dalam bahasa yang betul.", "Murid menunjukkan sikap yang sangat positif dan minat yang tinggi terhadap pembelajaran. PdP berjalan lancar mengikut perancangan. Pentaksiran formatif yang dijalankan secara berterusan menunjukkan perkembangan positif dari segi penguasaan murid terhadap standard pembelajaran yang ditetapkan.", "PdP hari ini berjaya mencapai objektif yang ditetapkan dengan jayanya. Murid dapat bekerja secara berkumpulan dan individu dengan baik. Mereka menunjukkan disiplin yang tinggi semasa menjalankan aktiviti dan mendengar arahan guru dengan teliti. Hasil kerja yang dihasilkan juga berkualiti.", "Objektif PdP tercapai dengan memuaskan. Murid dapat mengenal pasti dan memahami konsep yang diajar dengan baik terutamanya selepas aktiviti hands-on dijalankan. Latihan pengukuhan akan diberikan untuk memantapkan lagi kefahaman murid terhadap topik yang dipelajari pada hari ini.", "Murid seronok dengan aktiviti yang disediakan pada hari ini. Mereka dapat belajar dalam suasana yang menyeronokkan dan tidak tertekan. PdP berjalan lancar dengan penglibatan aktif daripada murid. Mereka tidak segan untuk bertanya dan memberi pendapat semasa sesi perbincangan dijalankan.", "PdP berjalan lancar mengikut perancangan yang telah ditetapkan. Murid dapat menguasai kemahiran yang diajar dengan baik. Refleksi murid pada akhir sesi menunjukkan mereka memahami isi pelajaran yang disampaikan dan dapat menghubungkaitkan dengan pengetahuan sedia ada.", "Objektif PdP tercapai dengan baik. Murid dapat menjawab soalan yang dikemukakan dengan betul terutamanya soalan pemahaman dan aplikasi. Aktiviti pengayaan dan pemulihan telah dijalankan mengikut keperluan murid bagi memastikan setiap murid mendapat manfaat yang optimum daripada sesi PdP.", "Majoriti murid menunjukkan perkembangan positif dalam pembelajaran. Walau bagaimanapun, beberapa orang murid masih memerlukan bimbingan tambahan terutamanya dalam kemahiran menulis dan membaca. Sesi PdP akan datang akan memberi lebih fokus kepada aktiviti pemulihan untuk murid-murid yang masih lemah.", "PdP hari ini sangat memberangsangkan. Murid dapat menguasai objektif pembelajaran dengan cemerlang tanpa sebarang masalah. Aktiviti yang pelbagai dan interaktif yang dijalankan sepanjang sesi berjaya membantu proses pembelajaran murid dan menjadikan pengalaman pembelajaran lebih bermakna dan menyeronokkan."], "en": ["12 pupils achieved the learning objectives today. 3 pupils need additional guidance especially in reading and writing skills. The set induction activity using video and questioning successfully engaged pupils. Teaching pace needs to be adjusted next session to ensure all pupils can follow the lesson smoothly. Various teaching aids should be used to maintain pupil focus throughout the session.", "Learning objectives achieved successfully. Pupils completed the given tasks well especially in group activities. They showed high cooperative spirit while completing projects. Time management needs to be more efficient as group activities took quite long. Hands-on activities greatly helped pupils understand abstract concepts more clearly.", "15 out of 18 pupils achieved the set learning objectives. Three pupils need individual remedial activities in the next session. The learn-through-play approach was very effective and successfully attracted pupils' interest. They could remember concepts more easily through fun and interactive activities.", "Pupil mastery today was satisfactory. The lesson proceeded as planned without any disruptions. Pupils cooperated well throughout the session and actively participated in discussions. The teaching aids provided helped improve pupils' understanding of the topic taught. Reinforcement exercises will be given to further consolidate pupils' understanding.", "The majority of pupils mastered the prescribed learning standards. A few pupils still need additional practice especially in writing grammatically correct sentences. Group activities successfully improved pupils' collaborative and communication skills. They helped each other and shared ideas in completing the given tasks.", "Learning objectives fully achieved. Pupils were active in discussions and contributed brilliant ideas during the gallery walk activity. Formative assessment conducted continuously showed positive progress in pupils' understanding. The 21st century learning approach applied successfully increased pupils' active engagement in the lesson.", "The lesson went well and achieved the set objectives. Pupils could relate learning to their daily lives especially during the brainstorming session. The gallery walk activity was very effective in increasing pupil engagement and providing opportunities for peer learning. Pupils also provided constructive feedback to their friends.", "All pupils achieved the minimum set objectives today. 21st century learning was applied through activities like Think-Pair-Share and Gallery Walk. Pupil reflections at the end of the session showed good understanding of the topic learned. Pupils could also connect new knowledge with their prior experience.", "Learning objectives achieved excellently. Pupils completed group tasks well and showed high creativity. Higher order thinking skills (HOTS) were incorporated into problem-solving activities and pupils applied them well. They successfully generated creative and innovative ideas throughout the session.", "Pupil mastery was very satisfactory. The lesson followed the plan well with time allocated properly for each activity. Pupils are ready for the next learning session and showed high interest to continue learning. The use of various teaching techniques like simulation and role-play successfully maintained pupil interest.", "Objectives achieved well. Pupils could apply the knowledge learned in new situations especially during problem-solving activities. Reinforcement exercises given as homework to further strengthen pupils' understanding. Teacher will check the exercises next session and provide constructive feedback.", "10 pupils achieved mastery level 4 and above. 5 pupils are still at level 3 and need additional practice. Remedial activities will be conducted next session focusing on individual pupil needs. Teacher will prepare special worksheets and provide close guidance for these pupils.", "The lesson went smoothly and was enjoyable. Pupils enjoyed the activities provided especially the interactive language games. Various colorful teaching aids helped improve pupils' understanding of the concepts taught. Pupils were more enthusiastic to learn in a cheerful atmosphere.", "Learning objectives achieved successfully. Pupils cooperated in groups and completed the given tasks on time. Peer assessment conducted went well and pupils provided constructive feedback to their friends. This activity also helped improve pupils' social skills.", "Pupils showed very high interest in the topic taught today. They actively asked questions and gave opinions during the discussion session. The next lesson needs to continue with more challenging activities to meet the needs of excellent pupils while remedial activities need to be prepared for weak pupils.", "Today's lesson went well with 80% of pupils achieving the set objectives. Additional guidance was given to weak pupils individually during remedial activities. Enrichment activities were given to excellent pupils to challenge their thinking. This differentiated learning approach successfully met the diverse learning needs of pupils.", "Various interactive learning activities successfully helped maintain pupil interest throughout the lesson. They did not feel bored and were always actively engaged. The lesson proceeded according to plan and allocated time. Pupils cooperated well and listened to teacher instructions carefully.", "Learning objectives achieved satisfactorily. Pupils mastered the skills taught especially reading and writing skills. Group activities conducted successfully fostered cooperation and mutual assistance among pupils. Teaching time needs to be extended slightly next session to give pupils more discussion opportunities.", "The lesson went well and was organized. Pupils paid attention throughout the session and were not easily distracted. Oral questions posed by the teacher were answered correctly by the majority of pupils. Written exercises showed encouraging improvement compared to previous sessions. Pupils are becoming more confident to answer questions.", "14 pupils achieved the learning objectives. 4 pupils are still in the remedial process and need special attention. Differentiated learning activities conducted successfully helped meet the learning needs of pupils at different mastery levels. Teacher will continue to monitor the progress of these remedial pupils periodically.", "Learning objectives largely achieved. Pupils completed the given tasks within the allocated time. The use of various teaching aids such as videos, pictures and real objects successfully improved pupils' understanding of the concepts taught. Pupils could remember lesson content more easily through attractive visuals.", "Pupils were very enthusiastic during group activities. They completed the tasks well and showed close cooperation. The presentations at the end of the session showed great effort from each group. Pupils were brave enough to come forward to present their group work.", "The lesson proceeded as planned without any issues. Pupils understood the concepts taught well especially after hands-on activities. The reinforcement exercises given at the end of the session were completed well by the majority of pupils. Pupil reflections at the end showed they enjoyed today's learning.", "Majority of pupils achieved the set objectives. However, a few pupils are still weak in reading and writing skills. Special intervention will be conducted for these pupils next session. Teacher will prepare picture reading materials and simpler writing exercises to help them master basic skills.", "The lesson went well and achieved the targeted objectives. Pupils could identify and understand the main concepts taught well. Hands-on activities greatly helped weak pupils understand the topic. They could learn concretely through direct experience and real objects.", "Learning objectives achieved well. Pupils showed very positive attitudes towards learning today. They cooperated in groups and helped each other. Values of tolerance and mutual respect were fostered through group activities. Pupils also listened to their friends' opinions attentively.", "Pupils mastered the prescribed learning standards successfully. The lesson went smoothly according to plan. Enrichment and remedial activities were conducted according to pupil needs. Excellent pupils were given additional challenging tasks while remedial pupils received close individual guidance.", "Today's lesson was very enjoyable. Pupils learned through play using interesting and interactive activities. They could remember the concepts taught more easily through the learn-through-play approach. The cheerful and relaxed learning atmosphere helped pupils feel more comfortable to learn and ask questions.", "Learning objectives achieved successfully. Pupils showed encouraging improvement in understanding the topic taught. Continuous guidance is needed for remedial pupils to ensure they do not fall behind in learning. Teacher will give more attention to these pupils in the next session.", "The overall lesson was successful and achieved the set objectives. Pupils achieved the targeted learning outcomes. Various activities such as group discussions, gallery walks and presentations successfully helped meet the learning needs of pupils with different learning styles.", "Today's lesson successfully attracted pupils' interest through interactive and enjoyable activities. Pupils collaborated well in their respective groups and helped each other. The group learning approach not only improved understanding but also fostered cooperation and tolerance among pupils.", "Learning objectives achieved excellently. The use of technology in teaching and learning such as videos, animations and interactive quizzes successfully increased pupil engagement and interest. Pupils enjoyed learning in a fun way and understood abstract concepts more easily through attractive visualizations.", "Pupils mastered the skills taught with close teacher guidance. Reinforcement exercises will be given to further strengthen their understanding especially in aspects that are still weak. Teacher will prepare additional worksheets and various practice questions for this purpose.", "The lesson went smoothly with active participation from pupils. They actively asked questions and responded during the question and answer session. The learn-through-play approach used was very suitable for the topic taught today. Pupils understood the concepts more easily through fun activities.", "Learning objectives fully achieved today. Pupil presentations showed high effort and creativity. They successfully produced quality and attractive work. Formative assessment conducted continuously throughout the session helped the teacher identify pupils' strengths and weaknesses.", "16 pupils achieved the set learning objectives. Two pupils need special attention and will be given individual remedial activities. Teacher will prepare a special remedial module for these pupils and monitor their progress periodically.", "Pupils could apply the knowledge learned in new situations well. The contextual approach used successfully helped pupils understand the topic more deeply and meaningfully. They could connect learning with real situations in their daily lives.", "Today's lesson successfully improved pupils' critical thinking skills. They could solve given problems creatively and innovatively. The HOTS questions posed challenged pupils' thinking and encouraged them to think outside the box. Pupils enjoyed the challenges given.", "Learning objectives achieved well. Creative and varied use of teaching aids such as interactive videos, animated pictures and real objects successfully attracted pupils' interest. They understood abstract concepts more easily through attractive visuals and concrete materials that could be touched and seen.", "Majority of pupils completed the given tasks well and on time. However, a few pupils need additional guidance in writing and reading skills. Teacher will focus on these skills next session by providing more practice exercises.", "The lesson went smoothly with active participation from all pupils. Group activities conducted successfully encouraged cooperation, communication and interaction among pupils. They helped each other and shared ideas in completing tasks. A positive and conducive learning atmosphere was observed throughout the session.", "Learning objectives achieved excellently. Pupils mastered speaking skills confidently especially during presentation and role-play sessions. Role-play activities greatly helped pupils increase their confidence and communication skills in the correct language.", "Pupils showed very positive attitudes and high interest in learning. The lesson went smoothly according to plan. Formative assessment conducted continuously showed positive development in pupils' mastery of the prescribed learning standards.", "Today's lesson successfully achieved the set objectives. Pupils could work both in groups and individually well. They showed high discipline during activities and listened to teacher instructions carefully. The work produced was also of good quality.", "Learning objectives achieved satisfactorily. Pupils could identify and understand the concepts taught well especially after hands-on activities. Reinforcement exercises will be given to further strengthen pupils' understanding of the topic learned today.", "Pupils enjoyed the activities provided today. They could learn in a fun and stress-free atmosphere. The lesson went smoothly with active participation from pupils. They were not shy to ask questions and give opinions during the discussion session.", "The lesson proceeded according to the planned schedule. Pupils mastered the skills taught well. Pupil reflections at the end of the session showed they understood the lesson content delivered and could connect it with prior knowledge.", "Learning objectives achieved well. Pupils answered the questions posed correctly especially comprehension and application questions. Enrichment and remedial activities were conducted according to pupil needs to ensure each pupil benefited optimally from the lesson.", "Majority of pupils showed positive development in learning. However, a few pupils still need additional guidance especially in writing and reading skills. The next lesson session will focus more on remedial activities for pupils who are still weak.", "Today's lesson was very encouraging. Pupils mastered the learning objectives excellently without any issues. Various interactive activities conducted throughout the session successfully helped pupils' learning process and made the learning experience more meaningful and enjoyable."], "zh": ["今天有12名学生达到了学习目标。3名学生需要额外指导，特别是在阅读和写作方面。使用视频和问答的导入活动成功吸引了学生的兴趣。下次授课需要调整教学节奏，确保所有学生都能跟上课程。应该使用多样化的教具来保持学生的注意力。", "教学目标成功达成。学生能够很好地完成分配的任务，尤其是在小组活动中。他们展现了高度的合作精神。小组活动花费了相当长的时间，因此时间管理需要更有效率。动手操作活动大大帮助学生更清楚地理解抽象概念。", "15名/18名学生达到了预设的学习目标。三名学生需要在下次课进行个别补救活动。通过游戏学习的方法非常有效，成功吸引了学生的兴趣。通过有趣和互动的活动，他们更容易记住所学的概念。", "今天学生的掌握程度令人满意。教学按计划顺利进行，没有任何干扰。学生在整个过程中积极配合，并积极参与讨论。所提供的教具有助于提高学生对所教主题的理解。将给予巩固练习以进一步加强学生的理解。", "大多数学生掌握了规定的学习标准。少数学生需要额外的练习，特别是在写语法正确的句子方面。进行的小组活动成功提高了学生的协作和沟通能力。他们互相帮助，分享想法，完成分配的任务。", "教学目标完全达成。学生在讨论中很活跃，并在画廊漫步活动中贡献了 brilliant 的想法。持续进行的形成性评估显示了学生在理解方面的积极进展。所应用的21世纪学习方法成功提高了学生的积极参与度。", "教学顺利，达到了设定的目标。学生能够将学习与日常生活联系起来，尤其是在集思广益环节。画廊漫步活动非常有效地提高了学生的参与度，并提供了同伴学习的机会。学生也能向朋友提供建设性的反馈。", "所有学生都达到了今天设定的最低目标。通过Think-Pair-Share和Gallery Walk等活动应用了21世纪学习技能。课程结束时的学生反思显示了对所学主题的良好理解。学生也能将新知识与他们之前的经验联系起来。", "教学目标出色地达成。学生很好地完成了小组任务，并展现了高度的创造力。高层次思维技能被融入解决问题的活动中，学生很好地应用了它们。他们在整个过程中成功产生了创造性和创新性的想法。", "学生的掌握程度非常令人满意。教学按计划进行，时间为每个活动适当分配。学生已准备好接受下一堂课，并对继续学习表现出高度兴趣。使用各种教学技巧，如模拟和角色扮演，成功保持了学生的兴趣。", "目标很好地达成。学生能够在新的情况下应用所学知识，特别是在解决问题的活动中。布置了巩固练习作为家庭作业，以进一步加强学生的理解。教师将在下次课检查这些练习并提供建设性反馈。", "10名学生达到了掌握水平4及以上。5名学生仍在水平3，需要额外的练习。下次课将根据个别学生的需要进行补救活动。教师将为这些学生准备特殊的工作纸并提供密切指导。", "教学顺利且愉快。学生喜欢所提供的活动，尤其是互动的语言游戏。各种彩色教具有助于提高学生对所教概念的理解。学生在愉快的氛围中更有学习热情。", "教学目标成功达成。学生在小组中合作并按时完成了分配的任务。进行的同伴评估进展顺利，学生向朋友提供了建设性的反馈。这项活动也有助于提高学生的社交技能。", "学生对今天所教的主题表现出非常高的兴趣。他们在讨论环节积极提问并发表意见。下次课需要继续以更具挑战性的活动来满足优秀学生的需求，同时需要为弱生准备补救活动。", "今天的课顺利进行，80%的学生达到了设定的目标。在补救活动期间，对弱生进行了个别额外指导。给优秀学生提供了充实活动以挑战他们的思维。这种分层学习方法成功满足了学生多样化的学习需求。", "各种互动的学习活动成功帮助保持了学生整节课的兴趣。他们不感到无聊，始终积极参与。教学按计划和分配的时间顺利进行。学生配合良好，仔细听教师的指示。", "教学目标令人满意地达成。学生掌握了所教的技能，尤其是阅读和写作技能。进行的小组活动成功培养了学生之间的合作和互助精神。下次课需要稍微延长教学时间，给学生更多讨论的机会。", "教学顺利且有组织。学生整节课都专心听讲，不容易分心。大多数学生正确回答了教师提出的口头问题。书面练习显示出比前几节课令人鼓舞的进步。学生越来越自信地回答问题。", "14名学生达到了学习目标。4名学生仍在补救过程中，需要特别关注。进行的分层学习活动成功满足了不同掌握水平学生的学习需求。教师将继续定期监测这些补救学生的进展。", "教学目标大体达成。学生在规定时间内完成了分配的任务。使用各种教具，如视频、图片和实物，成功提高了学生对所教概念的理解。通过有吸引力的视觉材料，学生更容易记住课程内容。", "学生在小组活动中非常积极。他们很好地完成了任务，并展现了密切的合作。课程结束时的呈现展示出每个小组的巨大努力。学生勇敢地走上前呈现他们的小组作业。", "教学按计划进行，没有任何问题。学生在动手操作活动后很好地理解了所教的概念。大多数学生很好地完成了课程结束时给出的巩固练习。课程结束时的学生反思显示他们喜欢今天的学习。", "大多数学生达到了设定的目标。然而，少数学生在阅读和写作技能方面仍然薄弱。下次课将为这些学生进行特别干预。教师将准备图画阅读材料和更简单的写作练习，帮助他们掌握基本技能。", "教学顺利，达到了目标。学生能够很好地识别和理解所教的主要概念。动手活动大大帮助了弱生理解主题。他们能够通过直接经验和实物进行具体学习。", "教学目标很好地达成。学生今天对学习表现出非常积极的态度。他们在小组中合作并互相帮助。通过小组活动培养了宽容和相互尊重的价值观。学生也认真倾听朋友的意见。", "学生成功掌握了规定的学习标准。教学按计划顺利进行。根据需要进行了充实和补救活动。给优秀学生分配了额外的挑战性任务，而补救学生则接受了密切的个别指导。", "今天的课非常有趣。学生通过有趣和互动的活动在玩中学。通过玩中学的方法，他们更容易记住所教的概念。愉快和轻松的学习氛围帮助学生更舒适地学习和提问。", "教学目标成功达成。学生在理解所教主题方面显示出令人鼓舞的进步。补救学生需要持续的指导，以确保他们不会在学习中落后。教师将在下次课给予这些学生更多关注。", "整体教学成功，达到了设定的目标。学生达到了预期的学习成果。各种活动，如小组讨论、画廊漫步和呈现，成功满足了具有不同学习风格学生的学习需求。", "今天的课通过互动和愉快的活动成功吸引了学生的兴趣。学生在各自的小组中合作良好并互相帮助。小组学习方法不仅提高了理解，还培养了学生之间的合作和宽容。", "教学目标出色地达成。在教学中使用技术，如视频、动画和互动测验，成功提高了学生的参与度和兴趣。学生喜欢有趣的学习方式，并通过有吸引力的可视化更容易理解抽象概念。", "学生在教师的密切指导下掌握了所教的技能。将给予巩固练习以进一步加强他们的理解，特别是在仍然薄弱的方面。教师将为此准备额外的工作纸和各种练习问题。", "教学顺利进行，学生积极参与。他们在问答环节积极提问和回应。使用的通过游戏学习的方法非常适合今天所教的主题。通过有趣的活动，学生更容易理解概念。", "今天教学目标完全达成。学生的呈现展示出高度的努力和创造力。他们成功制作了高质量和有吸引力的作品。整节课持续进行的形成性评估帮助教师识别学生的优势和弱点。", "16名学生达到了设定的学习目标。两名学生需要特别关注，将给予个别补救活动。教师将为这些学生准备特殊的补救模块，并定期监测他们的进展。", "学生能够在新的情况下很好地应用所学知识。使用的情境教学法成功帮助学生更深入和有意义地理解主题。他们能够将学习与日常生活中的实际情况联系起来。", "今天的课成功提高了学生的批判性思维能力。他们能够创造性和创新性地解决给定的问题。提出的高阶思维问题挑战了学生的思维，鼓励他们跳出框框思考。学生喜欢所给予的挑战。", "教学目标很好地达成。创造性和多样化地使用教具，如互动视频、动画图片和实物，成功吸引了学生的兴趣。通过有吸引力的视觉和可以触摸和看到的具体材料，学生更容易理解抽象概念。", "大多数学生按时很好地完成了分配的任务。然而，少数学生在写作和阅读技能方面需要额外指导。教师将在下次课重点关注这些技能，提供更多的练习。", "教学顺利进行，所有学生积极参与。进行的小组活动成功鼓励了学生之间的合作、沟通和互动。他们在完成任务时互相帮助并分享想法。整节课观察到了积极和有利的学习氛围。", "教学目标出色地达成。学生自信地掌握了口语技能，特别是在呈现和角色扮演环节。角色扮演活动大大帮助学生增强了自信心和用正确语言沟通的能力。", "学生对学习表现出非常积极的态度和高度的兴趣。教学按计划顺利进行。持续进行的形成性评估显示了学生在掌握规定学习标准方面的积极发展。", "今天的课成功达到了设定的目标。学生能够在小组和个别工作中都表现良好。他们在活动中展现出高度的纪律性，并仔细听教师的指示。所制作的作业质量也很好。", "教学目标令人满意地达成。学生在动手操作活动后能够很好地识别和理解所教的概念。将给予巩固练习以进一步加强学生对今天所学主题的理解。", "学生喜欢今天提供的活动。他们能够在有趣和无压力的氛围中学习。教学顺利进行，学生积极参与。他们在讨论环节不害羞地提问和发表意见。", "教学按计划进行。学生很好地掌握了所教的技能。课程结束时的学生反思显示他们理解了所传达的课程内容，并能将其与先前的知识联系起来。", "教学目标很好地达成。学生正确回答了提出的问题，特别是理解题和应用题。根据学生的需要进行了充实和补救活动，以确保每个学生都能从课程中获得最大收益。", "大多数学生在学习上显示出积极的发展。然而，少数学生在写作和阅读技能方面仍然需要额外指导。下次课将更注重为仍然薄弱的学生进行补救活动。", "今天的课非常令人鼓舞。学生出色地掌握了学习目标，没有任何问题。整节课进行的各种互动活动成功帮助了学生的学习过程，并使学习体验更有意义和愉快。"]};
const ACTS = {"bm": {"i": ["🎵 Murid menyanyikan lagu bertema yang berkaitan dengan topik pembelajaran yang akan diajar. Guru memimpin nyanyian dengan iringan gitar atau rakaman audio sambil menayangkan lirik lagu di papan putih. Murid diminta membuat gerakan kreatif yang sesuai dengan lirik lagu secara berkumpulan. Selepas nyanyian, guru bersoal jawab dengan murid tentang isi lagu untuk merangsang pemikiran dan mengaitkan dengan topik pembelajaran. [Dif: A - Nyanyi dengan gerakan kreatif dan ubah suai lirik lagu, B - Nyanyi dengan bimbingan lirik dan tunjuk cara guru, C - Dengar lagu sambil menepuk irama mengikut rentak]", "🎬 Guru menayangkan video pendek (2-3 minit) yang berkaitan dengan topik pembelajaran seperti fenomena alam, situasi harian atau kisah menarik. Sebelum tayangan, guru mengemukakan 2-3 soalan rangsangan untuk membina skema sedia ada murid. Semasa tayangan, murid diminta mengambil nota ringkas atau mengingati maklumat penting. Selepas tayangan, murid dibimbing untuk meneka tajuk pembelajaran berdasarkan isi video dan perkaitan dengan pengalaman sedia ada. [Dif: A - Mengaitkan isi video dengan tajuk pembelajaran dalam ayat lengkap dan memberi contoh, B - Meneka tajuk pembelajaran dalam satu perkataan atau frasa, C - Memadankan gambar dari video dengan tajuk pembelajaran]", "🧩 Permainan Cari Pasangan dijalankan dengan menyediakan kad bergambar dan kad berperkataan. Setiap murid memegang sekeping kad secara rawak. Apabila guru memberi isyarat, murid bergerak mencari rakan yang memegang kad padanan (gambar dengan perkataan). Pasangan yang lengkap duduk bersama dan membaca kad masing-masing. Aktiviti ini membantu murid menguasai kosa kata baru secara menyeronokkan. [Dif: A - Padan perkataan dengan ayat penerangan yang lengkap, B - Padan gambar dengan perkataan yang betul, C - Padan gambar dengan gambar yang sama]", "🎭 Guru membawa masuk boneka jari atau puppets dan bercerita dengan intonasi yang menarik dan ekspresi muka yang pelbagai. Boneka dijadikan sebagai alat perantara untuk menyampaikan isi cerita yang berkaitan dengan topik. Semasa bercerita, guru berhenti di bahagian-bahagian tertentu untuk bertanya soalan ramalan. Murid dibimbing meneka watak, jalan cerita, konflik dan pengajaran yang boleh diambil daripada cerita tersebut. [Dif: A - Bercerita semula menggunakan ayat sendiri dengan kreatif, B - Mengulang dialog watak utama dengan intonasi, C - Menamakan watak-watak dalam cerita]", "🖼️ Guru menyediakan 4-6 keping gambar bersiri yang tidak tersusun. Murid secara berkumpulan diminta menyusun gambar mengikut urutan yang betul berdasarkan pemahaman mereka tentang tema. Selepas selesai menyusun, setiap kumpulan menerangkan jalan cerita yang terbentuk. Guru membimbing murid mengenal pasti urutan yang paling logik dan munasabah. [Dif: A - Menyusun gambar dan menghasilkan cerita lengkap dengan ayat sendiri, B - Menyusun gambar dan membaca ayat penerangan yang disediakan, C - Menyusun gambar mengikut urutan dengan bimbingan]", "❓ Guru membawa objek maujud atau gambar yang menarik dan berkaitan dengan topik. Objek diletakkan di hadapan kelas atau diedarkan kepada kumpulan. Guru mengemukakan soalan rangsangan seperti \"Apa yang kamu nampak?\", \"Apa yang kamu rasa?\" atau \"Apakah yang ingin kamu tahu tentang objek ini?\" untuk membangkitkan rasa ingin tahu murid. Murid menjawab secara lisan berdasarkan pemerhatian mereka. [Dif: A - Jawab dalam ayat lengkap dengan sebab dan contoh, B - Jawab dalam frasa yang sesuai, C - Menunjuk dan mengangguk atau geleng kepala]", "🔄 Permainan Cari Perbezaan dijalankan dengan menayangkan dua gambar yang hampir serupa tetapi mempunyai beberapa perbezaan. Murid secara berkumpulan atau individu diminta membandingkan dan mencari sebanyak mungkin perbezaan. Aktiviti ini melatih kemahiran pemerhatian dan tumpuan murid. [Dif: A - Menerangkan perbezaan dalam ayat lengkap, B - Mencari dan menunjuk perbezaan yang ditemui, C - Memadankan objek yang sama dalam kedua-dua gambar]", "👂 Guru memainkan bunyi atau audio pendek yang berkaitan dengan topik seperti bunyi haiwan, bunyi kenderaan, bunyi alam atau bunyi persekitaran. Murid mendengar dengan teliti dan meneka sumber bunyi tersebut. Aktiviti ini merangsang pendengaran dan meningkatkan kemahiran mendengar aktif dalam kalangan murid. [Dif: A - Meneka dan menghuraikan ciri-ciri bunyi dengan lengkap, B - Meneka sumber bunyi dengan tepat, C - Memilih gambar yang sesuai dengan bunyi yang didengar]", "🎈 Permainan Bola Berbual: Murid duduk dalam bulatan. Guru memulakan permainan dengan mengemukakan satu soalan sambil memegang bola. Bola dihantar secara rawak kepada murid. Penerima bola perlu menjawab soalan dengan yakin sebelum menghantar bola kepada rakan yang lain. Aktiviti ini membina keyakinan murid untuk bercakap di hadapan kumpulan. [Dif: A - Menjawab soalan KBAT dengan ayat lengkap dan alasan, B - Menjawab soalan mudah dengan frasa, C - Membantu rakan menjawab dengan memberi petunjuk]", "📦 Kotak Misteri: Guru menyediakan sebuah kotak tertutup yang mengandungi objek berkaitan topik. Murid secara bergilir memasukkan tangan ke dalam kotak dan meraba objek tanpa melihat. Mereka perlu meneka objek berdasarkan deria sentuhan. Selepas meneka, objek dikeluarkan untuk disahkan. Aktiviti ini merangsang rasa ingin tahu dan melatih kemahiran membuat inferens. [Dif: A - Menerangkan ciri-ciri objek yang diraba dengan lengkap, B - Meneka objek dengan tepat, C - Merasa dan menunjuk gambar objek yang sama]"], "p": ["📇 Guru memperkenalkan kosa kata baru menggunakan kad imbasan (flashcards) berwarna dan bersaiz besar. Setiap kad mengandungi gambar yang menarik dan perkataan yang jelas. Guru menunjukkan kad sambil menyebut perkataan dengan sebutan yang betul dan intonasi yang sesuai. Murid mengecam, mengeja dan menyebut perkataan secara kelas, kumpulan dan individu. Kaitkan gambar dengan perkataan untuk memudahkan kefahaman. [Dif: A - Membina ayat menggunakan perkataan baru, B - Menyebut dan mengeja perkataan, C - Mengulang sebutan selepas guru]", "👥 Perbincangan kumpulan kecil menggunakan teknik Think-Pair-Share (Fikir-Pasang-Kongsi). Guru mengemukakan soalan atau isu berkaitan topik. Murid diberi masa 1-2 minit untuk berfikir secara individu (Think). Kemudian mereka berbincang dengan pasangan (Pair) untuk berkongsi idea. Akhirnya, beberapa pasangan dipilih untuk berkongsi dengan seluruh kelas (Share). [Dif: A - Kongsi idea dalam ayat lengkap dengan alasan, B - Kongsi pandangan dalam frasa ringkas, C - Mendengar dan mengulang idea rakan]", "🔗 Guru menyediakan kad bergambar dan kad berperkataan. Murid diminta memadankan gambar dengan perkataan yang betul. Aktiviti dilakukan secara individu atau berpasangan di atas meja atau papan putih. Guru membimbing dan memberi maklum balas. Sebut perkataan dengan kuat selepas padanan dibuat. [Dif: A - Padankan dan menulis ayat mudah, B - Padankan dan menyebut perkataan, C - Padankan gambar yang sama]", "🗣️ Latihan mendengar dan mengulang sebutan frasa penting. Guru menyebut frasa dengan intonasi dan tekanan yang betul. Murid mendengar dengan teliti dan mengulang sebutan secara kelas (choral repetition), kumpulan kecil dan individu. Beri penekanan pada sebutan perkataan sukar dan intonasi ayat. [Dif: A - Menyebut frasa dengan intonasi dan ekspresi yang betul, B - Menyebut frasa mudah dengan bantuan, C - Menyebut perkataan utama]", "📋 Permainan Kad Kategori: Murid diberikan kad perkataan dan diminta mengelaskannya ke dalam kumpulan yang betul seperti haiwan, tumbuhan, warna atau bentuk. Guru menyediakan kategori di papan tulis atau atas meja. Murid menampal kad di bawah kategori yang betul sambil menyebut perkataan tersebut. [Dif: A - Mengelaskan dan memberi alasan pengelasan, B - Mengelaskan dengan bimbingan rakan, C - Memadankan dengan contoh yang diberi]", "📝 Latihan lisan secara kelas: Guru menunjukkan gambar atau objek. Murid menjawab secara serentak (choral response) untuk membina keyakinan. Kemudian secara individu untuk penilaian. Guru memberi maklum balas segera. [Dif: A - Jawab dalam ayat lengkap, B - Jawab dalam satu perkataan, C - Angkat tangan atau tunjuk jawapan]", "🎯 Aktiviti menyusun kad perkataan mengikut kategori masa seperti Minggu, Bulan dan Tahun. Murid diberikan kad-kad perkataan yang bercampur aduk dan diminta menyusun mengikut urutan yang betul secara berkumpulan. [Dif: A - Menyusun dan membina ayat tentang masa, B - Menyusun kad mengikut urutan, C - Memadankan kad dengan gambar]", "🎲 Permainan papan pendidikan: Murid membaling dadu dan bergerak mengikut bilangan petak. Setiap petak mengandungi soalan berkaitan topik seperti teka perkataan, jawab soalan atau buat ayat. Murid perlu menjawab soalan dengan betul untuk terus bergerak. [Dif: A - Soalan aras KBAT, B - Soalan aras sederhana, C - Membantu rakan menjawab soalan]", "🃏 Kad Teka: Murid memilih kad dan perlu menerangkan perkataan kepada rakan tanpa menyebut perkataan tersebut. Rakan lain meneka perkataan yang diterangkan. Aktiviti ini melatih kemahiran berfikir dan berkomunikasi. [Dif: A - Menerangkan menggunakan ayat lengkap, B - Menggunakan bahasa badan dan isyarat, C - Menunjukkan gambar kepada rakan]", "✏️ Murid melukis peta minda ringkas tentang pengetahuan sedia ada berkaitan topik. Guru membimbing murid mengenal pasti idea utama dan idea sampingan. Murid melukis peta minda masing-masing di atas kertas atau menggunakan aplikasi digital. [Dif: A - Peta minda lengkap dengan sub-topik dan cabang, B - Peta minda separa dengan bimbingan, C - Mewarna dan menampal gambar pada peta]"], "d": ["📖 Aktiviti membaca petikan secara berpasangan. Guru menyediakan petikan pada 3 aras kesukaran (mudah, sederhana, mencabar). Murid membaca bergilir dengan pasangan dan membincangkan isi petikan. Guru menyediakan soalan kefahaman beraras yang merangkumi soalan literal, inferensi dan KBAT. Murid menjawab soalan secara lisan atau bertulis. [Dif: A - Membaca petikan aras tinggi dan menjawab soalan KBAT, B - Membaca petikan aras sederhana dan menjawab soalan literal, C - Membaca petikan bergambar dan melukis jawapan]", "✍️ Menulis karangan atau ayat berpandu dengan menggunakan peta pemikiran i-Think. Murid merancang penulisan menggunakan peta bulatan, peta buih atau peta pokok sebelum menulis. Karangan dihasilkan secara individu atau berpasangan. Guru menyediakan rangka karangan dan senarai semak untuk membimbing murid. [Dif: A - Menulis karangan lengkap dengan isi tersusun dan ayat gramatis, B - Menulis ayat berpandu menggunakan rangka dan frasa, C - Menyusun ayat yang diberikan dan menyalin tulisan]", "🎭 Aktiviti lakonan (Role Play): Murid melakonkan dialog dalam situasi harian berkaitan topik. Guru menyediakan kad situasi yang pelbagai. Murid merancang dialog secara berkumpulan dan berlatih sebelum melakonkan di hadapan kelas. Guru menilai intonasi, sebutan dan ekspresi. [Dif: A - Mencipta dialog sendiri berdasarkan situasi dengan kreatif, B - Menggunakan dialog yang diberi dengan olahan, C - Melakonkan dialog dengan bimbingan guru]", "🖼️ Gallery Walk: Hasil kerja murid dipamerkan di atas meja atau dilekat di dinding kelas. Murid berjalan dalam kumpulan melihat hasil kerja rakan sambil mencatat maklumat penting. Mereka meninggalkan komen pada sticky note atau kad feedback. Setiap kumpulan berhenti di setiap stesen selama 2-3 minit. [Dif: A - Menulis komen yang bernas, membina dan spesifik, B - Menulis komen ringkas yang positif, C - Menampal stiker atau tanda pada hasil kerja]", "📘 Mencipta buku mini (foldable booklet) berdasarkan topik. Guru menyediakan template buku mini daripada sehelai kertas A4. Murid mengisi kandungan buku mengikut kreativiti masing-masing seperti definisi, gambar, contoh dan rumusan. Buku mini mengandungi ringkasan isi pelajaran. [Dif: A - Mengisi kandungan lengkap dengan ayat sendiri dan ilustrasi, B - Mengisi kandungan berpandu soalan dan gambar, C - Mewarna gambar dan menampal label yang diberi]", "🏫 Aktiviti Stesen Pembelajaran: Murid bergerak dalam kumpulan ke 4-5 stesen yang menyediakan tugasan berbeza. Setiap stesen mengambil masa 5-7 minit. Stesen termasuk stesen membaca, menulis, mewarna, permainan dan kreativiti. Guru memantau dan membimbing di stesen yang memerlukan bantuan. [Dif: A - Stesen cabaran KBAT dengan tugasan kompleks, B - Stesen tugasan sederhana dengan arahan jelas, C - Stesen bimbingan guru dengan bantuan rapat]", "🧩 Permainan Bahasa: Scrabble, Boggle, Permainan Kad Perkataan atau Silang Kata. Murid bermain dalam kumpulan kecil untuk mengukuhkan kosa kata, ejaan dan struktur ayat. Permainan dijalankan secara pusingan dalam tempoh masa yang ditetapkan. [Dif: A - Membina ayat daripada perkataan yang ditemui, B - Mencari perkataan tersembunyi dalam grid, C - Memadankan huruf untuk membentuk perkataan]", "🗺️ Mencipta peta minda atau peta pemikiran secara berkumpulan. Gunakan kertas mahjong dan pen marker berwarna. Murid melukis peta minda yang kreatif dengan gambar dan warna. Setiap kumpulan membentangkan peta minda mereka. Hasil kerja dipamerkan di sudut kelas. [Dif: A - Peta minda lengkap dengan sub-topik dan cabang terperinci, B - Peta bulatan dengan idea utama berkaitan, C - Peta bergambar dengan bantuan rakan]", "💻 Penggunaan aplikasi pendidikan seperti Quizizz, Kahoot!, Google Classroom atau Wordwall. Murid menjawab kuiz interaktif secara individu atau berkumpulan menggunakan telefon bimbit, tablet atau komputer. Soalan merangkumi pelbagai aras kesukaran. Markah dipaparkan secara langsung. [Dif: A - Soalan aras KBAT dengan penaakulan, B - Soalan aras sederhana dengan pilihan, C - Soalan bergambar dengan pilihan jawapan]", "🎨 Aktiviti kraftangan: Menghasilkan poster, buku skrap, model 3D atau diorama berkaitan topik. Murid menggunakan bahan seperti kertas warna, kotak terbuang, gam, gunting, pensel warna dan bahan kitar semula. Hasil kerja dipamerkan dan dibentangkan. [Dif: A - Menghasilkan kraftangan secara kreatif tanpa contoh, B - Menggunakan template dan contoh yang diberi, C - Membantu mewarna dan menghias]", "🔬 Eksperimen atau penyiasatan secara berkumpulan. Murid menjalankan aktiviti saintifik untuk menguji hipotesis. Mereka merekod pemerhatian, menganalisis data dan membuat kesimpulan secara berkumpulan. Guru membimbing langkah demi langkah. [Dif: A - Mereka bentuk eksperimen sendiri dengan kawalan pembolehubah, B - Mengikut langkah eksperimen yang disediakan, C - Membantu rakan merekod data dan pemerhatian]", "📊 Projek berkumpulan: Murid menyiapkan projek secara berkumpulan dan membentangkan hasil kerja. Projek merangkumi penyelidikan, pengumpulan maklumat, analisis dan persembahan kreatif. Tempoh projek 1-2 minggu. [Dif: A - Projek kompleks dengan penyelidikan mendalam dan analisis, B - Projek sederhana dengan bimbingan dan panduan, C - Membantu kumpulan dalam tugasan mudah]", "🎪 Karnival pembelajaran: Murid menyediakan gerai interaktif berkaitan topik. Setiap kumpulan menguruskan satu gerai dengan aktiviti seperti kuiz, permainan atau pameran. Kelas lain atau guru pelawat melawat gerai-gerai tersebut. [Dif: A - Mengurus dan mengendalikan gerai sepenuhnya, B - Membantu menguruskan gerai dengan bimbingan, C - Melawat dan menyertai aktiviti gerai]", "📝 Pembelajaran berasaskan projek (PBL): Murid menyiapkan folio atau buku skrap secara berkumpulan. Projek merangkumi tajuk, objektif, kandungan, ilustrasi dan rumusan. Sumber rujukan termasuk buku, internet dan temu bual. [Dif: A - Folio lengkap dengan kandungan terperinci dan kreatif, B - Buku skrap dengan isi berpandu dan contoh, C - Koleksi gambar dan bahan dengan label]", "🎯 Aktiviti Hot Seat: Seorang murid duduk di kerusi panas di hadapan kelas. Rakan sekelas bertanya soalan berkaitan topik secara bergilir. Murid di kerusi panas perlu menjawab soalan dengan yakin dan jelas. Aktiviti ini melatih keyakinan dan kefasihan. [Dif: A - Memberi soalan yang mencabar dan mendalam, B - Menjawab soalan dengan yakin dan tepat, C - Mencatat jawapan dan membantu rakan]"], "ps": ["👨‍🏫 Pembentangan hasil kerja kumpulan terpilih di hadapan kelas. Wakil kumpulan membentang dengan menggunakan alat bantu seperti poster, slaid atau model. Penerangan merangkumi objektif, proses dan hasil kerja. Kumpulan lain memberi maklum balas dan bertanya soalan. [Dif: A - Membentang dengan yakin, jelas dan kreatif, B - Membentang dengan bimbingan guru dan nota, C - Menunjukkan hasil kerja sambil guru menerangkan]", "📝 Kuiz Kahoot! atau Quizizz secara berkumpulan atau individu. Soalan kuiz merangkumi pelbagai aras kesukaran daripada aras rendah hingga KBAT. Murid menjawab dalam masa yang ditetapkan. Markah dan kedudukan dipaparkan secara langsung untuk meningkatkan motivasi. [Dif: A - Soalan aras KBAT dengan penaakulan, B - Soalan aras sederhana dengan pilihan, C - Soalan bergambar dengan pilihan jawapan]", "💬 Sesi refleksi: Murid berkongsi satu perkara yang mereka pelajari pada hari ini secara lisan. Guru meminta beberapa orang murid secara rawak untuk berkongsi. Refleksi boleh juga dilakukan secara bertulis dalam jurnal pembelajaran ringkas. [Dif: A - Berkongsi dalam ayat lengkap dengan contoh dan kaitan, B - Berkongsi dalam frasa ringkas, C - Menunjuk pada gambar atau bahan belajar]", "✏️ Aktiviti 3-2-1: Murid menulis 3 perkara yang dipelajari, 2 perkara yang menarik dan 1 soalan yang masih tertanya-tanya. Tulis di atas kertas atau sticky note. Kemudian lekatkan pada papan refleksi di sudut kelas. [Dif: A - Menulis lengkap dalam ayat gramatis, B - Menulis isi berpandu soalan bimbingan, C - Melukis gambar dan menulis label]", "🗣️ Sumbangsaran secara kelas untuk merumuskan isi pelajaran. Guru menulis idea-idea murid di papan putih dalam bentuk peta minda. Murid membincangkan perkaitan antara idea dan membuat rumusan bersama. [Dif: A - Memberi idea bernas yang berhubung kait, B - Setuju atau tidak setuju dengan alasan yang sesuai, C - Mengulang idea yang disebut rakan]", "⭐ Penilaian rakan sebaya: Murid menilai hasil kerja rakan menggunakan rubrik mudah seperti bintang atau smiley face. Murid memberi komen lisan atau bertulis tentang kekuatan dan cadangan penambahbaikan. [Dif: A - Menggunakan rubrik penilaian dengan tepat dan objektif, B - Memberi bintang dan komen ringkas, C - Menampal stiker pada hasil kerja]", "📊 Pameran hasil kerja (Mini Exhibition): Semua hasil kerja dipamerkan di sudut kelas atau meja. Murid berjalan melihat pameran secara berkumpulan. Beberapa orang murid dipilih untuk menerangkan hasil kerja mereka kepada pengunjung. [Dif: A - Mengatur dan menyusun pameran dengan kreatif, B - Menerangkan hasil kerja dengan jelas, C - Melawat dan melihat pameran]", "🎯 Kuiz lisan pantas: Guru mengemukakan soalan spontan secara rawak untuk menguji kefahaman murid. Murid menjawab secara lisan. Soalan merangkumi pelbagai aras daripada soalan mudah hingga KBAT. [Dif: A - Soalan KBAT yang mencabar pemikiran, B - Soalan aras sederhana, C - Soalan mudah dengan bantuan dan petunjuk]", "🔄 Aktiviti Round Table: Setiap murid dalam kumpulan menulis satu idea secara bergilir pada sehelai kertas. Kertas dipusingkan mengikut arah jam sehingga semua ahli kumpulan memberi sumbangan. Hasil dikongsi dengan kelas. [Dif: A - Menulis idea lengkap dalam ayat gramatis, B - Menulis kata kunci berkaitan topik, C - Melukis gambar berkaitan idea]", "💭 Refleksi bertulis dalam jurnal pembelajaran ringkas. Murid menulis apa yang dipelajari, apa yang menarik dan apa yang masih kurang jelas. Guru membaca dan memberi komen dan galakan. [Dif: A - Menulis perenggan penuh dengan refleksi mendalam, B - Menulis beberapa ayat mudah, C - Melukis gambar dan menulis label]"], "c": ["📋 Rumusan isi penting: Guru membimbing murid melengkapkan peta konsep atau peta i-Think. Murid mengisi tempat kosong dengan maklumat yang betul berdasarkan pembelajaran hari ini. Rumusan dibuat secara kolaboratif oleh seluruh kelas. [Dif: A - Melengkapkan peta konsep sendiri tanpa bantuan, B - Mengisi separuh daripada peta dengan bimbingan, C - Mewarnakan dan menampal label pada peta]", "🎫 Exit Ticket: Murid menulis jawapan pada kertas kecil atau sticky note sebelum keluar kelas. Soalan mudah seperti Satu perkara yang saya belajar hari ini... atau Saya masih kabur tentang... Guru mengumpul dan menyemak exit ticket untuk menilai kefahaman. [Dif: A - Menulis jawapan dalam ayat lengkap, B - Menulis perkataan atau frasa, C - Melukis gambar dan menulis label]", "✅ Permainan Betul atau Salah: Guru menyatakan beberapa kenyataan berkaitan topik. Murid berdiri jika betul dan duduk jika salah. Atau menggunakan kad hijau (betul) dan kad merah (salah). Aktiviti ini menyeronokkan dan menguji kefahaman dengan cepat. [Dif: A - Memberi alasan kenapa betul atau salah, B - Menjawab betul atau salah dengan yakin, C - Meniru tindakan rakan]", "🙏 Doa dan nyanyian lagu penutup. Refleksi secara lisan oleh 2-3 orang murid terpilih. Guru memimpin doa dan murid mengaminkan. Suasana pembelajaran ditutup dengan positif. [Dif: A - Memimpin doa dan memberi refleksi, B - Berkongsi refleksi ringkas, C - Mendengar dan mengaminkan doa]", "📚 Guru memberikan latihan pengukuhan sebagai kerja rumah. Latihan berasaskan topik yang dipelajari. Guru menerangkan arahan dengan jelas dan memberi contoh. Murid menyimpan latihan dalam beg untuk dibuat di rumah. [Dif: A - Latihan KBAT dan penyelesaian masalah, B - Latihan aras sederhana, C - Latihan asas pengukuhan]", "🔮 Preview pembelajaran seterusnya: Guru menunjukkan gambar atau mengemukakan soalan teaser tentang topik akan datang. Murid meramal apa yang akan dipelajari untuk membangkitkan minat dan rasa ingin tahu. [Dif: A - Meramal dalam ayat lengkap, B - Meramal dalam satu perkataan, C - Melihat gambar dengan bimbingan]", "🎯 Murid melengkapkan What Stuck With You Today? pada sticky note. Mereka menulis konsep atau kemahiran yang paling diingati daripada pembelajaran hari ini. Sticky note dilekatkan pada papan khas di sudut kelas. [Dif: A - Menulis dalam ayat lengkap dan jelas, B - Menulis frasa pendek, C - Melukis gambar]", "🔄 Sesi soal jawab pantas menggunakan papan putih mini. Guru bertanya soalan berkaitan topik. Murid menulis jawapan pada papan dan menunjukkan serentak. Guru memberi maklum balas segera. Aktiviti ini membolehkan guru menilai kefahaman semua murid dengan cepat. [Dif: A - Soalan KBAT yang mencabar, B - Soalan aras sederhana, C - Menunjukkan jawapan yang ditulis]", "⭐ Murid meletakkan magnet atau penanda pada carta Tahap Kefahaman yang mengandungi tiga bahagian: Faham, Ragu-ragu dan Tidak Faham. Guru dapat melihat secara visual tahap kefahaman kelas dan merancang tindakan susulan. [Dif: A - Menerangkan pilihan tahap kefahaman, B - Meletakkan magnet pada tahap sendiri, C - Membantu rakan meletakkan magnet]", "✏️ Jurnal refleksi harian: Murid menulis satu perenggan pendek tentang pembelajaran hari ini. Fokus pada apa yang dipelajari, apa yang dirasai dan apa yang akan dilakukan. Guru membaca dan memberi komen motivasi. [Dif: A - Menulis perenggan lengkap dengan refleksi, B - Menulis 3 ayat mudah, C - Melukis gambar berserta label]"]}, "en": {"i": ["🎵 Sing a themed song related to the learning topic. Teacher leads the singing with guitar accompaniment or audio recording while displaying lyrics on the whiteboard. Pupils create creative movements that match the lyrics in groups. After singing, the teacher asks questions about the song content to stimulate thinking and connect to the lesson topic. [Diff: A - Create new verses with creative movements, B - Sing with guided lyrics and teacher demonstration, C - Clap along to the rhythm]", "🎬 Show a short video (2-3 minutes) related to the topic such as natural phenomena, daily situations or interesting stories. Before viewing, the teacher poses 2-3 stimulus questions to activate prior knowledge. During viewing, pupils take brief notes or remember important information. After viewing, pupils are guided to guess the lesson topic based on the video content. [Diff: A - Relate video content to topic in full sentences with examples, B - Guess topic in one word or phrase, C - Match pictures from video to topic]", "🧩 Find Your Partner game: Prepare picture cards and word cards. Each pupil holds one card randomly. When the teacher signals, pupils move around to find their matching partner (picture with word). Complete pairs sit together and read their cards aloud. This activity helps pupils master new vocabulary in a fun way. [Diff: A - Match word with sentence description, B - Match picture with correct word, C - Match identical pictures]", "🎭 The teacher uses finger puppets or hand puppets to tell a story with engaging intonation and varied facial expressions. Puppets serve as mediators to deliver story content related to the topic. During storytelling, the teacher pauses at certain parts to ask prediction questions. Pupils are guided to guess characters, plot and moral values. [Diff: A - Retell story using own words creatively, B - Repeat main character dialogues with intonation, C - Name the characters in the story]", "🖼️ Prepare 4-6 jumbled picture series. Pupils work in groups to arrange the pictures in the correct sequence based on their understanding of the theme. After arranging, each group explains the story formed. The teacher guides pupils to identify the most logical sequence. [Diff: A - Arrange pictures and produce a complete story with own sentences, B - Arrange pictures and read provided sentences, C - Arrange pictures in order with guidance]", "❓ Bring real objects or interesting pictures related to the topic. Objects are placed in front of the class or distributed to groups. The teacher poses stimulus questions like What do you see?, What do you feel? or What do you want to know? to arouse curiosity. Pupils answer orally based on their observations. [Diff: A - Answer in full sentences with reasons and examples, B - Answer in appropriate phrases, C - Point and nod or shake head]", "🔄 Spot the Difference game: Show two similar pictures with several differences. Pupils in groups or individually compare and find as many differences as possible. This activity trains observational skills and concentration. [Diff: A - Explain differences in full sentences, B - Find and point to the differences, C - Match identical objects in both pictures]", "👂 Play sounds or short audio related to the topic such as animal sounds, vehicle sounds, nature sounds or environmental sounds. Pupils listen carefully and identify the sound source. This activity stimulates listening skills and improves active listening. [Diff: A - Guess and describe sound characteristics in detail, B - Identify the sound source accurately, C - Choose the correct picture matching the sound]", "🎈 Talking Ball game: Pupils sit in a circle. The teacher starts by posing a question while holding a ball. The ball is passed randomly. The receiver must answer confidently before passing to another friend. This activity builds pupils' confidence to speak in front of a group. [Diff: A - Answer HOTS questions in full sentences with reasons, B - Answer simple questions in phrases, C - Help a friend answer by giving clues]", "📦 Mystery Box: Prepare a closed box containing objects related to the topic. Pupils take turns putting their hand into the box and feeling the object without looking. They guess the object based on touch. After guessing, the object is revealed to confirm. This activity stimulates curiosity and trains inference skills. [Diff: A - Describe the characteristics of the object thoroughly, B - Guess the object accurately, C - Feel and point to the matching picture]"], "p": ["📇 Introduce new vocabulary using colorful large-sized flashcards. Each card contains an attractive picture and clear text. The teacher shows the card while pronouncing the word correctly with proper intonation. Pupils recognize, spell and say the words in class, group and individually. Connect pictures with words for easier understanding. [Diff: A - Create sentences using the new words, B - Say and spell the words correctly, C - Repeat after the teacher]", "👥 Small group discussion using the Think-Pair-Share technique. The teacher poses a question or issue related to the topic. Pupils are given 1-2 minutes to think individually (Think). Then they discuss with a partner (Pair) to share ideas. Finally, selected pairs share with the whole class (Share). [Diff: A - Share ideas in full sentences with reasons, B - Share opinions in short phrases, C - Listen and repeat a friend's idea]", "🔗 Prepare picture cards and word cards. Pupils match pictures with the correct words. This is done individually or in pairs on a table or whiteboard. The teacher guides and gives feedback. Say the word aloud after matching. [Diff: A - Match and write a simple sentence, B - Match and say the word, C - Match identical pictures]", "🗣️ Listen and repeat key phrases drill. The teacher says phrases with correct intonation and stress. Pupils listen carefully and repeat in class (choral repetition), small groups and individually. Emphasize difficult word pronunciation and sentence intonation. [Diff: A - Say phrases with correct intonation and expression, B - Say simple phrases with help, C - Say key words]", "📋 Category Cards game: Pupils are given word cards and asked to sort them into correct groups such as animals, plants, colours or shapes. The teacher provides categories on the board or table. Pupils paste cards under the correct category while saying the word. [Diff: A - Sort and give reasons for the classification, B - Sort with a friend's guidance, C - Match with given examples]", "📝 Choral oral practice: The teacher shows pictures or objects. Pupils respond in chorus to build confidence. Then individually for assessment. The teacher gives immediate feedback. [Diff: A - Answer in full sentences, B - Answer in one word, C - Raise hand or point to the answer]", "🎯 Arrange word cards according to time categories (Days, Months, Years). Pupils are given mixed word cards and asked to arrange them in correct order in groups. [Diff: A - Arrange and create sentences about time, B - Arrange cards in correct order, C - Match cards with pictures]", "🎲 Educational board game: Pupils roll a die and move according to the number. Each space contains a question about the topic such as guess the word, answer a question or make a sentence. Pupils must answer correctly to continue moving. [Diff: A - HOTS level questions, B - Standard level questions, C - Help a friend answer]", "🃏 Taboo word game: Pupils pick a card and must describe the word to a friend without saying the word itself. Other friends guess the described word. This activity trains thinking and communication skills. [Diff: A - Describe using full sentences, B - Use body language and gestures, C - Show the picture to a friend]", "✏️ Draw a simple mind map of prior knowledge about the topic. The teacher guides pupils to identify main ideas and supporting details. Pupils draw their own mind maps on paper or using digital apps. [Diff: A - Complete mind map with sub-topics and branches, B - Partial mind map with guidance, C - Colour and paste pictures on the map]"], "d": ["📖 Read a short passage in pairs. The teacher prepares passages at 3 difficulty levels (easy, standard, challenging). Pupils take turns reading with partners and discuss the content. The teacher provides differentiated comprehension questions covering literal, inferential and HOTS levels. Pupils answer orally or in writing. [Diff: A - Read high-level passage and answer HOTS questions, B - Read standard passage and answer literal questions, C - Read picture passage and draw answers]", "✍️ Write a paragraph using i-Think thinking maps (Circle Map, Bubble Map, Tree Map). Pupils plan their writing using the map before writing. Writing is done individually or in pairs. The teacher provides a writing frame and checklist to guide pupils. [Diff: A - Write complete paragraph with organized content and correct grammar, B - Write guided sentences using frames and phrases, C - Arrange given sentences and trace the writing]", "🎭 Role-play activity: Pupils act out dialogues in daily situations related to the topic. The teacher provides various situation cards. Pupils plan dialogues in groups and practice before performing in front of the class. The teacher assesses intonation, pronunciation and expression. [Diff: A - Create own dialogue based on situation creatively, B - Use given dialogue with adaptation, C - Act out dialogue with teacher guidance]", "🖼️ Gallery Walk: Pupils' work is displayed on desks or walls. Pupils walk in groups to view friends' work while noting important information. They leave comments on sticky notes or feedback cards. Each group stops at each station for 2-3 minutes. [Diff: A - Write constructive, specific and meaningful comments, B - Write short positive comments, C - Paste stickers or marks on work]", "📘 Create a mini booklet (foldable) based on the topic. The teacher provides a booklet template from an A4 paper. Pupils fill in the content creatively including definitions, pictures, examples and summaries. The mini booklet contains a summary of the lesson. [Diff: A - Fill in complete content with own sentences and illustrations, B - Fill in guided content with questions and pictures, C - Colour pictures and paste given labels]", "🏫 Station-Based Learning: Pupils move in groups to 4-5 stations with different tasks. Each station takes 5-7 minutes. Stations include reading, writing, colouring, games and creativity. The teacher monitors and guides at stations needing help. [Diff: A - HOTS challenge station with complex tasks, B - Standard task station with clear instructions, C - Teacher guided station with close support]", "🧩 Language Games: Scrabble, Boggle, Word Card Games or Crosswords. Pupils play in small groups to reinforce vocabulary, spelling and sentence structure. Games rotate among groups within a set time period. [Diff: A - Create sentences from found words, B - Find hidden words in grids, C - Match letters to form words]", "🗺️ Create a mind map or thinking map in groups. Use mahjong paper and coloured markers. Pupils draw creative mind maps with pictures and colours. Each group presents their mind map. Work is displayed in the class corner. [Diff: A - Complete mind map with sub-topics and detailed branches, B - Circle map with related main ideas, C - Picture map with a friend's help]", "💻 Use educational apps like Quizizz, Kahoot!, Google Classroom or Wordwall. Pupils answer interactive quizzes individually or in groups using mobile phones, tablets or computers. Questions cover various difficulty levels. Scores are displayed live. [Diff: A - HOTS level questions with reasoning, B - Standard level questions with choices, C - Picture questions with answer choices]", "🎨 Craft activity: Create posters, scrapbooks, 3D models or dioramas related to the topic. Pupils use materials like coloured paper, recycled boxes, glue, scissors, colour pencils and recycled materials. Work is displayed and presented. [Diff: A - Create craft creatively without example, B - Use given template and example, C - Help colour and decorate]", "🔬 Experiment or investigation in groups. Pupils conduct scientific activities to test hypotheses. They record observations, analyse data and draw conclusions in groups. The teacher guides step by step. [Diff: A - Design own experiment with variable control, B - Follow provided experiment steps, C - Help friends record data and observations]", "📊 Group project: Pupils complete a project in groups and present their work. The project includes research, information gathering, analysis and creative presentation. Project duration is 1-2 weeks. [Diff: A - Complex project with in-depth research and analysis, B - Standard project with guidance and guidelines, C - Help the group with simple tasks]", "🎪 Learning Carnival: Pupils set up interactive booths related to the topic. Each group manages a booth with activities like quizzes, games or exhibitions. Other classes or visiting teachers visit the booths. [Diff: A - Fully manage and run a booth independently, B - Help manage the booth with guidance, C - Visit and participate in booth activities]", "📝 Project-Based Learning (PBL): Pupils complete a folio or scrapbook in groups. The project includes title, objectives, content, illustrations and summary. Reference sources include books, internet and interviews. [Diff: A - Complete folio with detailed and creative content, B - Scrapbook with guided content and examples, C - Collection of pictures and materials with labels]", "🎯 Hot Seat activity: One pupil sits in the hot seat in front of the class. Classmates take turns asking questions about the topic. The pupil in the hot seat must answer confidently and clearly. This activity builds confidence and fluency. [Diff: A - Ask challenging and in-depth questions, B - Answer questions confidently and accurately, C - Record answers and help a friend]"], "ps": ["👨‍🏫 Selected groups present their work in front of the class. Group representatives present using aids like posters, slides or models. The explanation covers objectives, process and outcomes. Other groups give feedback and ask questions. [Diff: A - Present confidently, clearly and creatively, B - Present with teacher guidance and notes, C - Display work while teacher explains]", "📝 Quick quiz using Kahoot! or Quizizz individually or in groups. Questions cover various difficulty levels from basic to HOTS. Pupils answer within the time limit. Scores and rankings are displayed live to increase motivation. [Diff: A - HOTS level questions with reasoning, B - Standard level questions with choices, C - Picture questions with answer choices]", "💬 Reflection circle: Each pupil shares one thing they learned today orally. The teacher randomly selects a few pupils to share. Reflection can also be done in writing in a short learning journal. [Diff: A - Share in full sentences with examples and connections, B - Share in short phrases, C - Point to pictures or learning materials]", "✏️ 3-2-1 activi
